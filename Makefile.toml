# Reinhardt - cargo-make configuration

[config]
default_to_workspace = false

# Environment variables
[env]
CARGO_TERM_COLOR = "always"
RUST_BACKTRACE = "1"

# ============================================================================
# Core Development Tasks
# ============================================================================

[tasks.check]
description = "Run cargo check on workspace"
command = "cargo"
args = [
  "check",
  "--workspace",
  "--all-features",
  "--all-targets",
  "--quiet"
]

[tasks.build]
description = "Build workspace"
command = "cargo"
args = ["build", "--workspace", "--all", "--all-features", "--all-targets", "--quiet", "--bins", "--examples", "--tests", "--benches"]

[tasks.build-release]
description = "Build workspace in release mode"
command = "cargo"
args = ["build", "--workspace", "--all", "--all-features", "--release", "--quiet"]

[tasks.clean]
description = "Clean build artifacts"
command = "cargo"
args = ["clean"]

[tasks.bench-builds]
description = "Measure standard build-loop scenarios with hyperfine"
script_runner = "sh"
script = '''
set -e
scripts/bench-build.sh
'''

[tasks.bench-builds-dry-run]
description = "Print standard build-loop benchmark commands without running them"
script_runner = "sh"
script = '''
set -e
scripts/bench-build.sh --dry-run
'''

# ============================================================================
# Code Quality Tasks
# ============================================================================

[tasks.fmt-check]
description = "Check all code formatting (Rust + page! DSL)"
command = "cargo"
args = ["run", "-p", "reinhardt-formatter", "--", "fmt-all", "--check"]

[tasks.fmt-fix]
description = "Auto-fix all code formatting (Rust + page! DSL)"
command = "cargo"
args = ["run", "-p", "reinhardt-formatter", "--", "fmt-all"]

[tasks.fmt-rust-only]
description = "Format Rust code only (without page! macro protection)"
command = "cargo"
args = ["fmt", "--all"]

[tasks.clippy-check]
description = "Run clippy linter"
command = "cargo"
args = [
  "clippy",
  "--workspace",
  "--all",
  "--all-features",
  "--",
  "-D",
  "warnings",
]

[tasks.clippy-fix]
description = "Run clippy linter and automatically fix found errors."
command = "cargo"
args = [
  "clippy",
  "--fix",
  "--workspace",
  "--all",
  "--all-features",
  "--allow-dirty",
  "--allow-staged",
  "--",
  "-D",
  "warnings",
]

[tasks.clippy-todo-check]
description = "Check for development-only code (todo!, unimplemented!, dbg!)"
command = "cargo"
args = [
  "clippy",
  "--workspace",
  "--all",
  "--all-features",
  "--",
  "-D", "clippy::todo",
  "-D", "clippy::unimplemented",
  "-D", "clippy::dbg_macro",
]

[tasks.semver-check]
description = "Run cargo-semver-checks locally (mirrors CI semver-check.yml). Override baseline via BASELINE_REV; set SEMVER_PACKAGE=<name> to check a single crate (mirrors CI's per-crate matrix shard); override release-type via SEMVER_RELEASE_TYPE (e.g. SEMVER_RELEASE_TYPE=major for SP-3 breaking-change PRs, SEMVER_RELEASE_TYPE= [empty] to omit --release-type and let cargo-semver-checks auto-detect from Cargo.toml version bumps as on release-plz PRs). Defaults to --release-type minor when unset."
script_runner = "sh"
script = '''
set -e
# Resolve baseline revision in this order of preference so the task works
# both on the canonical repo (where origin/main exists) and on forks or
# differently-named remotes:
#   1. $BASELINE_REV  - explicit user override
#   2. origin/main    - default, matches CI normal-PR path
#   3. main           - local fallback when no `origin` remote is configured
#   4. HEAD~1         - last-resort so the command never fails on a fresh clone
if [ -n "${BASELINE_REV:-}" ]; then
  BASELINE="$BASELINE_REV"
elif git rev-parse --verify --quiet origin/main >/dev/null; then
  BASELINE="origin/main"
elif git rev-parse --verify --quiet main >/dev/null; then
  BASELINE="main"
else
  BASELINE="HEAD~1"
fi
echo "semver-check: using baseline-rev=${BASELINE}"

# Build the cargo-semver-checks argv into "$@" so we can conditionally include
# --release-type and switch between --package and --workspace without quoting
# pitfalls. POSIX sh: `set --` resets positional params, then we append.
set -- check-release --all-features --baseline-rev "$BASELINE"

# When SEMVER_PACKAGE is set, target a single crate (mirrors the CI per-crate
# matrix shard introduced by reinhardt-web#4529). Otherwise fall back to the
# workspace-wide invocation, preserving backward compatibility for callers
# that run the task without arguments.
if [ -n "${SEMVER_PACKAGE:-}" ]; then
  echo "semver-check: targeting package ${SEMVER_PACKAGE}"
  set -- "$@" --package "$SEMVER_PACKAGE"
else
  set -- "$@" --workspace --exclude reinhardt-web --exclude reinhardt-pages
fi

# SEMVER_RELEASE_TYPE mirrors the CI release-type matrix: empty (variable set
# but blank) → omit --release-type entirely so cargo-semver-checks auto-detects
# from Cargo.toml version bumps (release-plz PR path); explicit value → pass
# through (e.g. SEMVER_RELEASE_TYPE=major for SP-3 breaking-change PRs); unset
# → default to --release-type minor (normal PR path). The `${VAR+set}`
# expansion distinguishes unset from set-but-empty in POSIX sh.
if [ -n "${SEMVER_RELEASE_TYPE+set}" ]; then
  if [ -n "$SEMVER_RELEASE_TYPE" ]; then
    set -- "$@" --release-type "$SEMVER_RELEASE_TYPE"
    echo "semver-check: release-type=${SEMVER_RELEASE_TYPE} (override via SEMVER_RELEASE_TYPE)"
  else
    echo "semver-check: --release-type omitted (SEMVER_RELEASE_TYPE explicitly empty — auto-detect from Cargo.toml)"
  fi
else
  set -- "$@" --release-type minor
fi

echo "semver-check: cargo semver-checks $*"
cargo semver-checks "$@"
'''

[tasks.placeholder-check]
description = "Check for formatter placeholder macros left in source files"
script_runner = "sh"
script = '''
set -e
echo "Scanning for __reinhardt_placeholder__! in source files..."
docker run --rm -v "$(pwd):/src" semgrep/semgrep \
  semgrep scan --config /src/.semgrep/placeholder-check.yml --error --metrics off /src
'''

[tasks.fmt-page-only]
description = "Format page! macro DSL only (without rustfmt)"
command = "cargo"
args = ["run", "-p", "reinhardt-formatter", "--", "fmt", "."]

# The `examples/` directory is an independent cargo workspace (excluded from
# the root workspace), so the root `fmt-*` / `clippy-*` tasks above do not
# walk into it. The tasks below run the same checks/fixes inside that
# sub-workspace so local `cargo make` matches what the
# `Examples Tests / examples-*` CI jobs enforce per release.
# Refs #4302.

[tasks.fmt-check-examples]
description = "Check formatting of the examples/ sub-workspace (Rust + page! DSL via reinhardt-formatter)"
command = "cargo"
args = ["run", "-p", "reinhardt-formatter", "--", "fmt", "examples", "--check"]

[tasks.fmt-fix-examples]
description = "Auto-fix formatting of the examples/ sub-workspace (Rust + page! DSL via reinhardt-formatter)"
command = "cargo"
args = ["run", "-p", "reinhardt-formatter", "--", "fmt", "examples"]

[tasks.clippy-check-examples]
description = "Run clippy on the examples/ sub-workspace"
command = "cargo"
args = [
  "clippy",
  "--manifest-path", "examples/Cargo.toml",
  "--workspace",
  "--all-features",
  "--",
  "-D", "warnings",
]

[tasks.clippy-fix-examples]
description = "Run clippy --fix on the examples/ sub-workspace"
command = "cargo"
args = [
  "clippy",
  "--fix",
  "--manifest-path", "examples/Cargo.toml",
  "--workspace",
  "--all-features",
  "--allow-dirty",
  "--allow-staged",
  "--",
  "-D", "warnings",
]

[tasks.auto-fix]
description = "Run all auto-fixes (root workspace + examples/ sub-workspace)"
dependencies = ["clippy-fix", "fmt-fix", "clippy-fix-examples", "fmt-fix-examples"]

# ============================================================================
# Testing Tasks
# ============================================================================

[tasks.doc-test-only]
description = "Run only documentation tests without Docker cleanup"
command = "cargo"
args = ["test", "--workspace", "--doc", "--quiet", "--all-features", "--no-fail-fast"]

[tasks.doc-test]
clear = true
description = "Run only documentation tests (with Docker cleanup)"
dependencies = ["docker-cleanup-force", "doc-test-only"]

[tasks.doc-test-crate]
description = "Run documentation tests for specific package(s). Usage: cargo make doc-test-crate -- -p package1 -p package2"
script = '''
#!/bin/bash
args="${CARGO_MAKE_TASK_ARGS#--}"
args="${args//;/ }"
cargo test $args --doc --quiet --all-features --no-fail-fast
'''

[tasks.bench]
description = "Run benchmark tests in tests/bench"
command = "cargo"
args = ["bench", "--manifest-path", "tests/bench/Cargo.toml"]

[tasks.unit-test]
description = "Run unit tests (src/)"
command = "cargo"
args = [
  "nextest",
  "run",
  "--workspace",
  "--lib",
  "--exclude",
  "reinhardt-integration-tests",
  "--all-features",
  "--no-fail-fast",
  "--status-level=none",
  "--final-status-level=none",
]

[tasks.unit-test-crate]
description = "Run unit tests for specific package(s). Usage: cargo make unit-test-crate -- -p package1 -p package2"
script = '''
#!/bin/bash
args="${CARGO_MAKE_TASK_ARGS#--}"
args="${args//;/ }"
cargo nextest run $args --lib --all-features --no-fail-fast --show-progress=none --status-level=none --final-status-level=none
'''

[tasks.intra-crate-integration-test]
description = "Run intra-crate integration tests (tests/) excluding UI tests"
command = "cargo"
args = [
  "nextest",
  "run",
  "--workspace",
  "--test",
  "*",
  "--exclude",
  "reinhardt-integration-tests",
  "-E", "not binary(/ui/)",
  "--all-features",
  "--no-fail-fast",
  "--status-level=none",
  "--final-status-level=none"
]

[tasks.intra-crate-integration-test-crate]
description = "Run intra-crate integration tests for specific package(s). Usage: cargo make intra-crate-integration-test-crate -- -p package1 -p package2"
script = '''
#!/bin/bash
args="${CARGO_MAKE_TASK_ARGS#--}"
args="${args//;/ }"
cargo nextest run $args --test "*" --all-features --no-fail-fast --show-progress=none --status-level=none --final-status-level=none
'''

[tasks.cross-crate-integration-test]
description = "Run cross-crate integration tests (reinhardt-integration-tests)"
command = "cargo"
args = [
  "nextest",
  "run",
  "--package",
  "reinhardt-integration-tests",
  "--all-features",
  "--no-fail-fast",
  "--status-level=none",
  "--final-status-level=none"
]

[tasks.integration-test-only]
description = "Run all integration tests without Docker cleanup"
dependencies = ["intra-crate-integration-test", "cross-crate-integration-test"]

[tasks.integration-test]
description = "Run all integration tests (with Docker cleanup)"
dependencies = ["docker-cleanup-force", "integration-test-only"]

[tasks.local-examples-test]
description = "Test examples with local reinhardt"
script = '''
#!/bin/bash
set -e
cd examples
cp .cargo/config.local.toml .cargo/config.toml
cargo nextest run --workspace --verbose
rm -f .cargo/config.toml
'''

[tasks.local-examples-test-crate]
description = "Test specific local example(s). Usage: cargo make local-examples-test-crate -- -p examples-hello-world"
script = '''
#!/bin/bash
set -e
args="${CARGO_MAKE_TASK_ARGS#--}"
args="${args//;/ }"
cd examples
cp .cargo/config.local.toml .cargo/config.toml
cargo nextest run $args --verbose
rm -f .cargo/config.toml
'''

[tasks.remote-examples-test]
description = "Test examples with published crates.io versions"
script = '''
#!/bin/bash
set -e
cd examples
EXIT_CODE=0
for example_dir in examples-*; do
  if [ -d "$example_dir" ]; then
    echo "Testing $example_dir..."
    (cd "$example_dir" && cargo nextest run --all-features) || EXIT_CODE=1
  fi
done
exit $EXIT_CODE
'''

[tasks.ui-test-only]
description = "Run UI tests (trybuild) separately with serial execution without Docker cleanup"
command = "cargo"
args = [
  "nextest",
  "run",
  "--profile", "ui-test",
  "--workspace",
  "-E", "binary(/ui/)",
  "--no-fail-fast",
  "--status-level=none",
  "--final-status-level=none"
]

[tasks.ui-test]
description = "Run UI tests (trybuild) separately with serial execution (with Docker cleanup)"
dependencies = ["docker-cleanup-force", "ui-test-only"]

[tasks.examples-test-only]
description = "Test all examples (local only) without Docker cleanup"
dependencies = ["local-examples-test"]

[tasks.examples-test]
description = "Test all examples (local only) (with Docker cleanup)"
dependencies = ["docker-cleanup-force", "examples-test-only"]

[tasks.test-only]
description = "Run all tests without Docker cleanup"
dependencies = [
  "unit-test",
  "integration-test-only",
  "doc-test-only",
  "examples-test-only",
  "ui-test-only"
]

[tasks.test]
clear = true
description = "Run all tests (with Docker cleanup)"
dependencies = ["docker-cleanup-force", "test-only"]

# ============================================================================
# Coverage Tasks
# ============================================================================

[tasks.coverage-unit]
description = "Run unit tests with coverage (generates Codecov JSON report)"
command = "cargo"
args = ["llvm-cov", "nextest", "--workspace", "--lib", "--all-features", "--no-fail-fast", "--codecov", "--output-path", "/tmp/reinhardt-unit-codecov.json"]

[tasks.coverage-html]
description = "Run unit tests with coverage and open HTML report"
command = "cargo"
args = ["llvm-cov", "nextest", "--workspace", "--lib", "--all-features", "--no-fail-fast", "--html", "--open"]

[tasks.coverage-summary]
description = "Run unit tests with coverage and show summary in terminal"
command = "cargo"
args = ["llvm-cov", "nextest", "--workspace", "--lib", "--all-features", "--no-fail-fast"]

# ============================================================================
# Feature Combination Check Tasks
# ============================================================================

[tasks.feature-check]
description = "Check representative feature combinations (30 patterns)"
dependencies = ["feature-check-facade", "feature-check-subcrate"]

[tasks.feature-check-facade]
description = "Check facade crate feature combinations (19 patterns)"
script_runner = "bash"
script = '''
set -e
echo "=== Feature Check: Facade Crate ==="

combos=(
	"no-default|reinhardt-web|--no-default-features"
	"minimal|reinhardt-web|--no-default-features -F minimal"
	"standard|reinhardt-web|"
	"full|reinhardt-web|--no-default-features -F full"
	"api-only|reinhardt-web|--no-default-features -F api-only"
	"graphql-server|reinhardt-web|--no-default-features -F graphql-server"
	"websocket-server|reinhardt-web|--no-default-features -F websocket-server"
	"cli-tools|reinhardt-web|--no-default-features -F cli-tools"
	"standard+mysql|reinhardt-web|--no-default-features -F standard,db-mysql"
	"standard+sqlite|reinhardt-web|--no-default-features -F standard,db-sqlite"
	"db-cockroachdb|reinhardt-web|--no-default-features -F minimal,db-cockroachdb"
	"auth-variants|reinhardt-web|--no-default-features -F minimal,auth-jwt,auth-session,auth-oauth,auth-token"
	"middleware-all|reinhardt-web|--no-default-features -F minimal,middleware-cors,middleware-compression,middleware-security,middleware-rate-limit"
	"pages-graphql-ws|reinhardt-web|--no-default-features -F minimal,pages,graphql,websockets,database,db-postgres"
	"auth-db|reinhardt-web|--no-default-features -F minimal,database,db-postgres,auth"
	"shortcuts-db|reinhardt-web|--no-default-features -F minimal,database,db-postgres,shortcuts"
	"admin-forms|reinhardt-web|--no-default-features -F minimal,admin,database,db-postgres,auth"
	"plugins|reinhardt-web|--no-default-features -F minimal,dentdelion,deeplink,dispatch,grpc"
	"openapi-router|reinhardt-web|--no-default-features -F minimal,openapi-router,database,db-postgres"
)

for combo in "${combos[@]}"; do
	IFS='|' read -r name pkg flags <<< "$combo"
	echo "--- Checking: ${name} ---"
	cargo check -p "${pkg}" ${flags} --quiet
	echo "  OK: ${name}"
done

echo "=== All facade checks passed ==="
'''

[tasks.feature-check-subcrate]
description = "Check key sub-crate feature combinations (11 patterns)"
script_runner = "bash"
script = '''
set -e
echo "=== Feature Check: Sub-Crates ==="

combos=(
	"core-minimal|reinhardt-core|--no-default-features"
	"core-full|reinhardt-core|--no-default-features -F core-full"
	"db-minimal|reinhardt-db|--no-default-features"
	"db-full|reinhardt-db|--no-default-features -F database-full"
	"db-no-di|reinhardt-db|--no-default-features -F backends,orm"
	"auth-minimal|reinhardt-auth|--no-default-features"
	"auth-full|reinhardt-auth|--no-default-features -F auth-full"
	"auth-jwt-no-db|reinhardt-auth|--no-default-features -F jwt"
	"auth-sessions-no-db|reinhardt-auth|--no-default-features -F sessions"
	"rest-minimal|reinhardt-rest|--no-default-features"
	"rest-full|reinhardt-rest|--no-default-features -F rest-full"
)

for combo in "${combos[@]}"; do
	IFS='|' read -r name pkg flags <<< "$combo"
	echo "--- Checking: ${name} ---"
	cargo check -p "${pkg}" ${flags} --quiet
	echo "  OK: ${name}"
done

echo "=== All sub-crate checks passed ==="
'''

[tasks.feature-test-critical]
description = "Run cargo test for critical feature combinations (4 patterns)"
script_runner = "bash"
script = '''
set -e
echo "=== Feature Test: Critical Combinations ==="

combos=(
	"standard|reinhardt-web|"
	"full|reinhardt-web|--no-default-features -F full"
	"api-only|reinhardt-web|--no-default-features -F api-only"
	"admin-forms|reinhardt-web|--no-default-features -F minimal,admin,database,db-postgres,auth"
)

for combo in "${combos[@]}"; do
	IFS='|' read -r name pkg flags <<< "$combo"
	echo "--- Testing: ${name} ---"
	cargo test -p "${pkg}" ${flags} --lib --quiet
	echo "  OK: ${name}"
done

echo "=== All critical feature tests passed ==="
'''

