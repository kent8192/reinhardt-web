name: Setup Protobuf Compiler
description: Install protoc from GitHub Releases (apt version is too old for Proto3 optional)
inputs:
  version:
    description: Protoc release version (without v prefix)
    required: false
    default: "28.3"
runs:
  using: composite
  steps:
    - name: Install protoc (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        PROTOC_VERSION="${{ inputs.version }}"
        ARCH=$(uname -m)
        case "$ARCH" in
          x86_64)  PROTOC_ARCH="linux-x86_64" ;;
          aarch64) PROTOC_ARCH="linux-aarch_64" ;;
          *)       echo "Unsupported architecture: $ARCH" && exit 1 ;;
        esac
        curl -LsSf "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-${PROTOC_ARCH}.zip" \
          -o /tmp/protoc.zip
        sudo unzip -o /tmp/protoc.zip -d /usr/local bin/protoc
        sudo chmod +x /usr/local/bin/protoc
        rm /tmp/protoc.zip
        protoc --version
    - name: Install protoc (macOS)
      if: runner.os == 'macOS'
      shell: bash
      run: |
        brew install protobuf
        protoc --version
    - name: Install protoc (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        choco install protoc --yes
        protoc --version
