name: Setup Protobuf Compiler
description: Install protoc on Linux, macOS, and Windows
runs:
  using: composite
  steps:
    - name: Install protoc (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        # Use DPkg::Lock::Timeout to wait for dpkg lock instead of
        # racy fuser-based polling (lock can be re-acquired between
        # fuser check and apt-get execution)
        sudo apt-get update -qq -o DPkg::Lock::Timeout=120
        sudo apt-get install -y -o DPkg::Lock::Timeout=120 protobuf-compiler
        protoc --version
    - name: Install protoc (macOS)
      if: runner.os == 'macOS'
      shell: bash
      run: |
        brew install protobuf
        protoc --version
    - name: Install protoc (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        choco install protoc --yes
        protoc --version
