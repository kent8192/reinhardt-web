name: "\u2728 Feature Request"
description: Suggest a new feature or enhancement
labels: ["enhancement"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new feature!
        Please fill out the form below to help us understand your request.

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      options:
        - label: I have searched existing issues to verify this feature hasn't been requested
          required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A brief summary of the feature you'd like to see
      placeholder: Describe the feature...
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation / Problem
      description: |
        Why do you need this feature? What problem does it solve?
        Describe the use case and the pain points you're experiencing.
      placeholder: |
        I'm trying to do X, but currently I have to do Y which is cumbersome because...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like to see implemented
      placeholder: |
        I would like to see an API like...

        ```rust
        // Example code
        ```

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Describe any alternative solutions or features you've considered
      placeholder: |
        I've considered using X, but it doesn't work because...

  - type: dropdown
    id: breaking-change
    attributes:
      label: Is this a breaking change?
      description: |
        Would implementing this feature require changes to existing public APIs
        that could break downstream code? See instructions/STABILITY_POLICY.md for details.
      options:
        - "No - backward compatible"
        - "Yes - requires major version bump (SemVer MAJOR)"
        - "Not sure"
    validations:
      required: true

  - type: textarea
    id: migration-path
    attributes:
      label: Migration Path (if breaking)
      description: |
        If this is a breaking change, describe how users should migrate.
        Include code examples showing before and after.
      placeholder: |
        Before:
        ```rust
        let result = old_function(param);
        ```

        After:
        ```rust
        let result = new_function(new_param);
        ```

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, mockups, or examples that would help
