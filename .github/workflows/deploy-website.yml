name: Deploy Website

on:
  push:
    branches: [main]
    paths:
      - "website/**"
  pull_request:
    types: [opened, synchronize, reopened, closed]
    paths:
      - "website/**"
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  deployments: write
  pull-requests: write

concurrency:
  group: deploy-website-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

env:
  # Workaround for arduino/setup-protoc#112, cloudflare/wrangler-action#413,
  # hashicorp/setup-packer#162 (tracked in reinhardt-web#4125). Remove this
  # once all three upstreams ship node24 releases.
  #
  # Ideal implementation (without workaround):
  #   (no env override; let runner default kick in)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  determine-runner:
    name: Determine Runner
    timeout-minutes: 360
    runs-on: ubuntu-latest
    outputs:
      runner: ${{ steps.set-runner.outputs.runner }}
    steps:
      - name: Parse PR checkbox for self-hosted
        if: github.event_name == 'pull_request'
        id: parse-checkbox
        uses: actions/github-script@v8
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const checked = /- \[x\] I use self-hosted runner/i.test(body);
            core.setOutput('self-hosted-requested', checked.toString());

      - name: Set runner configuration
        id: set-runner
        env:
          ACTOR: ${{ github.actor }}
          REPO_OWNER: ${{ github.repository_owner }}
          SELF_HOSTED_ENABLED: ${{ vars.SELF_HOSTED_ENABLED }}
          EVENT_NAME: ${{ github.event_name }}
          SELF_HOSTED_REQUESTED: ${{ steps.parse-checkbox.outputs.self-hosted-requested }}
          HEAD_REF: ${{ github.head_ref }}
          MAC_RUNNER_ENABLED: ${{ vars.MAC_RUNNER_ENABLED }}
          IS_FORK: ${{ github.event.pull_request.head.repo.fork }}
        run: |
          USE_MAC=false
          USE_AWS=false

          # Mac local runner selection
          if [[ "$MAC_RUNNER_ENABLED" == "true" ]] && [[ "$IS_FORK" != "true" ]]; then
            if [[ "$EVENT_NAME" == "workflow_dispatch" ]] && [[ "$ACTOR" == "$REPO_OWNER" ]]; then
              USE_MAC=true
            elif [[ "$EVENT_NAME" == "pull_request" ]]; then
              if [[ "$HEAD_REF" == release-plz-* ]]; then
                USE_MAC=true
              elif [[ "$ACTOR" == "$REPO_OWNER" ]]; then
                USE_MAC=true
              fi
            elif [[ "$EVENT_NAME" == "push" ]] && [[ "$ACTOR" == "$REPO_OWNER" ]]; then
              USE_MAC=true
            fi
          fi

          # AWS Spot runner selection (opt-in for PRs)
          if [[ "$USE_MAC" == "false" ]] && [[ "$SELF_HOSTED_ENABLED" == "true" ]]; then
            if [[ "$HEAD_REF" == release-plz-* ]]; then
              USE_AWS=true
            elif [[ "$ACTOR" == "$REPO_OWNER" ]]; then
              if [[ "$EVENT_NAME" == "pull_request" ]]; then
                if [[ "$SELF_HOSTED_REQUESTED" == "true" ]]; then
                  USE_AWS=true
                fi
              else
                USE_AWS=true
              fi
            fi
          fi

          # Output runner configuration
          if [[ "$USE_MAC" == "true" ]]; then
            echo 'runner=["self-hosted","linux","arm64","mac-local"]' >> "$GITHUB_OUTPUT"
          elif [[ "$USE_AWS" == "true" ]]; then
            echo 'runner=["self-hosted","linux","arm64","reinhardt-ci"]' >> "$GITHUB_OUTPUT"
          else
            echo 'runner="ubuntu-latest"' >> "$GITHUB_OUTPUT"
          fi

  build-and-deploy:
    name: Build & Deploy
    needs: [determine-runner]
    timeout-minutes: 360
    if: github.event.action != 'closed'
    runs-on: ${{ fromJSON(needs.determine-runner.outputs.runner) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Zola
        uses: taiki-e/install-action@v2
        with:
          tool: zola@0.22.1

      - name: Build
        working-directory: website
        run: zola build

      - name: Set production branch via Cloudflare API
        if: github.ref == 'refs/heads/main'
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          curl -sf -X PATCH \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/pages/projects/reinhardt-web" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"production_branch": "main"}' \
            | jq -r '"Production branch set to: \(.result.production_branch)"'

      # NOTE: Still on Node.js 20 - update when Node.js 24 version becomes available
      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy website/public
            --project-name=reinhardt-web
            --branch=${{ github.head_ref || github.ref_name }}

      - name: Comment preview URL on PR
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: website-preview
          message: |
            ### Website Preview
            Deployed to: ${{ steps.deploy.outputs.deployment-url }}

  cleanup-preview:
    name: Cleanup Preview
    needs: [determine-runner]
    timeout-minutes: 360
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ${{ fromJSON(needs.determine-runner.outputs.runner) }}
    steps:
      - name: Delete preview deployments
        env:
          CF_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PROJECT_NAME: reinhardt-web
          BRANCH: ${{ github.head_ref }}
        run: |
          # Fetch deployments for this branch
          deployments=$(curl -sf \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/pages/projects/${PROJECT_NAME}/deployments?per_page=100" \
            | jq -r --arg branch "$BRANCH" \
              '.result[] | select(.deployment_trigger.metadata.branch == $branch) | .id')

          if [ -z "$deployments" ]; then
            echo "No preview deployments found for branch: ${BRANCH}"
            exit 0
          fi

          # Delete each deployment (latest may fail due to API constraint — that's OK)
          for id in $deployments; do
            echo "Deleting deployment: ${id}"
            curl -sf -X DELETE \
              -H "Authorization: Bearer ${CF_API_TOKEN}" \
              "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT_ID}/pages/projects/${PROJECT_NAME}/deployments/${id}" \
              | jq -r '"  status: \(.success)"' || echo "  skipped (latest deployment cannot be deleted)"
          done
