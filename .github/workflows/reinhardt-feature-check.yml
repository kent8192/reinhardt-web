name: Feature Check

on:
  workflow_call:
    inputs:
      runner:
        description: 'Runner label JSON'
        type: string
        default: '"ubuntu-latest"'
      cargo-build-jobs:
        description: "Parallel cargo build jobs"
        type: string
        default: "1"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_TARGET_DIR: /tmp/cargo_target
  CARGO_INCREMENTAL: 0
  CARGO_BUILD_JOBS: ${{ inputs.cargo-build-jobs || '1' }}

jobs:
  # Validate representative feature combinations compile correctly.
  # Catches issues where feature subsets (minimal, api-only, etc.) break
  # while --all-features still passes. Each entry targets only the affected
  # crate (-p) to minimize compilation scope and CI time.
  # Runs only on release PRs (release-plz branches) to avoid CI overhead
  # on regular PRs.
  feature-check:
    name: Feature Check (${{ matrix.combo.name }})
    runs-on: ${{ fromJSON(inputs.runner || '"ubuntu-latest"') }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        combo:
          # --- Facade crate presets ---
          - { name: "no-default",        pkg: "reinhardt-web",  features: "",                    no_default: "true"  }
          - { name: "minimal",           pkg: "reinhardt-web",  features: "minimal",             no_default: "true"  }
          - { name: "standard",          pkg: "reinhardt-web",  features: "",                    no_default: "false" }
          - { name: "full",              pkg: "reinhardt-web",  features: "full",                no_default: "true"  }
          - { name: "api-only",          pkg: "reinhardt-web",  features: "api-only",            no_default: "true"  }
          - { name: "graphql-server",    pkg: "reinhardt-web",  features: "graphql-server",      no_default: "true"  }
          - { name: "websocket-server",  pkg: "reinhardt-web",  features: "websocket-server",    no_default: "true"  }
          - { name: "cli-tools",         pkg: "reinhardt-web",  features: "cli-tools",           no_default: "true"  }
          # --- Database backend variants ---
          - { name: "standard+mysql",    pkg: "reinhardt-web",  features: "standard,db-mysql",   no_default: "true"  }
          - { name: "standard+sqlite",   pkg: "reinhardt-web",  features: "standard,db-sqlite",  no_default: "true"  }
          - { name: "db-cockroachdb",    pkg: "reinhardt-web",  features: "minimal,db-cockroachdb", no_default: "true" }
          # --- Cross-cutting feature combinations ---
          - { name: "auth-variants",     pkg: "reinhardt-web",  features: "minimal,auth-jwt,auth-session,auth-oauth,auth-token", no_default: "true" }
          - { name: "middleware-all",     pkg: "reinhardt-web",  features: "minimal,middleware-cors,middleware-compression,middleware-security,middleware-rate-limit", no_default: "true" }
          - { name: "pages-graphql-ws",  pkg: "reinhardt-web",  features: "minimal,pages,graphql,websockets,database,db-postgres", no_default: "true" }
          - { name: "admin-forms",       pkg: "reinhardt-web",  features: "minimal,admin,database,db-postgres,auth", no_default: "true" }
          - { name: "plugins",           pkg: "reinhardt-web",  features: "minimal,dentdelion,deeplink,dispatch,grpc", no_default: "true" }
          - { name: "openapi-router",    pkg: "reinhardt-web",  features: "minimal,openapi-router,database,db-postgres", no_default: "true" }
          # --- Key sub-crate extremes (no-default and full) ---
          - { name: "core-minimal",      pkg: "reinhardt-core", features: "",                    no_default: "true"  }
          - { name: "core-full",         pkg: "reinhardt-core", features: "core-full",           no_default: "true"  }
          - { name: "db-minimal",        pkg: "reinhardt-db",   features: "",                    no_default: "true"  }
          - { name: "db-full",           pkg: "reinhardt-db",   features: "database-full",       no_default: "true"  }
          - { name: "auth-minimal",      pkg: "reinhardt-auth", features: "",                    no_default: "true"  }
          - { name: "auth-full",         pkg: "reinhardt-auth", features: "auth-full",           no_default: "true"  }
          - { name: "rest-minimal",      pkg: "reinhardt-rest", features: "",                    no_default: "true"  }
          - { name: "rest-full",         pkg: "reinhardt-rest", features: "rest-full",           no_default: "true"  }
    steps:
      - name: Free Disk Space (Ubuntu)
        if: ${{ !contains(inputs.runner || '', 'self-hosted') }}
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          cache-key: "feature-${{ matrix.combo.name }}"

      - name: Setup protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "28.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run feature check (${{ matrix.combo.name }})
        env:
          # All values are workflow-defined constants from matrix (not user input).
          PKG: ${{ matrix.combo.pkg }}
          FEATURES: ${{ matrix.combo.features }}
          NO_DEFAULT: ${{ matrix.combo.no_default }}
        run: |
          FLAGS="-p ${PKG}"
          if [ "${NO_DEFAULT}" = "true" ]; then
            FLAGS="${FLAGS} --no-default-features"
          fi
          if [ -n "${FEATURES}" ]; then
            FLAGS="${FLAGS} -F ${FEATURES}"
          fi
          cargo check ${FLAGS} --quiet
