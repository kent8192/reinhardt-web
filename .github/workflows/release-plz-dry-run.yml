name: Release Dry-Run

on:
  workflow_call:
    inputs:
      runner:
        description: 'Runner label JSON'
        type: string
        default: '"ubuntu-latest"'
      cargo-build-jobs:
        description: "Parallel cargo build jobs"
        type: string
        default: "1"

env:
  # Workaround for arduino/setup-protoc#112, cloudflare/wrangler-action#413,
  # hashicorp/setup-packer#162 (tracked in reinhardt-web#4125). Remove this
  # once all three upstreams ship node24 releases.
  #
  # Ideal implementation (without workaround):
  #   (no env override; let runner default kick in)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release-dry-run:
    name: Release Dry-Run Check
    runs-on: ${{ fromJSON(inputs.runner || '"ubuntu-latest"') }}
    timeout-minutes: 360
    steps:
      - name: Free Disk Space
        if: ${{ !contains(inputs.runner || '', 'self-hosted') }}
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup branch tracking for release-plz
        run: |
          git checkout -B dry-run-check
          git branch --set-upstream-to=origin/main dry-run-check

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Setup protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "28.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install GitHub CLI (required by release-plz action)
        if: ${{ contains(inputs.runner || '', 'self-hosted') }}
        run: |
          if ! command -v gh &>/dev/null; then
            curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg \
              | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
            sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
            echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" \
              | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
            sudo -E apt-get -o DPkg::Lock::Timeout=120 update -qq
            sudo -E apt-get -o DPkg::Lock::Timeout=120 install -y gh
          fi

      - name: Install release-plz
        uses: taiki-e/install-action@ec28e287910af896fd98e04056d31fa68607e7ad
        with:
          tool: release-plz

      - name: Run release-plz release (dry-run)
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          log="$RUNNER_TEMP/release-plz-dry-run.log"
          release-plz release \
            --dry-run \
            --no-verify \
            --git-token "$GITHUB_TOKEN" \
            --repo-url "https://github.com/${GITHUB_REPOSITORY}" \
            >"$log" 2>&1
          status=$?
          cat "$log"

          if [[ $status -eq 0 ]]; then
            exit 0
          fi

          # Workaround for release-plz/release-plz#2878 (tracked in reinhardt-web#5089).
          # In dry-run mode, release-plz skips uploading a same-release workspace
          # dependency, so the next dependent crate can fail registry resolution
          # even though a real release would publish the dependency first.
          # Remove this workaround when release-plz can simulate same-release
          # workspace dependencies during `release --dry-run`.
          #
          # Ideal implementation (without workaround):
          #   release-plz release --dry-run --no-verify --git-token "$GITHUB_TOKEN"
          declare -A dry_skipped_crates=()
          while IFS= read -r line; do
            if [[ "$line" =~ ^(reinhardt-[A-Za-z0-9_-]+)[[:space:]]+([^:[:space:]]+):[[:space:]]+due[[:space:]]+to[[:space:]]+dry,[[:space:]]+skipping ]]; then
              dry_skipped_crates["${BASH_REMATCH[1]}=${BASH_REMATCH[2]}"]=1
            fi
          done < "$log"

          known_same_release_dependency_failure=false
          while IFS= read -r requirement; do
            if [[ "$requirement" =~ ^(reinhardt-[A-Za-z0-9_-]+)[[:space:]]*=[[:space:]]*\"\^?([^\"]+)\"$ ]] \
              && [[ -n "${dry_skipped_crates["${BASH_REMATCH[1]}=${BASH_REMATCH[2]}"]+set}" ]]
            then
              known_same_release_dependency_failure=true
              echo "::warning::release-plz dry-run skipped ${BASH_REMATCH[1]} ${BASH_REMATCH[2]} and later failed to resolve that same-release workspace dependency."
              break
            fi
          done < <(sed -nE "s/.*failed to select a version for the requirement \`([^\`]+)\`.*/\\1/p" "$log")

          if [[ "$known_same_release_dependency_failure" == "true" ]]; then
            echo "::warning::Ignoring known release-plz dry-run same-release dependency false positive (release-plz/release-plz#2878, reinhardt-web#5089)."
            exit 0
          fi

          exit "$status"
