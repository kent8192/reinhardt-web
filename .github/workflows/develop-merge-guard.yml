name: Develop Merge Guard

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    branches: [main]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: >-
    ${{ github.workflow }}-${{ github.head_ref || github.run_id }}-${{
    contains(fromJSON('["labeled","unlabeled"]'), github.event.action) &&
    github.event.label.name != 'migration-approved' &&
    github.event.label.name || 'default' }}
  cancel-in-progress: true

jobs:
  develop-merge-guard:
    name: Develop Merge Guard
    timeout-minutes: 360
    if: >-
      github.event.action != 'labeled' && github.event.action != 'unlabeled' ||
      github.event.label.name == 'migration-approved'
    runs-on: ubuntu-latest
    steps:
      - name: Check if guard applies
        id: guard-scope
        env:
          BRANCH: ${{ github.head_ref }}
        run: |
          if [[ "$BRANCH" == develop/* ]]; then
            echo "applies=true" >> "$GITHUB_OUTPUT"
          else
            echo "applies=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check migration-approved label
        if: steps.guard-scope.outputs.applies == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });
            const labels = pr.labels.map(l => l.name);
            if (!labels.includes('migration-approved')) {
              core.setFailed(
                "PR from develop/* branch requires the 'migration-approved' label.\n" +
                "This label should only be applied when a version transition " +
                "(e.g., 0.1.x -> 0.2.0) is intentional and approved by maintainers."
              );
            }

      - name: Validate version transition
        if: steps.guard-scope.outputs.applies == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const branch = context.payload.pull_request.head.ref;
            const branchMatch = branch.match(/^develop\/(\d+)\.(\d+)\.(\d+)$/);
            if (!branchMatch) {
              core.setFailed(`Branch '${branch}' does not match 'develop/X.Y.Z'.`);
              return;
            }
            const devMajor = parseInt(branchMatch[1], 10);
            const devMinor = parseInt(branchMatch[2], 10);
            const devPatch = parseInt(branchMatch[3], 10);

            // Fetch Cargo.toml from main branch (no checkout needed)
            const { data: file } = await github.rest.repos.getContent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              path: 'Cargo.toml',
              ref: 'main',
            });
            const content = Buffer.from(file.content, 'base64').toString('utf-8');
            const versionMatch = content.match(
              /\[package\][\s\S]*?version\s*=\s*"([^"]+)"/
            );
            if (!versionMatch) {
              core.setFailed('Could not parse version from main Cargo.toml');
              return;
            }
            const mainVersion = versionMatch[1];
            const mainMatch = mainVersion.match(/^(\d+)\.(\d+)\.(\d+)/);
            if (!mainMatch) {
              core.setFailed(`Cannot parse semver: ${mainVersion}`);
              return;
            }
            const mainMajor = parseInt(mainMatch[1], 10);
            const mainMinor = parseInt(mainMatch[2], 10);

            if (devMajor !== mainMajor) {
              core.setFailed(
                `Major version mismatch. Main: ${mainMajor}, Develop: ${devMajor}.`
              );
              return;
            }
            if (devMinor !== mainMinor + 1) {
              core.setFailed(
                `Invalid transition. Expected minor ${mainMinor + 1} ` +
                `(main is ${mainVersion}), got ${devMinor}.`
              );
              return;
            }
            if (devPatch !== 0) {
              core.setFailed(
                `Develop patch must be 0, got ${devPatch}.`
              );
              return;
            }
            core.info(`Version transition OK: ${mainVersion} -> ${devMajor}.${devMinor}.0`);
