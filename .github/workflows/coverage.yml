    steps:
      - name: Free Disk Space (Ubuntu)
        if: ${{ !contains(inputs.runner, 'self-hosted') }}
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Login to Docker Hub
        uses: ./.github/actions/docker-login
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          token: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Setup protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "28.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install mold linker and build dependencies
        run: |
          sudo systemctl stop unattended-upgrades || true
          sudo apt-get update -o DPkg::Lock::Timeout=120
          sudo apt-get install -y -o DPkg::Lock::Timeout=120 mold clang lld build-essential
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*

      - name: Install cargo-make
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-make

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Pull Docker images
        uses: ./.github/actions/pull-docker-images
        with:
          images-file: .github/docker-images-cross-crate.txt

      - name: Additional disk cleanup before tests
        if: ${{ !contains(inputs.runner, 'self-hosted') }}
        run: |
          echo "Disk usage before additional cleanup:"
          df -h
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/* || true
          # Use -f (not -af) to preserve pre-pulled Docker images
          docker system prune -f --volumes || true
          docker builder prune -af || true
          rm -rf ~/.cache/pip || true
          rm -rf ~/.npm || true
          rm -rf ~/.cache/yarn || true
          rm -rf ~/.gradle || true
          rm -rf ~/.m2 || true
          rm -rf ~/.cargo/registry/cache || true
          rm -rf ~/.cargo/git/db || true
          echo "Disk usage after additional cleanup:"
          df -h

      - name: Configure mold linker for coverage
        run: |
          cat > /tmp/clang-mold-wrapper << 'WRAPPER'
          #!/bin/sh
          exec clang -fuse-ld=mold "$@"
          WRAPPER
          chmod +x /tmp/clang-mold-wrapper
          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ]; then
            ENV_KEY="CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER"
          elif [ "$ARCH" = "x86_64" ]; then
            ENV_KEY="CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER"
          else
            echo "Unsupported architecture for mold linker configuration: $ARCH" >&2
            exit 1
          fi
          echo "${ENV_KEY}=/tmp/clang-mold-wrapper" >> "$GITHUB_ENV"

      - name: Clean coverage artifacts
        run: |
          cargo llvm-cov clean --workspace
          rm -rf "${CARGO_TARGET_DIR}/llvm-cov-target"

      - name: Run cross-crate integration tests with coverage
        env:
          NEXTEST_FILTER_EXPR: ${{ inputs.nextest-filter }}
          RUN_ALL: ${{ inputs.run-all }}
        run: |
          FILTER_ARGS=()
          if [[ "$RUN_ALL" != "true" && -n "$NEXTEST_FILTER_EXPR" ]]; then
            FILTER_ARGS+=(-E "$NEXTEST_FILTER_EXPR")
          fi
          set +e
          cargo llvm-cov nextest \
            --no-report \
            --package reinhardt-integration-tests \
            --all-features \
            --no-fail-fast \
            "${FILTER_ARGS[@]}"
          EXIT_CODE=$?
          set -e
          if [[ $EXIT_CODE -eq 4 ]]; then
            echo "::notice::No tests matched the filter — treating as success"
            exit 0
          elif [[ $EXIT_CODE -ne 0 ]]; then
            exit $EXIT_CODE
          fi

      - name: Generate cross-crate coverage report
        run: |
          cargo llvm-cov report \
            --codecov \
            --output-path /tmp/cross-crate-codecov.json

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: /tmp/cross-crate-codecov.json
          flags: cross-crate-integration
          fail_ci_if_error: false
