name: UI Tests (Trybuild)

on:
  workflow_call:
    inputs:
      runner:
        description: 'Runner label JSON. Use "\"ubuntu-latest\"" for GitHub-hosted or "[\"self-hosted\",\"linux\",\"arm64\",\"reinhardt-ci\"]" for self-hosted.'
        type: string
        default: '"ubuntu-latest"'
      cargo-build-jobs:
        description: "Parallel cargo build jobs (1=GitHub-hosted OOM safe, 8=self-hosted)"
        type: string
        default: "1"
      nextest-filter:
        description: "Nextest filter expression for affected packages"
        type: string
        default: ""
      run-all:
        description: "Whether to run all tests"
        type: string
        default: "true"
      partitions-json:
        description: "JSON array of partition indices for dynamic matrix. Issue #2881"
        type: string
        default: "[1,2,3,4,5,6,7,8]"
      partition-count:
        description: "Total partition count for nextest --partition. Issue #2881"
        type: string
        default: "8"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_TARGET_DIR: /tmp/cargo_target
  CARGO_INCREMENTAL: 0
  CARGO_BUILD_JOBS: ${{ inputs.cargo-build-jobs || '1' }}
  CARGO_PROFILE_DEV_DEBUG: 0
  CARGO_PROFILE_TEST_DEBUG: 0
  # Workaround for arduino/setup-protoc#112, cloudflare/wrangler-action#413,
  # hashicorp/setup-packer#162 (tracked in reinhardt-web#4125). Remove this
  # once all three upstreams ship node24 releases.
  #
  # Ideal implementation (without workaround):
  #   (no env override; let runner default kick in)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  ui-test:
    name: UI Tests (${{ matrix.partition }}/${{ inputs.partition-count || '8' }})
    runs-on: ${{ fromJSON(inputs.runner) }}
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        partition: ${{ fromJSON(inputs.partitions-json || '[1,2,3,4,5,6,7,8]') }}
    steps:
      - name: Free Disk Space (Ubuntu)
        if: ${{ !contains(inputs.runner, 'self-hosted') }}
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Login to Docker Hub
        uses: ./.github/actions/docker-login
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          token: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Setup protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "28.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install mold linker and build dependencies
        run: |
          sudo systemctl stop unattended-upgrades || true
          sudo apt-get update -o DPkg::Lock::Timeout=120
          sudo apt-get install -y -o DPkg::Lock::Timeout=120 mold clang lld build-essential
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*

      - name: Install cargo-make
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-make

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - name: Additional disk cleanup before tests
        if: ${{ !contains(inputs.runner, 'self-hosted') }}
        run: |
          echo "Disk usage before additional cleanup:"
          df -h
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/* || true
          docker system prune -af --volumes || true
          docker builder prune -af || true
          rm -rf ~/.cache/pip || true
          rm -rf ~/.npm || true
          rm -rf ~/.cache/yarn || true
          rm -rf ~/.gradle || true
          rm -rf ~/.m2 || true
          # Cargo registry and git db cleanup
          rm -rf ~/.cargo/registry/cache || true
          rm -rf ~/.cargo/git/db || true
          echo "Disk usage after additional cleanup:"
          df -h

      - name: Run UI tests (partition ${{ matrix.partition }}/${{ inputs.partition-count || '8' }})
        env:
          RUSTFLAGS: "-C linker=clang -C link-arg=-fuse-ld=mold"
          NEXTEST_FILTER_EXPR: ${{ inputs.nextest-filter }}
          RUN_ALL: ${{ inputs.run-all }}
          PARTITION_COUNT: ${{ inputs.partition-count || '8' }}
        run: |
          if [[ "$RUN_ALL" != "true" && -n "$NEXTEST_FILTER_EXPR" ]]; then
            FILTER_EXPR="binary(/ui/) & ($NEXTEST_FILTER_EXPR)"
          else
            FILTER_EXPR="binary(/ui/)"
          fi
          cargo nextest run \
            --profile ui-test \
            --workspace \
            -E "$FILTER_EXPR" \
            --partition hash:${{ matrix.partition }}/$PARTITION_COUNT \
            --no-fail-fast \
            --no-tests=warn \
            --status-level=none \
            --final-status-level=none

      - name: Docker cleanup after UI tests
        if: always()
        run: docker system prune -af
