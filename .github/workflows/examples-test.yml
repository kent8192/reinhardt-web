name: Examples Tests

on:
  workflow_call:
    inputs:
      runner:
        description: 'Runner label JSON. Use "\"ubuntu-latest\"" for GitHub-hosted or "[\"self-hosted\",\"linux\",\"arm64\",\"reinhardt-ci\"]" for self-hosted.'
        type: string
        default: '"ubuntu-latest"'
      cargo-build-jobs:
        description: "Parallel cargo build jobs (1=GitHub-hosted OOM safe, 8=self-hosted)"
        type: string
        default: "1"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_DEV_DEBUG: 0
  CARGO_PROFILE_TEST_DEBUG: 0
  CARGO_BUILD_JOBS: ${{ inputs.cargo-build-jobs || '1' }}
  # Workaround for arduino/setup-protoc#112, cloudflare/wrangler-action#413,
  # hashicorp/setup-packer#162 (tracked in reinhardt-web#4125). Remove this
  # once all three upstreams ship node24 releases.
  #
  # Ideal implementation (without workaround):
  #   (no env override; let runner default kick in)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test-example:
    name: ${{ matrix.example }}
    runs-on: ${{ fromJSON(inputs.runner) }}
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        include:
          - example: examples-tutorial-basis
            needs-docker: false
            needs-wasm: true
          - example: examples-tutorial-rest
            needs-docker: true
            needs-wasm: false

    steps:
      - name: Free Disk Space (Ubuntu)
        if: ${{ matrix.needs-docker && !contains(inputs.runner, 'self-hosted') }}
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Login to Docker Hub
        if: ${{ matrix.needs-docker }}
        uses: ./.github/actions/docker-login
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          token: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.91.1
        with:
          components: rustfmt, clippy

      - name: Setup protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "28.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # Scope the cargo registry, cargo git, and target directories per-example
      # via Swatinem/rust-cache@v2's `workspaces` parameter (Issue #4537). This
      # replaces three separate actions/cache@v5 entries whose registry/git keys
      # were global (causing multi-example runs to thrash a shared cache as
      # different examples pulled different transitive deps) while the target
      # key was per-example. The unified per-example cache aligns with
      # reinhardt-feature-check.yml / coverage.yml and reuses rust-cache's
      # battle-tested key derivation and cache-hit logic.
      - name: Cache Rust dependencies (per-example)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: examples/${{ matrix.example }}
          shared-key: "examples-${{ matrix.example }}"
          cache-on-failure: "true"

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Install cargo-make
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-make

      - name: Install reinhardt-admin
        run: cargo install --path crates/reinhardt-admin-cli

      - name: Install reinhardt-formatter
        run: cargo install --path crates/reinhardt-formatter

      - name: Setup local development config
        run: cp examples/.cargo/config.local.toml examples/.cargo/config.toml

      - name: Pull Docker images
        if: ${{ matrix.needs-docker }}
        uses: ./.github/actions/pull-docker-images
        with:
          images-file: .github/docker-images-examples.txt

      - name: Check Format
        working-directory: examples/${{ matrix.example }}
        run: cargo make fmt-check

      - name: Clippy
        working-directory: examples/${{ matrix.example }}
        run: cargo make clippy-check

      - name: Build
        working-directory: examples/${{ matrix.example }}
        run: cargo build --all-features

      - name: Install wasm32 target
        if: ${{ matrix.needs-wasm }}
        run: rustup target add wasm32-unknown-unknown

      - name: Check WASM compilation (framework crates)
        if: ${{ matrix.needs-wasm }}
        run: cargo check --target wasm32-unknown-unknown -p reinhardt-core -p reinhardt-urls --features reinhardt-core/full,reinhardt-urls/client-router

      - name: Check WASM compilation (example library)
        if: ${{ matrix.needs-wasm }}
        working-directory: examples/${{ matrix.example }}
        run: cargo check --target wasm32-unknown-unknown --lib

      # browser-actions/setup-chrome@v2 does not support linux/arm64, so the
      # headless-browser WASM steps are skipped on self-hosted (arm64) runners
      # (release-plz-* branches are routed there by determine-runner.yml). The
      # wasm32-unknown-unknown compilation check above still runs on arm64;
      # browser WASM coverage is provided on GitHub-hosted x86_64 via
      # wasm-check.yml (forced to x86_64 by #3492). Tracked in #5012.
      - name: Install Chrome
        if: ${{ matrix.needs-wasm && !contains(inputs.runner, 'self-hosted') }}
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: stable
          install-chromedriver: true

      - name: Install wasm-pack
        if: ${{ matrix.needs-wasm && !contains(inputs.runner, 'self-hosted') }}
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack

      - name: Run WASM tests
        if: ${{ matrix.needs-wasm && !contains(inputs.runner, 'self-hosted') }}
        working-directory: examples/${{ matrix.example }}
        run: cargo make wasm-test || echo "No WASM tests found, skipping"

      - name: Test
        working-directory: examples/${{ matrix.example }}
        run: cargo nextest run --all-features --no-tests=warn

      - name: Doc Test
        working-directory: examples/${{ matrix.example }}
        run: cargo test --doc --all-features

      - name: Cleanup local config
        if: always()
        run: rm -f examples/.cargo/config.toml

      - name: Docker cleanup
        if: ${{ always() && matrix.needs-docker }}
        run: docker system prune -af
