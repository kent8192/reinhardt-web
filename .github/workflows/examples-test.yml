name: Examples Tests

on:
  workflow_call:
    inputs:
      runner:
        description: 'Runner label JSON. Use "\"ubuntu-latest\"" for GitHub-hosted or "[\"self-hosted\",\"linux\",\"arm64\",\"reinhardt-ci\"]" for self-hosted.'
        type: string
        default: '"ubuntu-latest"'
      cargo-build-jobs:
        description: "Parallel cargo build jobs (1=GitHub-hosted OOM safe, 8=self-hosted)"
        type: string
        default: "1"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_DEV_DEBUG: 0
  CARGO_PROFILE_TEST_DEBUG: 0
  CARGO_BUILD_JOBS: ${{ inputs.cargo-build-jobs || '1' }}

jobs:
  test-example:
    name: ${{ matrix.example }}
    runs-on: ${{ fromJSON(inputs.runner) }}
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        include:
          - example: examples-hello-world
            needs-docker: false
            needs-wasm: false
          - example: examples-rest-api
            needs-docker: true
            needs-wasm: false
          - example: examples-database-integration
            needs-docker: true
            needs-wasm: false
          - example: examples-tutorial-basis
            needs-docker: false
            needs-wasm: true
          - example: examples-tutorial-rest
            needs-docker: true
            needs-wasm: false
          - example: examples-github-issues
            needs-docker: true
            needs-wasm: false
          - example: examples-twitter
            needs-docker: true
            needs-wasm: true
          - example: examples-di-showcase
            needs-docker: false
            needs-wasm: false

    steps:
      - name: Free Disk Space (Ubuntu)
        if: ${{ matrix.needs-docker && !contains(inputs.runner, 'self-hosted') }}
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Login to Docker Hub
        if: ${{ matrix.needs-docker }}
        uses: ./.github/actions/docker-login
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          token: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.91.1
        with:
          components: rustfmt, clippy

      - name: Setup protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "28.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Cargo Registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache Cargo Git
        uses: actions/cache@v5
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache Target
        uses: actions/cache@v5
        with:
          path: examples/${{ matrix.example }}/target
          key: ${{ runner.os }}-target-${{ matrix.example }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Install cargo-make
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-make

      - name: Install reinhardt-admin
        run: cargo install --path crates/reinhardt-admin-cli

      - name: Setup local development config
        run: cp examples/.cargo/config.local.toml examples/.cargo/config.toml

      - name: Pull Docker images
        if: ${{ matrix.needs-docker }}
        uses: ./.github/actions/pull-docker-images
        with:
          images-file: .github/docker-images-examples.txt

      - name: Check Format
        working-directory: examples/${{ matrix.example }}
        run: cargo make fmt-check

      - name: Clippy
        working-directory: examples/${{ matrix.example }}
        run: cargo make clippy-check

      - name: Build
        working-directory: examples/${{ matrix.example }}
        run: cargo build --all-features

      - name: Install wasm32 target
        if: ${{ matrix.needs-wasm }}
        run: rustup target add wasm32-unknown-unknown

      - name: Check WASM compilation (framework crates)
        if: ${{ matrix.needs-wasm }}
        run: cargo check --target wasm32-unknown-unknown -p reinhardt-core -p reinhardt-urls --features reinhardt-core/full,reinhardt-urls/client-router

      - name: Install Chrome
        if: ${{ matrix.needs-wasm }}
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install wasm-pack
        if: ${{ matrix.needs-wasm }}
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack

      - name: Run WASM tests
        if: ${{ matrix.needs-wasm }}
        working-directory: examples/${{ matrix.example }}
        run: cargo make wasm-test || echo "No WASM tests found, skipping"

      - name: Test
        working-directory: examples/${{ matrix.example }}
        run: cargo nextest run --all-features --no-tests=warn

      - name: Doc Test
        working-directory: examples/${{ matrix.example }}
        run: cargo test --doc --all-features

      - name: Cleanup local config
        if: always()
        run: rm -f examples/.cargo/config.toml

      - name: Docker cleanup
        if: ${{ always() && matrix.needs-docker }}
        run: docker system prune -af
