name: SemVer Check

on:
  workflow_call:
    inputs:
      runner:
        description: 'Runner label JSON'
        type: string
        default: '"ubuntu-latest"'
      cargo-build-jobs:
        description: "Parallel cargo build jobs"
        type: string
        default: "1"
      has-breaking-change-label:
        description: "Whether the PR has the breaking-change label (SP-3 approved breaking change)"
        type: string
        default: 'false'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_BUILD_JOBS: ${{ inputs.cargo-build-jobs || '1' }}
  # Workaround for arduino/setup-protoc#112, cloudflare/wrangler-action#413,
  # hashicorp/setup-packer#162 (tracked in reinhardt-web#4125). Remove this
  # once all three upstreams ship node24 releases.
  #
  # Ideal implementation (without workaround):
  #   (no env override; let runner default kick in)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  semver-checks:
    name: SemVer Compatibility Check
    runs-on: ${{ fromJSON(inputs.runner || '"ubuntu-latest"') }}
    timeout-minutes: 360
    steps:
      - name: Free Disk Space (Ubuntu)
        if: ${{ !contains(inputs.runner || '', 'self-hosted') }}
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # fetch-depth: 0 is required for --baseline-rev to access the full git history.
          # cargo-semver-checks needs to checkout and build the baseline commit, which
          # is not possible with a shallow clone (fetch-depth: 1, the default).
          fetch-depth: 0

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Setup protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "28.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cargo-semver-checks
        run: |
          VERSION="v0.47.0"
          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ]; then
            TARGET="aarch64-unknown-linux-musl"
            EXPECTED_SHA256="ba8efb38ec41cbbd88c5972d5ac62a4478493fe37e79390b94fd1196ce8fbd52"
          else
            TARGET="x86_64-unknown-linux-musl"
            EXPECTED_SHA256="daea6dfdebf9b15ce902a8af2fc6b9c2e86ddd49af17a9c5a656939289588f68"
          fi
          curl -fsSL -o /tmp/cargo-semver-checks.tar.gz \
            "https://github.com/obi1kenobi/cargo-semver-checks/releases/download/${VERSION}/cargo-semver-checks-${TARGET}.tar.gz"
          ACTUAL_SHA256=$(sha256sum /tmp/cargo-semver-checks.tar.gz | awk '{print $1}')
          if [ "$ACTUAL_SHA256" != "$EXPECTED_SHA256" ]; then
            echo "::error::SHA256 mismatch for cargo-semver-checks ${VERSION} (${TARGET})"
            echo "  Expected: ${EXPECTED_SHA256}"
            echo "  Actual:   ${ACTUAL_SHA256}"
            exit 1
          fi
          mkdir -p /tmp/csc
          tar xzf /tmp/cargo-semver-checks.tar.gz -C /tmp/csc/
          mv /tmp/csc/cargo-semver-checks ~/.cargo/bin/
          rm -rf /tmp/csc /tmp/cargo-semver-checks.tar.gz

      # On release-plz Release PRs, run the full semver-check using version numbers
      # from Cargo.toml to validate the complete release (major/minor/patch).
      # release-plz bumps versions in Cargo.toml, so cargo-semver-checks can auto-detect
      # the intended release type and verify compliance.
      - name: Run cargo-semver-checks (release PR - full version check)
        if: ${{ startsWith(github.head_ref || github.ref_name, 'release-plz-') }}
        env:
          # Use the PR base branch SHA as the baseline since crates are not yet published
          # to crates.io. This compares SemVer compatibility against the main branch state.
          # github.event.pull_request.base.sha is a git commit SHA (hex string), safe to use.
          BASELINE_REV: ${{ github.event.pull_request.base.sha }}
        run: |
          cargo semver-checks check-release \
            --workspace \
            --exclude reinhardt-web \
            --exclude reinhardt-pages \
            --all-features \
            --baseline-rev "${BASELINE_REV:-HEAD~1}"

      # Detect pre-release phase to determine the appropriate semver-check behavior:
      # - Alpha (0.x.y-alpha.N): No API stability guarantees → skip semver-check
      # - RC (0.x.y-rc.N): No breaking changes permitted, approved additions allowed → enforce semver-check
      # - Stable (0.x.y): Full SemVer guarantees → enforce semver-check
      - name: Detect pre-release phase
        if: ${{ !startsWith(github.head_ref || github.ref_name, 'release-plz-') }}
        id: detect-prerelease
        run: |
          if grep -rqP '^version\s*=\s*"[^"]*-alpha' crates/*/Cargo.toml; then
            echo "phase=alpha" >> "$GITHUB_OUTPUT"
            echo "::notice::Alpha version detected. Skipping semver-check (no API stability guarantee during alpha)."
          elif grep -rqP '^version\s*=\s*"[^"]*-rc' crates/*/Cargo.toml; then
            echo "phase=rc" >> "$GITHUB_OUTPUT"
            echo "::notice::RC version detected. Enforcing semver-check (no breaking changes permitted during RC phase)."
          else
            echo "phase=stable" >> "$GITHUB_OUTPUT"
            echo "::notice::Stable version detected. Enforcing semver-check (full SemVer guarantees)."
          fi

      # On normal PRs with RC versions, enforce minor release type to block breaking
      # changes. Per stability policy (SP-1), the API surface is frozen during RC --
      # only bug fixes and deprecation-alias renames are permitted.
      # Exception: PRs with the 'breaking-change' label have SP-3 approved breaking
      # changes and use --release-type major to allow them through while still
      # validating SemVer correctness.
      - name: Run cargo-semver-checks (normal PR - RC versions)
        if: ${{ !startsWith(github.head_ref || github.ref_name, 'release-plz-') && steps.detect-prerelease.outputs.phase == 'rc' }}
        env:
          BASELINE_REV: ${{ github.event.pull_request.base.sha }}
          HAS_BREAKING_CHANGE: ${{ inputs.has-breaking-change-label }}
        run: |
          if [ "$HAS_BREAKING_CHANGE" = "true" ]; then
            echo "::notice::SP-3 approved breaking change detected (breaking-change label). Using --release-type major."
            RELEASE_TYPE="major"
          else
            RELEASE_TYPE="minor"
          fi
          cargo semver-checks check-release \
            --workspace \
            --exclude reinhardt-web \
            --exclude reinhardt-pages \
            --all-features \
            --release-type "$RELEASE_TYPE" \
            --baseline-rev "${BASELINE_REV:-HEAD~1}"

      # On normal PRs with stable versions, enforce minor release type to block
      # breaking changes from being merged into main.
      - name: Run cargo-semver-checks (normal PR - stable versions)
        if: ${{ !startsWith(github.head_ref || github.ref_name, 'release-plz-') && steps.detect-prerelease.outputs.phase == 'stable' }}
        env:
          BASELINE_REV: ${{ github.event.pull_request.base.sha }}
        run: |
          cargo semver-checks check-release \
            --workspace \
            --exclude reinhardt-web \
            --exclude reinhardt-pages \
            --all-features \
            --release-type minor \
            --baseline-rev "${BASELINE_REV:-HEAD~1}"

      # --- Public API Diff PR Comment ---
      # Posts a human-readable public API diff as a PR comment.
      # Uses if: always() to run even when semver-check steps are skipped
      # (alpha phase) or fail.

      - name: Install nightly toolchain for cargo-public-api
        if: always()
        run: rustup install nightly --profile minimal

      - name: Install cargo-binstall
        if: always()
        run: curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash

      - name: Install cargo-public-api
        if: always()
        continue-on-error: true
        id: install-public-api
        run: cargo binstall cargo-public-api@0.51.0 --no-confirm --locked

      - name: Post public API diff comment
        if: >-
          always() &&
          steps.install-public-api.outcome == 'success' &&
          github.event_name == 'pull_request'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          BASELINE_REV: ${{ github.event.pull_request.base.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          CRATES=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[]
              | select(.targets[] | .kind[] == "lib")
              | select(.name != "reinhardt-web" and .name != "reinhardt-pages")
              | .name')

          BODY_FILE=$(mktemp)
          HAS_CHANGES=false
          MARKER="<!-- public-api-diff -->"

          for crate in $CRATES; do
            echo "::group::Public API diff for $crate"
            if ! DIFF_OUTPUT=$(cargo +nightly public-api diff "${BASELINE_REV}..HEAD" \
              --package "$crate" --all-features -sss 2>&1); then
              echo "::warning::Failed to generate API diff for $crate"
              HAS_CHANGES=true
              printf '<details>\n<summary><code>%s</code> — ⚠️ build failed</summary>\n\n```\n%s\n```\n\n</details>\n\n' \
                "$crate" "$DIFF_OUTPUT" >> "$BODY_FILE"
              echo "::endgroup::"
              continue
            fi
            echo "::endgroup::"

            if [ -z "$DIFF_OUTPUT" ]; then
              continue
            fi

            HAS_CHANGES=true
            ADDED=$(echo "$DIFF_OUTPUT" | grep -c '^+' || true)
            REMOVED=$(echo "$DIFF_OUTPUT" | grep -c '^-' || true)
            CHANGED=$(echo "$DIFF_OUTPUT" | grep -c '^~' || true)
            SUMMARY_PARTS=""
            [ "$ADDED" -gt 0 ] && SUMMARY_PARTS="${ADDED} added"
            [ "$REMOVED" -gt 0 ] && SUMMARY_PARTS="${SUMMARY_PARTS:+${SUMMARY_PARTS}, }${REMOVED} removed"
            [ "$CHANGED" -gt 0 ] && SUMMARY_PARTS="${SUMMARY_PARTS:+${SUMMARY_PARTS}, }${CHANGED} changed"

            printf '<details>\n<summary><code>%s</code> — %s</summary>\n\n```\n%s\n```\n\n</details>\n\n' \
              "$crate" "$SUMMARY_PARTS" "$DIFF_OUTPUT" >> "$BODY_FILE"
          done

          if [ "$HAS_CHANGES" = "false" ]; then
            echo "No public API changes detected. Skipping comment."
            rm -f "$BODY_FILE"
            exit 0
          fi

          FULL_BODY_FILE=$(mktemp)
          {
            echo "$MARKER"
            echo "## Public API Changes"
            echo ""
            cat "$BODY_FILE"
            echo "---"
            echo '*Generated by cargo-public-api • `-sss` (simplified)*'
          } > "$FULL_BODY_FILE"
          rm -f "$BODY_FILE"

          EXISTING_ID=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --paginate --jq ".[] | select(.body | startswith(\"${MARKER}\")) | .node_id" \
            | head -1)

          if [ -n "$EXISTING_ID" ]; then
            gh api graphql \
              -f id="$EXISTING_ID" \
              -F "body=@${FULL_BODY_FILE}" \
              -f query='
                mutation($id: ID!, $body: String!) {
                  updateIssueComment(input: {id: $id, body: $body}) {
                    issueComment { id }
                  }
                }'
            echo "Updated existing public API diff comment."
          else
            gh pr comment "$PR_NUMBER" --body-file "$FULL_BODY_FILE"
            echo "Created new public API diff comment."
          fi
          rm -f "$FULL_BODY_FILE"
