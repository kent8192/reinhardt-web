name: Cancel Stale PR Runs Sweep

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

concurrency:
  group: "${{ github.workflow }}"
  cancel-in-progress: true

permissions:
  actions: write
  contents: read
  pull-requests: read

jobs:
  sweep-stale-runs:
    name: Sweep Stale PR Workflow Runs
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Cancel and force-cancel stale runs
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const targetWorkflows = [
              'ci.yml',
              'examples-test.yml',
              'examples-test-standalone.yml',
              'semver-check.yml',
              'semver-check-standalone.yml',
            ];
            const activeStatuses = ['queued', 'in_progress', 'waiting', 'requested'];

            const prCache = new Map();
            const branchPrCache = new Map();
            const staleRuns = new Map();
            const cancelledRunIds = [];

            async function getPullRequest(number) {
              if (prCache.has(number)) {
                return prCache.get(number);
              }

              try {
                const { data: pr } = await github.rest.pulls.get({
                  owner,
                  repo,
                  pull_number: number,
                });
                prCache.set(number, pr);
                return pr;
              } catch (e) {
                core.warning(`Could not inspect PR #${number}: ${e.message}`);
                prCache.set(number, null);
                return null;
              }
            }

            async function listPullRequestsForBranch(run) {
              const headBranch = run.head_branch;
              const headRepo = run.head_repository?.full_name || `${owner}/${repo}`;
              const headOwner = run.head_repository?.owner?.login || headRepo.split('/')[0] || owner;

              if (!headBranch || !headOwner) {
                return [];
              }

              const cacheKey = `${headOwner}:${headBranch}`;
              if (!branchPrCache.has(cacheKey)) {
                const prs = await github.paginate(github.rest.pulls.list, {
                  owner,
                  repo,
                  state: 'all',
                  head: cacheKey,
                  sort: 'updated',
                  direction: 'desc',
                  per_page: 100,
                });
                branchPrCache.set(cacheKey, prs);
              }

              return branchPrCache.get(cacheKey).filter(pr =>
                pr.head?.ref === headBranch &&
                pr.head?.repo?.full_name === headRepo
              );
            }

            async function findClosedPullRequestForRun(run) {
              if (Array.isArray(run.pull_requests) && run.pull_requests.length > 0) {
                const prs = [];
                for (const prRef of run.pull_requests) {
                  const pr = await getPullRequest(prRef.number);
                  if (pr) {
                    prs.push(pr);
                  }
                }

                if (prs.some(pr => pr.state !== 'closed')) {
                  return null;
                }

                const closedPrs = prs.filter(pr => pr.state === 'closed');
                if (closedPrs.length === 1) {
                  return closedPrs[0];
                }

                if (closedPrs.length > 1) {
                  core.warning(`Could not uniquely match run #${run.id} to a closed PR`);
                }
                return null;
              }

              const candidates = await listPullRequestsForBranch(run);
              const exactShaMatches = candidates.filter(pr => pr.head?.sha === run.head_sha);
              const candidatesToCheck = exactShaMatches.length > 0 ? exactShaMatches : candidates;

              if (candidatesToCheck.some(pr => pr.state !== 'closed')) {
                return null;
              }

              const closedCandidates = candidatesToCheck.filter(pr => pr.state === 'closed');
              if (closedCandidates.length === 1) {
                return closedCandidates[0];
              }

              if (closedCandidates.length > 1) {
                core.warning(`Could not uniquely match run #${run.id} on ${run.head_branch} to a closed PR`);
              }
              return null;
            }

            // Phase 1: Find and cancel active workflow runs attached to closed PRs.
            for (const wf of targetWorkflows) {
              for (const status of activeStatuses) {
                const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
                  owner,
                  repo,
                  workflow_id: wf,
                  status,
                  per_page: 100,
                });

                for (const run of runs) {
                  if (staleRuns.has(run.id)) {
                    continue;
                  }

                  const pr = await findClosedPullRequestForRun(run);
                  if (pr) {
                    staleRuns.set(run.id, {
                      id: run.id,
                      workflow: wf,
                      status: run.status,
                      prNumber: pr.number,
                      headBranch: run.head_branch,
                    });
                  }
                }
              }
            }

            for (const run of staleRuns.values()) {
              try {
                console.log(`Cancelling ${run.workflow} run #${run.id} for closed PR #${run.prNumber} on ${run.headBranch} (status: ${run.status})`);
                await github.rest.actions.cancelWorkflowRun({
                  owner,
                  repo,
                  run_id: run.id,
                });
                cancelledRunIds.push({ id: run.id, workflow: run.workflow });
              } catch (e) {
                console.log(`Failed to cancel run #${run.id}: ${e.message}`);
              }
            }

            if (cancelledRunIds.length === 0) {
              console.log('No stale runs found');
              return;
            }

            // Phase 2: Poll up to 5 minutes, then force-cancel.
            const maxWaitMs = 5 * 60 * 1000;
            const pollIntervalMs = 30 * 1000;
            const startTime = Date.now();

            while (Date.now() - startTime < maxWaitMs) {
              await new Promise(resolve => setTimeout(resolve, pollIntervalMs));

              let allDone = true;
              for (const { id } of cancelledRunIds) {
                try {
                  const { data: run } = await github.rest.actions.getWorkflowRun({
                    owner,
                    repo,
                    run_id: id,
                  });
                  if (run.status !== 'completed') {
                    allDone = false;
                    break;
                  }
                } catch (e) {
                  allDone = false;
                  core.warning(`Could not inspect cancelled run #${id}: ${e.message}`);
                  break;
                }
              }

              if (allDone) {
                console.log('All cancelled runs completed');
                return;
              }
            }

            // Phase 3: Force-cancel any remaining runs (#3543).
            let forceCancelFailed = 0;
            for (const { id, workflow } of cancelledRunIds) {
              try {
                const { data: run } = await github.rest.actions.getWorkflowRun({
                  owner,
                  repo,
                  run_id: id,
                });
                if (run.status !== 'completed') {
                  console.log(`Force-cancelling ${workflow} run #${id}`);
                  await github.request('POST /repos/{owner}/{repo}/actions/runs/{run_id}/force-cancel', {
                    owner,
                    repo,
                    run_id: id,
                  });
                }
              } catch (e) {
                forceCancelFailed++;
                core.warning(`Failed to force-cancel ${workflow} run #${id}: ${e.message}`);
              }
            }

            if (forceCancelFailed > 0) {
              core.setFailed(`${forceCancelFailed} run(s) could not be force-cancelled`);
            }
