name: Terraform Apply

on:
  push:
    branches: [main]
    paths:
      - "infra/**"

permissions:
  contents: read
  id-token: write

concurrency:
  group: terraform-apply-${{ github.ref }}
  cancel-in-progress: false

jobs:
  plan:
    name: Plan (${{ matrix.module }})
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        include:
          - module: github-runners
            dir: infra/github-runners
            backend: s3
          - module: bootstrap
            dir: infra/github-runners/bootstrap
            backend: local
          - module: website
            dir: infra/website
            backend: local
          - module: organizations
            dir: infra/organizations
            backend: local
          - module: repository
            dir: infra/repository
            backend: local

    steps:
      - uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform Init (S3 backend)
        if: matrix.backend == 's3'
        working-directory: ${{ matrix.dir }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.TF_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TF_AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.TF_AWS_REGION }}
        run: |
          if [ -z "$AWS_ACCESS_KEY_ID" ]; then
            echo "::warning::AWS credentials not configured — skipping ${{ matrix.module }}"
            echo "SKIP_MODULE=true" >> "$GITHUB_ENV"
            exit 0
          fi
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ matrix.module }}/terraform.tfstate" \
            -backend-config="region=${{ secrets.TF_AWS_REGION }}" \
            -backend-config="assume_role={role_arn=\"arn:aws:iam::${{ secrets.TF_AWS_ACCOUNT_ID }}:role/OrganizationAccountAccessRole\"}" \
            -input=false

      - name: Terraform Init (local backend)
        if: matrix.backend == 'local'
        working-directory: ${{ matrix.dir }}
        run: |
          terraform init -input=false

      - name: Download Lambda zip files
        if: env.SKIP_MODULE != 'true' && matrix.module == 'github-runners'
        working-directory: ${{ matrix.dir }}
        run: |
          MODULES_JSON=".terraform/modules/modules.json"
          if [ ! -f "$MODULES_JSON" ]; then
            echo "::warning::modules.json not found — skipping Lambda download"
            exit 0
          fi

          MODULE_VERSION=$(python3 -c "
          import json, sys
          data = json.load(open('$MODULES_JSON'))
          for m in data.get('Modules', []):
              if m.get('Key') == 'github_runner':
                  print(m['Version'])
                  sys.exit(0)
          sys.exit(1)
          " 2>/dev/null || echo "")

          if [ -z "$MODULE_VERSION" ]; then
            echo "::warning::Could not detect module version — skipping Lambda download"
            exit 0
          fi

          echo "Downloading Lambda zips for v${MODULE_VERSION}..."
          mkdir -p lambdas
          BASE_URL="https://github.com/github-aws-runners/terraform-aws-github-runner/releases/download/v${MODULE_VERSION}"
          for name in webhook runners runner-binaries-syncer; do
            curl -fsSL -o "lambdas/${name}.zip" "${BASE_URL}/${name}.zip"
            echo "  Downloaded ${name}.zip"
          done

      - name: Terraform Plan
        if: env.SKIP_MODULE != 'true'
        id: plan
        working-directory: ${{ matrix.dir }}
        env:
          # AWS credentials
          AWS_ACCESS_KEY_ID: ${{ secrets.TF_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TF_AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.TF_AWS_REGION }}
          # Provider tokens
          CLOUDFLARE_API_TOKEN: ${{ secrets.TF_CLOUDFLARE_API_TOKEN }}
          # TF_VAR_ mappings (unused vars are safely ignored by Terraform)
          TF_VAR_aws_account_id: ${{ secrets.TF_AWS_ACCOUNT_ID }}
          TF_VAR_github_app_id: ${{ secrets.TF_GITHUB_APP_ID }}
          TF_VAR_github_app_installation_id: ${{ secrets.TF_GITHUB_APP_INSTALLATION_ID }}
          TF_VAR_github_app_key_base64: ${{ secrets.TF_GITHUB_APP_KEY_BASE64 }}
          TF_VAR_github_owner: ${{ secrets.TF_GITHUB_OWNER }}
          TF_VAR_github_repository: ${{ secrets.TF_GITHUB_REPOSITORY }}
          TF_VAR_github_token: ${{ secrets.TF_GITHUB_TOKEN }}
          TF_VAR_cloudflare_api_token: ${{ secrets.TF_CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_account_id: ${{ secrets.TF_CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_budget_alert_email: ${{ secrets.TF_BUDGET_ALERT_EMAIL }}
          TF_VAR_tf_plan_aws_access_key_id: ${{ secrets.TF_AWS_ACCESS_KEY_ID }}
          TF_VAR_tf_plan_aws_secret_access_key: ${{ secrets.TF_AWS_SECRET_ACCESS_KEY }}
          TF_VAR_pages_project_name: ${{ secrets.TF_PAGES_PROJECT_NAME }}
          TF_VAR_custom_domain: ${{ secrets.TF_CUSTOM_DOMAIN }}
          TF_VAR_google_site_verification: ${{ secrets.TF_GOOGLE_SITE_VERIFICATION }}
          TF_VAR_dns_record_apex_id: ${{ secrets.TF_DNS_RECORD_APEX_ID }}
          TF_VAR_dns_record_www_id: ${{ secrets.TF_DNS_RECORD_WWW_ID }}
          TF_VAR_dns_record_google_verification_id: ${{ secrets.TF_DNS_RECORD_GOOGLE_VERIFICATION_ID }}
          TF_VAR_account_email: ${{ secrets.TF_ACCOUNT_EMAIL }}
          TF_VAR_environment_reviewer: ${{ secrets.TF_ENVIRONMENT_REVIEWER }}
        run: |
          terraform plan -no-color -input=false -out=tfplan 2>&1 | tee plan-output.txt
          echo "exitcode=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Upload plan artifact
        if: env.SKIP_MODULE != 'true' && steps.plan.outputs.exitcode == '0'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ matrix.module }}
          path: |
            ${{ matrix.dir }}/tfplan
            ${{ matrix.dir }}/.terraform
            ${{ matrix.dir }}/.terraform.lock.hcl
          retention-days: 1

  apply:
    name: Apply (${{ matrix.module }})
    needs: plan
    runs-on: ubuntu-latest
    timeout-minutes: 360
    environment: production
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - module: github-runners
            dir: infra/github-runners
            backend: s3
          - module: bootstrap
            dir: infra/github-runners/bootstrap
            backend: local
          - module: website
            dir: infra/website
            backend: local
          - module: organizations
            dir: infra/organizations
            backend: local
          - module: repository
            dir: infra/repository
            backend: local

    steps:
      - uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Download plan artifact
        id: download
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ matrix.module }}
          path: ${{ matrix.dir }}
        continue-on-error: true

      - name: Skip if no plan artifact
        if: steps.download.outcome == 'failure'
        run: |
          echo "::notice::No plan artifact for ${{ matrix.module }} — skipping apply"
          echo "SKIP_APPLY=true" >> "$GITHUB_ENV"

      - name: Terraform Init (S3 backend)
        if: env.SKIP_APPLY != 'true' && matrix.backend == 's3'
        working-directory: ${{ matrix.dir }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.TF_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TF_AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.TF_AWS_REGION }}
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ matrix.module }}/terraform.tfstate" \
            -backend-config="region=${{ secrets.TF_AWS_REGION }}" \
            -backend-config="assume_role={role_arn=\"arn:aws:iam::${{ secrets.TF_AWS_ACCOUNT_ID }}:role/OrganizationAccountAccessRole\"}" \
            -input=false

      - name: Terraform Init (local backend)
        if: env.SKIP_APPLY != 'true' && matrix.backend == 'local'
        working-directory: ${{ matrix.dir }}
        run: |
          terraform init -input=false

      - name: Terraform Apply
        if: env.SKIP_APPLY != 'true'
        working-directory: ${{ matrix.dir }}
        env:
          # AWS credentials
          AWS_ACCESS_KEY_ID: ${{ secrets.TF_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TF_AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.TF_AWS_REGION }}
          # Provider tokens
          CLOUDFLARE_API_TOKEN: ${{ secrets.TF_CLOUDFLARE_API_TOKEN }}
          # TF_VAR_ mappings (unused vars are safely ignored by Terraform)
          TF_VAR_aws_account_id: ${{ secrets.TF_AWS_ACCOUNT_ID }}
          TF_VAR_github_app_id: ${{ secrets.TF_GITHUB_APP_ID }}
          TF_VAR_github_app_installation_id: ${{ secrets.TF_GITHUB_APP_INSTALLATION_ID }}
          TF_VAR_github_app_key_base64: ${{ secrets.TF_GITHUB_APP_KEY_BASE64 }}
          TF_VAR_github_owner: ${{ secrets.TF_GITHUB_OWNER }}
          TF_VAR_github_repository: ${{ secrets.TF_GITHUB_REPOSITORY }}
          TF_VAR_github_token: ${{ secrets.TF_GITHUB_TOKEN }}
          TF_VAR_cloudflare_api_token: ${{ secrets.TF_CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_account_id: ${{ secrets.TF_CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_budget_alert_email: ${{ secrets.TF_BUDGET_ALERT_EMAIL }}
          TF_VAR_tf_plan_aws_access_key_id: ${{ secrets.TF_AWS_ACCESS_KEY_ID }}
          TF_VAR_tf_plan_aws_secret_access_key: ${{ secrets.TF_AWS_SECRET_ACCESS_KEY }}
          TF_VAR_pages_project_name: ${{ secrets.TF_PAGES_PROJECT_NAME }}
          TF_VAR_custom_domain: ${{ secrets.TF_CUSTOM_DOMAIN }}
          TF_VAR_google_site_verification: ${{ secrets.TF_GOOGLE_SITE_VERIFICATION }}
          TF_VAR_dns_record_apex_id: ${{ secrets.TF_DNS_RECORD_APEX_ID }}
          TF_VAR_dns_record_www_id: ${{ secrets.TF_DNS_RECORD_WWW_ID }}
          TF_VAR_dns_record_google_verification_id: ${{ secrets.TF_DNS_RECORD_GOOGLE_VERIFICATION_ID }}
          TF_VAR_account_email: ${{ secrets.TF_ACCOUNT_EMAIL }}
          TF_VAR_environment_reviewer: ${{ secrets.TF_ENVIRONMENT_REVIEWER }}
        run: |
          terraform apply -no-color -input=false tfplan
