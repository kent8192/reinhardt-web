name: OSV Vulnerability Scanner

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:

# Include github.event_name in the group so scheduled security scans and
# workflow_dispatch runs do not cancel each other or PR scans. PR-triggered
# runs still benefit from cancel-in-progress within their own group.
concurrency:
  group: "${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  osv-scan-pr:
    name: OSV scan (PR diff)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Generate Cargo.lock
        run: cargo generate-lockfile

      - name: Run OSV scanner (diff)
        uses: google/osv-scanner-action/osv-scanner-action@v2.3.3
        continue-on-error: true
        with:
          scan-args: |-
            --lockfile=Cargo.lock
            --format=sarif
            --output=osv-results.sarif

      - name: Upload SARIF results
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: osv-results.sarif

  osv-scan-full:
    name: OSV scan (full)
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Generate Cargo.lock
        run: cargo generate-lockfile

      - name: Run OSV scanner (recursive)
        uses: google/osv-scanner-action/osv-scanner-action@v2.3.3
        continue-on-error: true
        with:
          scan-args: |-
            --recursive
            --format=sarif
            --output=osv-results.sarif

      - name: Upload SARIF results
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: osv-results.sarif
