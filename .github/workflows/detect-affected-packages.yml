name: Detect Affected Packages

on:
  workflow_call:
    outputs:
      run-all:
        description: "Whether to run all tests (true when global files changed or release-plz branch)"
        value: ${{ jobs.detect.outputs.run-all }}
      has-affected:
        description: "Whether any affected packages were detected"
        value: ${{ jobs.detect.outputs.has-affected }}
      nextest-filter:
        description: "Nextest filter expression using rdeps() for affected packages"
        value: ${{ jobs.detect.outputs.nextest-filter }}
      affected-packages:
        description: "Newline-separated list of affected package names"
        value: ${{ jobs.detect.outputs.affected-packages }}
      run-examples:
        description: "Whether to run examples tests (true for release PRs, global changes, or examples/** changes)"
        value: ${{ jobs.detect.outputs.run-examples }}

jobs:
  detect:
    name: Detect Affected Packages
    runs-on: ubuntu-latest
    outputs:
      run-all: ${{ steps.detect.outputs.run-all }}
      has-affected: ${{ steps.detect.outputs.has-affected }}
      nextest-filter: ${{ steps.detect.outputs.nextest-filter }}
      affected-packages: ${{ steps.detect.outputs.affected-packages }}
      run-examples: ${{ steps.detect-examples.outputs.run-examples }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - name: Detect affected packages
        id: detect
        env:
          HEAD_REF: ${{ github.head_ref }}
          BASE_REF: ${{ github.base_ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "$HEAD_REF" == release-plz-* ]]; then
            echo "Release PR detected — running all tests"
            echo "run-all=true" >> "$GITHUB_OUTPUT"
            echo "has-affected=true" >> "$GITHUB_OUTPUT"
            echo "nextest-filter=" >> "$GITHUB_OUTPUT"
            echo "affected-packages=" >> "$GITHUB_OUTPUT"
          else
            bash .github/scripts/detect-affected-packages.sh \
              "origin/$BASE_REF"
          fi

      - name: Detect examples changes
        id: detect-examples
        env:
          HEAD_REF: ${{ github.head_ref }}
          BASE_REF: ${{ github.base_ref }}
          RUN_ALL: ${{ steps.detect.outputs.run-all }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_TOKEN: ${{ github.token }}
        run: |
          # Issue #1828: run-examples is true when run-all is true (covers release-plz branches
          # and global file changes), or when examples/** files changed in this PR.
          # In a PR context, use GitHub API for reliable file detection.
          # git diff / git log may return empty after update-branch (Issue #1836).
          if [[ "$RUN_ALL" == "true" ]]; then
            echo "run-examples=true" >> "$GITHUB_OUTPUT"
          else
            if [[ -n "${PR_NUMBER:-}" && -n "${GITHUB_REPOSITORY:-}" ]]; then
              CHANGED=$(gh api \
                "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER/files" \
                --paginate --jq '.[].filename' 2>/dev/null \
                | grep '^examples/' | head -1 || true)
            else
              if [[ -n "${HEAD_REF:-}" ]]; then
                COMPARE_REF="origin/$HEAD_REF"
              else
                COMPARE_REF="HEAD"
              fi
              BASE_REF_VAL="${BASE_REF:-main}"
              CHANGED=$(git diff --name-only \
                "origin/$BASE_REF_VAL...$COMPARE_REF" \
                | grep -v '^$' | grep '^examples/' | head -1 || true)
            fi
            if [[ -n "$CHANGED" ]]; then
              echo "run-examples=true" >> "$GITHUB_OUTPUT"
            else
              echo "run-examples=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Summary
        env:
          RUN_ALL: ${{ steps.detect.outputs.run-all }}
          HAS_AFFECTED: ${{ steps.detect.outputs.has-affected }}
          NEXTEST_FILTER: ${{ steps.detect.outputs.nextest-filter }}
          AFFECTED_PACKAGES: ${{ steps.detect.outputs.affected-packages }}
          RUN_EXAMPLES: ${{ steps.detect-examples.outputs.run-examples }}
        run: |
          echo "### Affected Package Detection" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Run all**: \`$RUN_ALL\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Has affected**: \`$HAS_AFFECTED\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Run examples**: \`$RUN_EXAMPLES\`" >> "$GITHUB_STEP_SUMMARY"
          if [[ -n "$NEXTEST_FILTER" ]]; then
            echo "- **Nextest filter**: \`$NEXTEST_FILTER\`" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [[ -n "$AFFECTED_PACKAGES" ]]; then
            echo "- **Affected packages**:" >> "$GITHUB_STEP_SUMMARY"
            while IFS= read -r pkg; do
              [[ -z "$pkg" ]] && continue
              echo "  - \`$pkg\`" >> "$GITHUB_STEP_SUMMARY"
            done <<< "$AFFECTED_PACKAGES"
          fi
