name: Stale Issues and PRs

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/stale@v10
        with:
          # Issue settings
          days-before-issue-stale: 90
          days-before-issue-close: 30
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not had
            recent activity. It will be closed in 30 days if no further activity occurs.
            If this issue is still relevant, please leave a comment or remove the stale label.
          close-issue-message: >
            This issue has been automatically closed due to inactivity.
            If you believe this issue is still relevant, please reopen it with additional context.
          stale-issue-label: stale
          close-issue-label: auto-closed
          exempt-issue-labels: >
            enhancement,help wanted,security,critical,high,
            migration-approved,rc-addition,agent-suspect,good first issue

          # PR settings
          days-before-pr-stale: 30
          days-before-pr-close: 14
          stale-pr-message: >
            This pull request has been automatically marked as stale because it has not had
            recent activity. It will be closed in 14 days if no further activity occurs.
            If this PR is still in progress, please push new commits or leave a comment.
          close-pr-message: >
            This pull request has been automatically closed due to inactivity.
            If you would like to continue working on this, please reopen it.
          stale-pr-label: stale
          close-pr-label: auto-closed
          exempt-pr-labels: >
            enhancement,help wanted,security,critical,high,
            release,migration-approved,rc-addition

          # General settings
          exempt-all-assignees: true
          operations-per-run: 100
