name: Publish Check

on:
  workflow_call:
    inputs:
      runner:
        description: 'Runner label JSON'
        type: string
        default: '"ubuntu-latest"'
      cargo-build-jobs:
        description: "Parallel cargo build jobs"
        type: string
        default: "1"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0
  # Workaround for arduino/setup-protoc#112, cloudflare/wrangler-action#413,
  # hashicorp/setup-packer#162 (tracked in reinhardt-web#4125). Remove this
  # once all three upstreams ship node24 releases.
  #
  # Ideal implementation (without workaround):
  #   (no env override; let runner default kick in)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  publish-check:
    name: Publish Dry-Run Check
    runs-on: ${{ fromJSON(inputs.runner || '"ubuntu-latest"') }}
    timeout-minutes: 360
    # Skip for release-plz branches and release-fix branches - versions may not yet be on crates.io
    if: >-
      ${{
        !startsWith(github.head_ref || github.ref_name, 'release-plz-') &&
        !startsWith(github.head_ref || github.ref_name, 'fix/release-plz')
      }}
    steps:
      - name: Free Disk Space
        if: ${{ !contains(inputs.runner || '', 'self-hosted') }}
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Setup protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "28.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify no circular dev-dependencies
        run: |
          echo "=== Checking for circular dev-dependencies ==="
          # Use 'cargo package' instead of 'cargo publish --dry-run' to avoid
          # timeout waiting for workspace dependencies to appear on crates.io
          # registry (dry-run never actually publishes, so deps never appear).
          # Build exclude flags for all crates with publish = false.
          EXCLUDES=$(cargo metadata --no-deps --format-version=1 \
            | jq -r '.packages[] | select(.publish == [] or .publish == ["!crates-io"] or .name == "reinhardt-web") | "--exclude \(.name)"' \
            | tr '\n' ' ')
          eval cargo package --workspace --no-verify --allow-dirty $EXCLUDES
          echo ""
          echo "=== All crates passed packaging check ==="

      # Below: publish-form regression for #4161. After packaging the workspace
      # above, stage the .crate tarballs and re-run the wasm consumer fixture
      # against them via [patch.crates-io] overrides — catches any divergence
      # between workspace `path =` resolution and registry-form
      # `proc_macro_crate` resolution that the alpha-form fixture cannot see.
      - name: Stage packaged tarballs
        run: |
          mkdir -p /tmp/pkg-stage
          find target/package -maxdepth 1 -name '*.crate' -exec cp {} /tmp/pkg-stage/ \;
          # The workspace cargo-package step above excludes reinhardt-web
          # (umbrella crate), so it never lands in target/package. Package
          # it separately so the publish-form fixture exercises THIS PR's
          # local src/lib.rs (e.g., #4161 wasm shims) instead of the older
          # rc version already on crates.io. Without this, [patch.crates-io]
          # has no entry for reinhardt-web and the fixture silently resolves
          # to the published copy that lacks the changes under test.
          cargo package -p reinhardt-web --no-verify --allow-dirty
          cp target/package/reinhardt-web-*.crate /tmp/pkg-stage/
          ls -la /tmp/pkg-stage

      - name: Install wasm32-unknown-unknown target
        run: rustup target add wasm32-unknown-unknown

      - name: Wasm consumer fixture (publish-form, #4161 regression)
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}
          PKG_STAGE: /tmp/pkg-stage
        run: bash .github/scripts/build-wasm-consumer-fixture.sh --use-packaged
