name: Terraform Plan

on:
  pull_request:
    paths:
      - "infra/**"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  id-token: write

concurrency:
  group: terraform-plan-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  plan:
    if: github.event.pull_request.head.repo.full_name == github.repository
    name: Plan (${{ matrix.module }})
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        include:
          - module: github-runners
            dir: infra/github-runners
            backend: s3
          - module: bootstrap
            dir: infra/github-runners/bootstrap
            backend: local
          - module: website
            dir: infra/website
            backend: local
          - module: organizations
            dir: infra/organizations
            backend: local
          - module: repository
            dir: infra/repository
            backend: local

    steps:
      - uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform Init (S3 backend)
        id: init-s3
        if: matrix.backend == 's3'
        working-directory: ${{ matrix.dir }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.TF_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TF_AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.TF_AWS_REGION }}
        run: |
          if [ -z "$AWS_ACCESS_KEY_ID" ]; then
            echo "::warning::AWS credentials not configured — skipping ${{ matrix.module }}"
            echo "SKIP_PLAN=true" >> "$GITHUB_ENV"
            exit 0
          fi
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ matrix.module }}/terraform.tfstate" \
            -backend-config="region=${{ secrets.TF_AWS_REGION }}" \
            -backend-config="assume_role={role_arn=\"arn:aws:iam::${{ secrets.TF_AWS_ACCOUNT_ID }}:role/OrganizationAccountAccessRole\"}" \
            -input=false
        continue-on-error: true

      - name: Terraform Init (local backend)
        id: init-local
        if: matrix.backend == 'local'
        working-directory: ${{ matrix.dir }}
        run: |
          terraform init -input=false
        continue-on-error: true

      - name: Check terraform init outcome
        if: steps.init-s3.outcome == 'failure' || steps.init-local.outcome == 'failure'
        run: |
          echo "::error::Terraform init failed for ${{ matrix.module }}"
          exit 1

      - name: Check required variables
        if: env.SKIP_PLAN != 'true'
        env:
          TF_VAR_aws_account_id: ${{ secrets.TF_AWS_ACCOUNT_ID }}
          TF_VAR_account_email: ${{ secrets.TF_ACCOUNT_EMAIL }}
          TF_VAR_cloudflare_account_id: ${{ secrets.TF_CLOUDFLARE_ACCOUNT_ID }}
        run: |
          case "${{ matrix.module }}" in
            bootstrap|github-runners)
              [ -z "$TF_VAR_aws_account_id" ] && SKIP=true ;;
            organizations)
              [ -z "$TF_VAR_account_email" ] && SKIP=true ;;
            website)
              [ -z "$TF_VAR_cloudflare_account_id" ] && SKIP=true ;;
          esac
          if [ "${SKIP:-}" = "true" ]; then
            echo "::warning::Required variables not configured — skipping ${{ matrix.module }}"
            echo "SKIP_PLAN=true" >> "$GITHUB_ENV"
          fi

      - name: Download Lambda zip files
        if: env.SKIP_PLAN != 'true' && matrix.module == 'github-runners'
        working-directory: ${{ matrix.dir }}
        run: |
          MODULES_JSON=".terraform/modules/modules.json"
          if [ ! -f "$MODULES_JSON" ]; then
            echo "::warning::modules.json not found — skipping Lambda download"
            exit 0
          fi

          MODULE_VERSION=$(python3 -c "
          import json, sys
          data = json.load(open('$MODULES_JSON'))
          for m in data.get('Modules', []):
              if m.get('Key') == 'github_runner':
                  print(m['Version'])
                  sys.exit(0)
          sys.exit(1)
          " 2>/dev/null || echo "")

          if [ -z "$MODULE_VERSION" ]; then
            echo "::warning::Could not detect module version — skipping Lambda download"
            exit 0
          fi

          echo "Downloading Lambda zips for v${MODULE_VERSION}..."
          mkdir -p lambdas
          BASE_URL="https://github.com/github-aws-runners/terraform-aws-github-runner/releases/download/v${MODULE_VERSION}"
          for name in webhook runners runner-binaries-syncer; do
            curl -fsSL -o "lambdas/${name}.zip" "${BASE_URL}/${name}.zip"
            echo "  Downloaded ${name}.zip"
          done

      - name: Terraform Plan
        if: env.SKIP_PLAN != 'true'
        id: plan
        working-directory: ${{ matrix.dir }}
        env:
          # AWS credentials
          AWS_ACCESS_KEY_ID: ${{ secrets.TF_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TF_AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.TF_AWS_REGION }}
          # Provider tokens
          CLOUDFLARE_API_TOKEN: ${{ secrets.TF_CLOUDFLARE_API_TOKEN }}
          # TF_VAR_ mappings (unused vars are safely ignored by Terraform)
          TF_VAR_aws_account_id: ${{ secrets.TF_AWS_ACCOUNT_ID }}
          TF_VAR_github_app_id: ${{ secrets.TF_GITHUB_APP_ID }}
          TF_VAR_github_app_installation_id: ${{ secrets.TF_GITHUB_APP_INSTALLATION_ID }}
          TF_VAR_github_app_key_base64: ${{ secrets.TF_GITHUB_APP_KEY_BASE64 }}
          TF_VAR_github_owner: ${{ secrets.TF_GITHUB_OWNER }}
          TF_VAR_github_repository: ${{ secrets.TF_GITHUB_REPOSITORY }}
          TF_VAR_github_token: ${{ secrets.TF_GITHUB_TOKEN }}
          TF_VAR_cloudflare_api_token: ${{ secrets.TF_CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_account_id: ${{ secrets.TF_CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_budget_alert_email: ${{ secrets.TF_BUDGET_ALERT_EMAIL }}
          TF_VAR_account_email: ${{ secrets.TF_ACCOUNT_EMAIL }}
          TF_VAR_pages_project_name: ${{ secrets.TF_PAGES_PROJECT_NAME }}
          TF_VAR_custom_domain: ${{ secrets.TF_CUSTOM_DOMAIN }}
          TF_VAR_google_site_verification: ${{ secrets.TF_GOOGLE_SITE_VERIFICATION }}
          TF_VAR_dns_record_apex_id: ${{ secrets.TF_DNS_RECORD_APEX_ID }}
          TF_VAR_dns_record_www_id: ${{ secrets.TF_DNS_RECORD_WWW_ID }}
          TF_VAR_dns_record_google_verification_id: ${{ secrets.TF_DNS_RECORD_GOOGLE_VERIFICATION_ID }}
          TF_VAR_tf_plan_aws_access_key_id: ${{ secrets.TF_AWS_ACCESS_KEY_ID }}
          TF_VAR_tf_plan_aws_secret_access_key: ${{ secrets.TF_AWS_SECRET_ACCESS_KEY }}
          TF_VAR_organizations_account_email: ${{ secrets.TF_ACCOUNT_EMAIL }}
          TF_VAR_environment_reviewer: ${{ secrets.TF_ENVIRONMENT_REVIEWER }}
        run: |
          terraform plan -no-color -input=false 2>&1 | tee plan-output.txt
          echo "exitcode=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Post plan to PR
        if: always() && github.event_name == 'pull_request' && env.SKIP_PLAN != 'true'
        uses: actions/github-script@v8
        env:
          MODULE: ${{ matrix.module }}
          PLAN_EXIT: ${{ steps.plan.outputs.exitcode }}
        with:
          script: |
            const fs = require('fs');
            const moduleName = process.env.MODULE;
            const exitCode = process.env.PLAN_EXIT;
            const marker = `<!-- terraform-plan-${moduleName} -->`;

            let planOutput = '';
            const planFile = `${{ matrix.dir }}/plan-output.txt`;
            try {
              planOutput = fs.readFileSync(planFile, 'utf8');
            } catch {
              planOutput = 'Plan output not available.';
            }

            // Truncate at 60,000 chars to stay within GitHub comment limit
            if (planOutput.length > 60000) {
              planOutput = planOutput.substring(0, 60000) + '\n\n... (truncated)';
            }

            const status = exitCode === '0' ? '✅' : exitCode === '2' ? '⚠️ Changes detected' : '❌ Error';

            const body = [
              marker,
              `### Terraform Plan: \`${moduleName}\` ${status}`,
              '',
              '<details>',
              '<summary>Show plan output</summary>',
              '',
              '```',
              planOutput,
              '```',
              '',
              '</details>',
            ].join('\n');

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }
