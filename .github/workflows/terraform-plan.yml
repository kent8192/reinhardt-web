name: Terraform Plan

on:
  pull_request:
    paths:
      - "infra/**"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  id-token: write

concurrency:
  group: terraform-plan-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  plan:
    name: Plan (${{ matrix.module }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - module: github-runners
            dir: infra/github-runners
            backend: s3
          - module: bootstrap
            dir: infra/bootstrap
            backend: local
          - module: website
            dir: infra/website
            backend: local
          - module: organizations
            dir: infra/organizations
            backend: local

    steps:
      - uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform Init (S3 backend)
        if: matrix.backend == 's3'
        working-directory: ${{ matrix.dir }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.TF_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TF_AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.TF_AWS_REGION }}
        run: |
          if [ -z "$AWS_ACCESS_KEY_ID" ]; then
            echo "::warning::AWS credentials not configured — skipping ${{ matrix.module }}"
            echo "SKIP_PLAN=true" >> "$GITHUB_ENV"
            exit 0
          fi
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ matrix.module }}/terraform.tfstate" \
            -backend-config="region=${{ secrets.TF_AWS_REGION }}" \
            -input=false
        continue-on-error: true

      - name: Terraform Init (local backend)
        if: matrix.backend == 'local'
        working-directory: ${{ matrix.dir }}
        run: |
          terraform init -input=false
        continue-on-error: true

      - name: Terraform Plan
        if: env.SKIP_PLAN != 'true'
        id: plan
        working-directory: ${{ matrix.dir }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.TF_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TF_AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.TF_AWS_REGION }}
          TF_VAR_github_app_id: ${{ secrets.TF_GITHUB_APP_ID }}
          TF_VAR_github_app_installation_id: ${{ secrets.TF_GITHUB_APP_INSTALLATION_ID }}
          TF_VAR_github_app_key_base64: ${{ secrets.TF_GITHUB_APP_KEY_BASE64 }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.TF_CLOUDFLARE_API_TOKEN }}
          TF_VAR_cloudflare_api_token: ${{ secrets.TF_CLOUDFLARE_API_TOKEN }}
          TF_VAR_github_token: ${{ secrets.TF_GITHUB_TOKEN }}
        run: |
          terraform plan -no-color -input=false 2>&1 | tee plan-output.txt
          echo "exitcode=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Post plan to PR
        if: github.event_name == 'pull_request' && env.SKIP_PLAN != 'true'
        uses: actions/github-script@v8
        env:
          MODULE: ${{ matrix.module }}
          PLAN_EXIT: ${{ steps.plan.outputs.exitcode }}
        with:
          script: |
            const fs = require('fs');
            const moduleName = process.env.MODULE;
            const exitCode = process.env.PLAN_EXIT;
            const marker = `<!-- terraform-plan-${moduleName} -->`;

            let planOutput = '';
            const planFile = `${{ matrix.dir }}/plan-output.txt`;
            try {
              planOutput = fs.readFileSync(planFile, 'utf8');
            } catch {
              planOutput = 'Plan output not available.';
            }

            // Truncate at 60,000 chars to stay within GitHub comment limit
            if (planOutput.length > 60000) {
              planOutput = planOutput.substring(0, 60000) + '\n\n... (truncated)';
            }

            const status = exitCode === '0' ? '✅' : exitCode === '2' ? '⚠️ Changes detected' : '❌ Error';

            const body = [
              marker,
              `### Terraform Plan: \`${moduleName}\` ${status}`,
              '',
              '<details>',
              '<summary>Show plan output</summary>',
              '',
              '```',
              planOutput,
              '```',
              '',
              '</details>',
            ].join('\n');

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }
