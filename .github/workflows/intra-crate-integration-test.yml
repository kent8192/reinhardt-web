name: Intra-Crate Integration Tests

on:
  workflow_call:
    inputs:
      runner:
        description: 'Runner label JSON. Use "\"ubuntu-latest\"" for GitHub-hosted or "[\"self-hosted\",\"linux\",\"arm64\",\"reinhardt-ci\"]" for self-hosted.'
        type: string
        default: '"ubuntu-latest"'
      cargo-build-jobs:
        description: "Parallel cargo build jobs (1=GitHub-hosted OOM safe, 8=self-hosted)"
        type: string
        default: "1"
      nextest-filter:
        description: "Nextest filter expression for affected packages"
        type: string
        default: ""
      run-all:
        description: "Whether to run all tests"
        type: string
        default: "true"
      cargo-packages:
        description: "Newline-separated list of packages to compile (affected + rdeps). Issue #2878"
        type: string
        default: ""
      partitions-json:
        description: "JSON array of partition indices for dynamic matrix. Issue #2881"
        type: string
        default: "[1,2,3,4,5,6,7,8]"
      partition-count:
        description: "Total partition count for nextest --partition. Issue #2881"
        type: string
        default: "8"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_TARGET_DIR: /tmp/cargo_target
  CARGO_INCREMENTAL: 0
  CARGO_BUILD_JOBS: ${{ inputs.cargo-build-jobs || '1' }}
  CARGO_PROFILE_DEV_DEBUG: line-tables-only
  CARGO_PROFILE_TEST_DEBUG: line-tables-only
  RUST_MIN_STACK: 8388608  # 8MB - prevent stack overflow in deep async fixture chains
  # Workaround for arduino/setup-protoc#112, cloudflare/wrangler-action#413,
  # hashicorp/setup-packer#162 (tracked in reinhardt-web#4125). Remove this
  # once all three upstreams ship node24 releases.
  #
  # Ideal implementation (without workaround):
  #   (no env override; let runner default kick in)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  intra-crate-integration-test:
    name: Intra-Crate Integration Tests (${{ matrix.partition }}/${{ inputs.partition-count || '8' }})
    runs-on: ${{ fromJSON(inputs.runner) }}
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        partition: ${{ fromJSON(inputs.partitions-json || '[1,2,3,4,5,6,7,8]') }}
    steps:
      - name: Free Disk Space (Ubuntu)
        if: ${{ !contains(inputs.runner, 'self-hosted') }}
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Login to Docker Hub
        uses: ./.github/actions/docker-login
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          token: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Setup protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "28.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install mold linker and build dependencies
        run: |
          sudo systemctl stop unattended-upgrades || true
          sudo apt-get update -o DPkg::Lock::Timeout=120
          sudo apt-get install -y -o DPkg::Lock::Timeout=120 mold clang lld build-essential
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*

      - name: Install cargo-make
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-make

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      # Required by Tier 3 E2E tests (e.g. spa_navigation_full_layout_e2e in
      # crates/reinhardt-pages) which build a fixture WASM bundle via
      # `wasm-pack build`. The test refuses to skip silently when CI=true.
      # Tracked in #4134.
      - name: Install wasm-pack
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack

      # Required by hot-reload integration tests in
      # crates/reinhardt-commands/tests/runserver_hot_reload.rs. Each
      # fixture builds a wasm cdylib via the in-house `WasmBuilder`, which
      # shells to `cargo build --target wasm32-unknown-unknown` and then
      # to a `wasm-bindgen` binary on PATH. wasm-pack vendors its own copy
      # of wasm-bindgen but does not expose it on PATH, so we install the
      # CLI directly. Issue #4128.
      - name: Install wasm32-unknown-unknown target
        run: rustup target add wasm32-unknown-unknown

      - name: Install wasm-bindgen-cli
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-bindgen-cli

      # Scope mold to the host target only. A global `RUSTFLAGS=...-fuse-ld=mold`
      # leaks into wasm32 builds (e.g. wasm-pack fixtures) and clang rejects
      # `-fuse-ld=mold` for that target. See reinhardt-web#4147.
      - name: Configure mold linker (host target only)
        run: |
          cat > /tmp/clang-mold-wrapper << 'WRAPPER'
          #!/bin/sh
          exec clang -fuse-ld=mold "$@"
          WRAPPER
          chmod +x /tmp/clang-mold-wrapper
          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ]; then
            ENV_KEY="CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER"
          elif [ "$ARCH" = "x86_64" ]; then
            ENV_KEY="CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER"
          else
            echo "Unsupported architecture for mold linker configuration: $ARCH" >&2
            exit 1
          fi
          echo "${ENV_KEY}=/tmp/clang-mold-wrapper" >> "$GITHUB_ENV"

      - name: Pull Docker images
        uses: ./.github/actions/pull-docker-images
        with:
          images-file: .github/docker-images-intra-crate.txt

      - name: Additional disk cleanup before tests
        if: ${{ !contains(inputs.runner, 'self-hosted') }}
        run: |
          echo "Disk usage before additional cleanup:"
          df -h
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/* || true
          # Use -f (not -af) to preserve pre-pulled Docker images
          docker system prune -f --volumes || true
          docker builder prune -af || true
          rm -rf ~/.cache/pip || true
          rm -rf ~/.npm || true
          rm -rf ~/.cache/yarn || true
          rm -rf ~/.gradle || true
          rm -rf ~/.m2 || true
          # Cargo registry and git db cleanup
          rm -rf ~/.cargo/registry/cache || true
          rm -rf ~/.cargo/git/db || true
          echo "Disk usage after additional cleanup:"
          df -h

      - name: Run intra-crate integration tests (partition ${{ matrix.partition }}/${{ inputs.partition-count || '8' }})
        env:
          NEXTEST_FILTER_EXPR: ${{ inputs.nextest-filter }}
          RUN_ALL: ${{ inputs.run-all }}
          CARGO_PACKAGES: ${{ inputs.cargo-packages }}
          PARTITION_COUNT: ${{ inputs.partition-count || '8' }}
        run: |
          # Build package selection args. Issue #2878
          # --exclude requires --workspace; when using -p flags, filter the
          # package list instead. Issue #2878
          # Build set of packages that have integration test targets (kind == "test").
          # Packages without test targets (e.g., reinhardt-web, reinhardt-test-support)
          # cause `cargo test --no-run --test '*'` to fail with exit code 101.
          # Fixes #3026
          PKGS_WITH_TEST_TARGETS=$(cargo metadata --format-version 1 --no-deps \
            | jq -r '.packages[] | select(.targets[] | .kind[] == "test") | .name' \
            | sort -u)

          PKG_ARGS=()
          EXCLUDE_ARGS=()
          if [[ "$RUN_ALL" != "true" && -n "$CARGO_PACKAGES" ]]; then
            while IFS= read -r pkg; do
              [[ -z "$pkg" ]] && continue
              # Cross-crate integration tests run in a separate workflow
              [[ "$pkg" == "reinhardt-integration-tests" ]] && continue
              # Skip packages without integration test targets
              if ! echo "$PKGS_WITH_TEST_TARGETS" | grep -qx "$pkg"; then
                echo "Skipping $pkg (no integration test targets)"
                continue
              fi
              PKG_ARGS+=(-p "$pkg")
            done <<< "$CARGO_PACKAGES"
          fi
          if [[ ${#PKG_ARGS[@]} -eq 0 ]]; then
            PKG_ARGS=(--workspace)
            EXCLUDE_ARGS=(--exclude reinhardt-integration-tests)
          fi

          if [[ "$RUN_ALL" != "true" && -n "$NEXTEST_FILTER_EXPR" ]]; then
            FILTER_EXPR="(not binary(/ui/)) & ($NEXTEST_FILTER_EXPR)"
          else
            FILTER_EXPR="not binary(/ui/)"
          fi
          cargo nextest run \
            "${PKG_ARGS[@]}" \
            "${EXCLUDE_ARGS[@]}" \
            --test "*" \
            -E "$FILTER_EXPR" \
            --all-features \
            --partition hash:${{ matrix.partition }}/$PARTITION_COUNT \
            --no-fail-fast \
            --no-tests=warn \
            --status-level=none \
            --final-status-level=none

      - name: Docker cleanup after tests
        if: always()
        run: docker system prune -af
