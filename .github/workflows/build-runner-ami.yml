# Build custom AMI for self-hosted GitHub Actions runners
name: Build Runner AMI

on:
  workflow_dispatch:
    inputs:
      architecture:
        description: "CPU architecture to build the AMI for"
        required: true
        type: choice
        options:
          - arm64
          - x64
        default: "arm64"
      force_rebuild:
        description: "Force rebuild even if no changes detected"
        required: false
        type: boolean
        default: false
  schedule:
    # Weekly build every Monday at 04:00 UTC
    - cron: '0 4 * * 1'

permissions:
  id-token: write
  contents: read

concurrency:
  group: build-runner-ami-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-ami:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      RUNNER_ARCH: ${{ github.event.inputs.architecture || 'arm64' }}
      PKR_VAR_runner_arch: ${{ github.event.inputs.architecture || 'arm64' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      # NOTE: Still on Node.js 20 - update when Node.js 24 version becomes available
      - name: Install Packer
        uses: hashicorp/setup-packer@v3
        with:
          version: 1.15.0

      - name: Packer Init
        run: |
          cd infra/github-runners/packer
          packer init reinhardt-runner.pkr.hcl

      - name: Packer Validate
        run: |
          cd infra/github-runners/packer
          packer validate reinhardt-runner.pkr.hcl

      - name: Build AMI
        run: |
          cd infra/github-runners/packer
          PACKER_LOG=1 packer build reinhardt-runner.pkr.hcl

      - name: Extract AMI ID
        id: extract-ami
        run: |
          AMI_ID=$(jq -r '.builds[-1].artifact_id | split(":")[1]' infra/github-runners/packer/manifest.json)
          echo "ami_id=$AMI_ID" >> "$GITHUB_OUTPUT"

      - name: Update SSM Parameter
        if: env.RUNNER_ARCH == 'arm64'
        env:
          AMI_ID: ${{ steps.extract-ami.outputs.ami_id }}
        run: |
          aws ssm put-parameter \
            --name "/reinhardt-ci/runner-ami-id" \
            --type String \
            --value "$AMI_ID" \
            --overwrite

      - name: Skip SSM Update (non-arm64)
        if: env.RUNNER_ARCH != 'arm64'
        run: |
          echo "::notice::Skipping SSM parameter update: runners use arm64 instances, but this build is for ${RUNNER_ARCH}"

      - name: Clean up old AMIs
        run: |
          AMI_IDS=$(aws ec2 describe-images \
            --owners self \
            --filters "Name=name,Values=reinhardt-ci-runner-${RUNNER_ARCH}-*" \
            --query 'sort_by(Images, &CreationDate)[:-3].ImageId' \
            --output text)

          for ami_id in $AMI_IDS; do
            echo "Deregistering old AMI: $ami_id"
            SNAPSHOTS=$(aws ec2 describe-images --image-ids "$ami_id" --query 'Images[0].BlockDeviceMappings[*].Ebs.SnapshotId' --output text)
            aws ec2 deregister-image --image-id "$ami_id"
            for snap_id in $SNAPSHOTS; do
              echo "Deleting snapshot: $snap_id"
              aws ec2 delete-snapshot --snapshot-id "$snap_id"
            done
          done

      - name: Post Summary
        env:
          AMI_ID: ${{ steps.extract-ami.outputs.ami_id }}
        run: |
          echo "## AMI Build Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Architecture**: $RUNNER_ARCH" >> "$GITHUB_STEP_SUMMARY"
          echo "- **AMI ID**: $AMI_ID" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Region**: us-east-1" >> "$GITHUB_STEP_SUMMARY"
          if [[ "$RUNNER_ARCH" == "arm64" ]]; then
            echo "- **SSM Parameter**: /reinhardt-ci/runner-ami-id (updated)" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- **SSM Parameter**: /reinhardt-ci/runner-ami-id (not updated — runners use arm64)" >> "$GITHUB_STEP_SUMMARY"
          fi
