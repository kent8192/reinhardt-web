name: CI

on:
  pull_request:
    # Run CI on PRs targeting any branch
    # (This comment added to re-trigger CI after doc test fix)
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  pull-requests: read
  issues: write
  security-events: write

concurrency:
  group: >-
    ${{ github.workflow }}-${{
      startsWith(github.head_ref || '', 'develop-release-plz-')
        && 'develop-release-plz'
        || startsWith(github.head_ref || '', 'release-plz-')
          && 'release-plz'
        || github.head_ref
        || github.run_id
    }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0

jobs:
  # Check if PR branch has merge conflicts.
  # When conflicts exist, skip all CI jobs to save runner costs.
  check-branch-status:
    name: Check Branch Status
    timeout-minutes: 10
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      has-conflicts: ${{ steps.check.outputs.has-conflicts }}
      infra-changed: ${{ steps.check-infra.outputs.infra-changed }}
    steps:
      - name: Check if PR has merge conflicts
        id: check
        uses: actions/github-script@v8
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });
            const hasConflicts = pr.mergeable_state === 'dirty';
            core.setOutput('has-conflicts', hasConflicts.toString());
            if (hasConflicts) {
              core.warning('PR has merge conflicts. Skipping CI — please resolve conflicts.');
            }

      - name: Check if infra files changed
        id: check-infra
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100,
            });
            const infraChanged = files.some(f => f.filename.startsWith('infra/'));
            core.setOutput('infra-changed', infraChanged.toString());

  # Determine runner type for CI jobs. The selection logic (Mac local -> AWS
  # Spot -> GitHub-hosted, with fork exclusion and budget circuit breaker) lives
  # in the reusable determine-runner.yml so it is shared with the standalone
  # example workflow (examples-test-standalone.yml) instead of being duplicated.
  determine-runner:
    name: Determine Runner
    uses: ./.github/workflows/determine-runner.yml

  # Detect which packages are affected by the PR changes.
  # Runs in parallel with Phase 1 checks to minimize latency.
  # On release-plz branches or global file changes, all tests run.
  detect-affected:
    name: Detect Affected Packages
    needs: [check-branch-status]
    if: needs.check-branch-status.outputs.has-conflicts != 'true'
    uses: ./.github/workflows/detect-affected-packages.yml

  # Call all reusable workflows
  check:
    name: Check
    needs: [determine-runner, check-branch-status]
    if: needs.check-branch-status.outputs.has-conflicts != 'true'
    uses: ./.github/workflows/check.yml
    with:
      runner: ${{ needs.determine-runner.outputs.runner }}
      cargo-build-jobs: ${{ needs.determine-runner.outputs.cargo-build-jobs }}

  fmt:
    name: Format
    needs: [determine-runner, check-branch-status]
    if: needs.check-branch-status.outputs.has-conflicts != 'true'
    uses: ./.github/workflows/fmt.yml
    with:
      runner: ${{ needs.determine-runner.outputs.runner }}

  clippy:
    name: Clippy
    needs: [determine-runner, check-branch-status]
    if: needs.check-branch-status.outputs.has-conflicts != 'true'
    uses: ./.github/workflows/clippy.yml
    with:
      runner: ${{ needs.determine-runner.outputs.runner }}
      cargo-build-jobs: ${{ needs.determine-runner.outputs.cargo-build-jobs }}

  auto-fix-style-target:
    name: Auto-Fix Style Target
    needs: [check-branch-status, fmt, clippy]
    if: >-
      ${{ !cancelled()
        && github.event_name == 'pull_request'
        && needs.check-branch-status.outputs.has-conflicts != 'true'
        && (needs.fmt.result == 'failure' || needs.clippy.result == 'failure') }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      eligible: ${{ steps.target.outputs.eligible }}
      reason: ${{ steps.target.outputs.reason }}
    steps:
      - name: Checkout trusted auto-fix policy
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false
          sparse-checkout: .github/scripts/auto-fix-style-target.cjs
          sparse-checkout-cone-mode: false
          path: .auto-fix-policy

      - name: Check auto-fix target branch
        id: target
        uses: actions/github-script@v8
        with:
          script: |
            const { runAutoFixTargetPolicy } = require('./.auto-fix-policy/.github/scripts/auto-fix-style-target.cjs');
            await runAutoFixTargetPolicy({
              github,
              context,
              core,
              noticePrefix: 'Auto-fix style target',
            });

  auto-fix-style:
    name: Auto-Fix Style
    needs: [determine-runner, fmt, clippy, auto-fix-style-target]
    if: >-
      ${{ !cancelled()
        && github.event_name == 'pull_request'
        && needs.auto-fix-style-target.outputs.eligible == 'true' }}
    runs-on: ${{ fromJSON(needs.determine-runner.outputs.runner) }}
    timeout-minutes: 360
    env:
      CARGO_TARGET_DIR: /tmp/cargo_target
      CARGO_BUILD_JOBS: ${{ needs.determine-runner.outputs.cargo-build-jobs || '1' }}
      # Workaround for arduino/setup-protoc#112, cloudflare/wrangler-action#413,
      # hashicorp/setup-packer#162 (tracked in reinhardt-web#4125). Remove this
      # once all three upstreams ship node24 releases.
      #
      # Ideal implementation (without workaround):
      #   (no env override; let runner default kick in)
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    outputs:
      changed: ${{ steps.diff.outputs.changed }}
    steps:
      - name: Free Disk Space (Ubuntu)
        if: ${{ !contains(needs.determine-runner.outputs.runner, 'self-hosted') }}
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout pull request head SHA
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          repository: ${{ github.repository }}
          persist-credentials: false

      - name: Setup Rust with style components
        uses: ./.github/actions/setup-rust
        with:
          components: rustfmt, clippy

      - name: Setup protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "28.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cargo-make
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-make

      - name: Run style auto-fix
        env:
          FMT_RESULT: ${{ needs.fmt.result }}
          CLIPPY_RESULT: ${{ needs.clippy.result }}
        run: |
          set -euo pipefail

          if [[ "$FMT_RESULT" == "failure" && "$CLIPPY_RESULT" == "failure" ]]; then
            cargo make auto-fix
          elif [[ "$FMT_RESULT" == "failure" ]]; then
            cargo make fmt-fix
          elif [[ "$CLIPPY_RESULT" == "failure" ]]; then
            cargo make clippy-fix
          else
            echo "No style auto-fix command needed."
          fi

      - name: Detect auto-fix diff
        id: diff
        run: |
          set -euo pipefail

          if [[ -z "$(git status --porcelain)" ]]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No auto-fix diff produced."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git status --short
            git diff --stat
          fi

      - name: Export auto-fix patch
        if: steps.diff.outputs.changed == 'true'
        run: |
          set -euo pipefail

          git add -A
          git diff --cached --binary > "$RUNNER_TEMP/style-auto-fix.patch"
          if [[ ! -s "$RUNNER_TEMP/style-auto-fix.patch" ]]; then
            echo "::error::Auto-fix changed files, but patch export was empty."
            exit 1
          fi
          git diff --cached --stat

      - name: Upload auto-fix patch
        if: steps.diff.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: style-auto-fix-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/style-auto-fix.patch
          if-no-files-found: error
          retention-days: 1

  commit-auto-fix-style:
    name: Commit Auto-Fix Style
    needs: [auto-fix-style-target, auto-fix-style]
    if: >-
      ${{ !cancelled()
        && github.event_name == 'pull_request'
        && needs.auto-fix-style-target.outputs.eligible == 'true'
        && needs.auto-fix-style.outputs.changed == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout pull request head SHA
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          repository: ${{ github.repository }}
          persist-credentials: false

      - name: Checkout trusted auto-fix policy
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false
          sparse-checkout: .github/scripts/auto-fix-style-target.cjs
          sparse-checkout-cone-mode: false
          path: .auto-fix-policy

      - name: Download auto-fix patch
        uses: actions/download-artifact@v4
        with:
          name: style-auto-fix-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/style-auto-fix

      - name: Apply auto-fix patch
        run: |
          set -euo pipefail

          PATCH_FILE="$RUNNER_TEMP/style-auto-fix/style-auto-fix.patch"
          git apply --index --whitespace=nowarn "$PATCH_FILE"
          if git diff --cached --quiet; then
            echo "::error::Auto-fix patch applied without staged changes."
            exit 1
          fi
          git diff --cached --stat

      - name: Validate auto-fix patch
        run: |
          set -euo pipefail

          while IFS=$'\t' read -r status path extra; do
            case "$status" in
              M|A)
                mode="$(git ls-files -s -- "$path" | awk '{print $1}')"
                if [[ "$mode" == "120000" ]]; then
                  echo "::error::Auto-fix cannot commit symlink path '$path'."
                  exit 1
                fi
                ;;
              D)
                ;;
              *)
                echo "::error::Unsupported auto-fix diff status '$status' for path '$path'."
                exit 1
                ;;
            esac
          done < <(git diff --cached --name-status HEAD)

      - name: Recheck auto-fix target branch
        id: recheck-target
        uses: actions/github-script@v8
        with:
          script: |
            const { runAutoFixTargetPolicy } = require('./.auto-fix-policy/.github/scripts/auto-fix-style-target.cjs');
            await runAutoFixTargetPolicy({
              github,
              context,
              core,
              noticePrefix: 'Auto-fix style write target',
            });

      - name: Generate GitHub token
        if: steps.recheck-target.outputs.eligible == 'true'
        uses: actions/create-github-app-token@v3
        id: generate-token
        with:
          app-id: ${{ secrets.RELEASE_PLZ_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLZ_APP_PRIVATE_KEY }}
          permission-contents: write

      - name: Commit auto-fix via GraphQL
        if: steps.recheck-target.outputs.eligible == 'true'
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          HEAD_OID="$HEAD_SHA"
          TMP_DIR="$(mktemp -d)"
          trap 'rm -rf "$TMP_DIR"' EXIT
          ADDITIONS_FILE="$TMP_DIR/additions.ndjson"
          DELETIONS_FILE="$TMP_DIR/deletions.ndjson"
          PAYLOAD_FILE="$TMP_DIR/payload.json"
          : > "$ADDITIONS_FILE"
          : > "$DELETIONS_FILE"

          while IFS=$'\t' read -r status path extra; do
            case "$status" in
              M|A)
                contents="$(git cat-file blob ":$path" | base64 -w0)"
                jq -nc --arg p "$path" --arg c "$contents" '{path: $p, contents: $c}' \
                  >> "$ADDITIONS_FILE"
                ;;
              D)
                jq -nc --arg p "$path" '{path: $p}' >> "$DELETIONS_FILE"
                ;;
              *)
                echo "::error::Unsupported auto-fix diff status '$status' for path '$path'."
                exit 1
                ;;
            esac
          done < <(git diff --cached --name-status HEAD)

          jq -n \
            --arg query 'mutation($input: CreateCommitOnBranchInput!) { createCommitOnBranch(input: $input) { commit { url oid } } }' \
            --arg repo "$REPO" \
            --arg branch "$HEAD_REF" \
            --arg headline "ci: auto-fix fmt and clippy" \
            --arg body "Generated by CI style auto-fix.\n\nWorkflow run: $RUN_URL" \
            --arg oid "$HEAD_OID" \
            --slurpfile adds "$ADDITIONS_FILE" \
            --slurpfile dels "$DELETIONS_FILE" \
            '{
              query: $query,
              variables: {
                input: {
                  branch: { repositoryNameWithOwner: $repo, branchName: $branch },
                  message: { headline: $headline, body: $body },
                  expectedHeadOid: $oid,
                  fileChanges: { additions: $adds, deletions: $dels }
                }
              }
            }' > "$PAYLOAD_FILE"

          RESPONSE="$(gh api graphql --input "$PAYLOAD_FILE")"
          NEW_OID="$(jq -r '.data.createCommitOnBranch.commit.oid' <<< "$RESPONSE")"
          NEW_URL="$(jq -r '.data.createCommitOnBranch.commit.url' <<< "$RESPONSE")"
          if [ -z "$NEW_OID" ] || [ "$NEW_OID" = "null" ]; then
            echo "::error::createCommitOnBranch did not return a commit oid"
            echo "$RESPONSE"
            exit 1
          fi
          echo "Created style auto-fix commit $NEW_OID via GraphQL: $NEW_URL"

  wasm-check:
    name: WASM Check
    # Run after the lightweight gates and overlap the long native test tail.
    # This keeps WASM coverage on the critical path only when it is slower than
    # the integration-test shards, instead of always adding a Phase 2b tail.
    #
    # The if-condition uses !cancelled() plus explicit lightweight-gate success
    # checks because wasm-check is always required by ci-success. If we let the
    # default success() semantics interact with any selectively skipped native
    # test job, wasm-check could be skipped and fail aggregation.
    needs: [determine-runner, check-branch-status, check, fmt, clippy]
    if: >-
      ${{ !cancelled()
        && needs.check-branch-status.outputs.has-conflicts != 'true'
        && needs.check.result == 'success'
        && needs.fmt.result == 'success'
        && needs.clippy.result == 'success' }}
    uses: ./.github/workflows/wasm-check.yml
    with:
      runner: ${{ needs.determine-runner.outputs.runner }}
      cargo-build-jobs: ${{ needs.determine-runner.outputs.cargo-build-jobs }}

  publish-check:
    name: Publish Check
    needs: [determine-runner, check-branch-status]
    if: needs.check-branch-status.outputs.has-conflicts != 'true'
    uses: ./.github/workflows/publish-check.yml
    with:
      runner: ${{ needs.determine-runner.outputs.runner }}
      cargo-build-jobs: ${{ needs.determine-runner.outputs.cargo-build-jobs }}

  todo-check:
    name: TODO Check
    needs: [determine-runner, check-branch-status]
    if: needs.check-branch-status.outputs.has-conflicts != 'true'
    uses: ./.github/workflows/todo-check.yml
    with:
      runner: ${{ needs.determine-runner.outputs.runner }}
      cargo-build-jobs: ${{ needs.determine-runner.outputs.cargo-build-jobs }}

  version-markers:
    name: Version Markers Lint
    needs: [check-branch-status]
    if: needs.check-branch-status.outputs.has-conflicts != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run shell-script tests
        run: bash scripts/tests/run-all.sh

      - name: Validate version-sync markers across repo
        run: ./scripts/validate-version-markers.sh

  # Feature flag combination check - release PRs only.
  # Verifies that all documented feature presets compile correctly
  # before publishing to crates.io. Only runs on release-plz branches
  # since feature breakage is most critical at release time.
  feature-check:
    name: Feature Check
    needs: [determine-runner, check-branch-status]
    if: >-
      ${{
        needs.check-branch-status.outputs.has-conflicts != 'true' &&
        (startsWith(github.head_ref || '', 'release-plz-') || startsWith(github.head_ref || '', 'develop-release-plz-'))
      }}
    uses: ./.github/workflows/reinhardt-feature-check.yml
    with:
      runner: ${{ needs.determine-runner.outputs.runner }}
      cargo-build-jobs: ${{ needs.determine-runner.outputs.cargo-build-jobs }}

  security-audit:
    name: Security Audit
    needs: [determine-runner, check-branch-status]
    if: needs.check-branch-status.outputs.has-conflicts != 'true'
    uses: ./.github/workflows/security-audit.yml
    with:
      runner: ${{ needs.determine-runner.outputs.runner }}

  terraform-check:
    name: Terraform Check
    needs: [check-branch-status]
    if: >-
      ${{
        needs.check-branch-status.outputs.has-conflicts != 'true' &&
        needs.check-branch-status.outputs.infra-changed == 'true'
      }}
    uses: ./.github/workflows/terraform-check.yml

  # Release Dry-Run only makes sense for PRs targeting `main`, because
  # release-plz dry-run tracks against `origin/main` and resolves workspace
  # dep versions against crates.io. PRs targeting `develop/*` carry the
  # accumulated next-version (e.g., 0.2.0-rc.1) which is intentionally not
  # yet on crates.io, so dry-run always fails to resolve macro subcrates.
  # Skip on non-main base refs (and on push events that aren't to main).
  release-dry-run:
    name: Release Dry-Run
    needs: [determine-runner, check-branch-status]
    if: >-
      ${{
        needs.check-branch-status.outputs.has-conflicts != 'true' &&
        !startsWith(github.head_ref || '', 'release-plz-') &&
        (github.base_ref == 'main' || (github.event_name == 'push' && github.ref == 'refs/heads/main'))
      }}
    uses: ./.github/workflows/release-plz-dry-run.yml
    with:
      runner: ${{ needs.determine-runner.outputs.runner }}
      cargo-build-jobs: ${{ needs.determine-runner.outputs.cargo-build-jobs }}

  # Phase 2a: Core tests run after lightweight checks pass.
  # These run in parallel with dynamic sharding; broad/full runs use more
  # smaller shards while small affected scopes keep the runner count low.
  # Note: Each job runs on its own runner (no shared disk), so parallel execution is safe.
  # Integration tests are split into intra-crate and cross-crate to reduce disk usage per job.
  unit-test:
    name: Unit Tests
    uses: ./.github/workflows/unit-test.yml
    needs: [check, fmt, clippy, determine-runner, detect-affected]
    if: needs.detect-affected.outputs.has-affected == 'true'
    secrets: inherit
    with:
      runner: ${{ needs.determine-runner.outputs.runner }}
      cargo-build-jobs: ${{ needs.determine-runner.outputs.cargo-build-jobs }}
      nextest-filter: ${{ needs.detect-affected.outputs.nextest-filter }}
      run-all: ${{ needs.detect-affected.outputs.run-all }}
      cargo-packages: ${{ needs.detect-affected.outputs.cargo-packages }}
      partitions-json: ${{ needs.detect-affected.outputs.partitions-json }}
      partition-count: ${{ needs.detect-affected.outputs.partition-count }}

  intra-crate-integration-test:
    name: Intra-Crate Integration Tests
    uses: ./.github/workflows/intra-crate-integration-test.yml
    needs: [check, fmt, clippy, determine-runner, detect-affected]
    if: needs.detect-affected.outputs.has-affected == 'true'
    secrets: inherit
    with:
      runner: ${{ needs.determine-runner.outputs.runner }}
      cargo-build-jobs: ${{ needs.determine-runner.outputs.cargo-build-jobs }}
      nextest-filter: ${{ needs.detect-affected.outputs.nextest-filter }}
      run-all: ${{ needs.detect-affected.outputs.run-all }}
      cargo-packages: ${{ needs.detect-affected.outputs.cargo-packages }}
      partitions-json: ${{ needs.detect-affected.outputs.partitions-json }}
      partition-count: ${{ needs.detect-affected.outputs.partition-count }}

  cross-crate-integration-test:
    name: Cross-Crate Integration Tests
    uses: ./.github/workflows/cross-crate-integration-test.yml
    needs: [check, fmt, clippy, determine-runner, detect-affected]
    if: needs.detect-affected.outputs.has-affected == 'true'
    secrets: inherit
    with:
      runner: ${{ needs.determine-runner.outputs.runner }}
      cargo-build-jobs: ${{ needs.determine-runner.outputs.cargo-build-jobs }}
      nextest-filter: ${{ needs.detect-affected.outputs.nextest-filter }}
      run-all: ${{ needs.detect-affected.outputs.run-all }}
      partitions-json: ${{ needs.detect-affected.outputs.partitions-json }}
      partition-count: ${{ needs.detect-affected.outputs.partition-count }}

  doc-test:
    name: Documentation Tests
    uses: ./.github/workflows/doc-test.yml
    needs: [check, fmt, clippy, determine-runner, detect-affected]
    if: needs.detect-affected.outputs.has-affected == 'true'
    secrets: inherit
    with:
      runner: ${{ needs.determine-runner.outputs.runner }}
      cargo-build-jobs: ${{ needs.determine-runner.outputs.cargo-build-jobs }}
      affected-packages: ${{ needs.detect-affected.outputs.affected-packages }}
      run-all: ${{ needs.detect-affected.outputs.run-all }}

  docs-rs-check:
    name: Docs.rs Build Check
    uses: ./.github/workflows/docs-rs-check.yml
    needs: [check, fmt, clippy, determine-runner]
    with:
      runner: ${{ needs.determine-runner.outputs.runner }}
      cargo-build-jobs: ${{ needs.determine-runner.outputs.cargo-build-jobs }}

  cross-platform-check:
    name: Cross-Platform Check
    uses: ./.github/workflows/cross-platform-check.yml
    needs: [check, fmt, clippy]

  # Phase 2a (continued): UI tests run in parallel with unit/integration tests.
  # Dynamic partitioning keeps small-scope PRs from paying the full shard count.
  ui-test:
    name: UI Tests
    uses: ./.github/workflows/ui-test.yml
    needs: [check, fmt, clippy, determine-runner, detect-affected]
    if: needs.detect-affected.outputs.has-affected == 'true'
    secrets: inherit
    with:
      runner: ${{ needs.determine-runner.outputs.runner }}
      cargo-build-jobs: ${{ needs.determine-runner.outputs.cargo-build-jobs }}
      nextest-filter: ${{ needs.detect-affected.outputs.nextest-filter }}
      run-all: ${{ needs.detect-affected.outputs.run-all }}
      partitions-json: ${{ needs.detect-affected.outputs.partitions-json }}
      partition-count: ${{ needs.detect-affected.outputs.partition-count }}

  # Additional runtime checks. MSRV does not depend on test artifacts, so it
  # starts after lightweight gates and overlaps the long integration-test tail
  # instead of extending the critical path after cross-crate tests finish.
  # Note: examples-test runs as a separate standalone workflow.
  # Coverage runs only on main branch pushes (not on PRs).
  msrv-test:
    name: MSRV Test
    uses: ./.github/workflows/msrv-test.yml
    needs: [check, fmt, clippy, determine-runner, detect-affected]
    if: needs.detect-affected.outputs.has-affected == 'true'
    with:
      runner: ${{ needs.determine-runner.outputs.runner }}
      cargo-build-jobs: ${{ needs.determine-runner.outputs.cargo-build-jobs }}

  # All jobs must pass
  ci-success:
    name: CI Success
    timeout-minutes: 360
    # Aggregate ordinary failures, but do not keep a cancelled run queued and
    # block the newest run in this workflow's concurrency group.
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    needs:
      - check-branch-status
      - determine-runner
      - detect-affected
      - check
      - fmt
      - clippy
      - wasm-check
      - publish-check
      - todo-check
      - feature-check
      - security-audit
      - terraform-check
      - release-dry-run
      - unit-test
      - intra-crate-integration-test
      - cross-crate-integration-test
      - doc-test
      - docs-rs-check
      - ui-test
      - cross-platform-check
      - msrv-test
    steps:
      - name: Verify all required checks passed
        env:
          HAS_CONFLICTS: ${{ needs.check-branch-status.outputs.has-conflicts }}
        run: |
          # If PR has merge conflicts, all jobs are expected to be skipped
          if [[ "$HAS_CONFLICTS" == "true" ]]; then
            echo "::error::PR has merge conflicts. All CI checks were skipped."
            echo "Please resolve conflicts and push again to trigger CI."
            exit 1
          fi

          # Always-required checks (must be 'success')
          always_required=(
            "check:${{ needs.check.result }}"
            "fmt:${{ needs.fmt.result }}"
            "clippy:${{ needs.clippy.result }}"
            "wasm-check:${{ needs.wasm-check.result }}"
            "todo-check:${{ needs.todo-check.result }}"
            "security-audit:${{ needs.security-audit.result }}"
            "docs-rs-check:${{ needs.docs-rs-check.result }}"
            "cross-platform-check:${{ needs.cross-platform-check.result }}"
          )
          for entry in "${always_required[@]}"; do
            name="${entry%%:*}"
            result="${entry#*:}"
            if [[ "$result" != "success" ]]; then
              echo "::error::Required check '$name' failed with result: $result"
              exit 1
            fi
          done

          # Selectively-skippable checks (can be 'success' or 'skipped' when no affected packages)
          selectively_skippable=(
            "unit-test:${{ needs.unit-test.result }}"
            "intra-crate-integration-test:${{ needs.intra-crate-integration-test.result }}"
            "cross-crate-integration-test:${{ needs.cross-crate-integration-test.result }}"
            "doc-test:${{ needs.doc-test.result }}"
            "ui-test:${{ needs.ui-test.result }}"
            "terraform-check:${{ needs.terraform-check.result }}"
            "msrv-test:${{ needs.msrv-test.result }}"
            "feature-check:${{ needs.feature-check.result }}"
          )
          for entry in "${selectively_skippable[@]}"; do
            name="${entry%%:*}"
            result="${entry#*:}"
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "::error::Check '$name' failed with result: $result"
              exit 1
            fi
          done

          # publish-check is skipped on release-plz and fix/release-plz branches (expected)
          publish_check="${{ needs.publish-check.result }}"
          if [[ "$publish_check" != "success" && "$publish_check" != "skipped" ]]; then
            echo "::error::Publish check failed: $publish_check"
            exit 1
          fi
          # release-dry-run is skipped on release-plz branches (expected)
          dry_run="${{ needs.release-dry-run.result }}"
          if [[ "$dry_run" != "success" && "$dry_run" != "skipped" ]]; then
            echo "::error::Release dry-run failed: $dry_run"
            exit 1
          fi
          echo "All CI checks passed!"
