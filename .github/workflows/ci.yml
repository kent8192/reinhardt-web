name: CI

on:
  pull_request:
    # Run CI on PRs targeting any branch
    # (This comment added to re-trigger CI after doc test fix)
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  pull-requests: read
  issues: write
  security-events: write

concurrency:
  group: >-
    ${{ github.workflow }}-${{
      startsWith(github.head_ref || '', 'develop-release-plz-')
        && 'develop-release-plz'
        || startsWith(github.head_ref || '', 'release-plz-')
          && 'release-plz'
        || github.head_ref
        || github.run_id
    }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0

jobs:
  # Check if PR branch has merge conflicts.
  # When conflicts exist, skip all CI jobs to save runner costs.
  check-branch-status:
    name: Check Branch Status
    timeout-minutes: 10
    if: github.event_name == 'pull_request'
    # See infra/github-runners/hotpath-runner-userdata.sh for the canonical hotpath runner labels.
    runs-on: [self-hosted, linux, arm64, reinhardt-hotpath]
    outputs:
      has-conflicts: ${{ steps.check.outputs.has-conflicts }}
      infra-changed: ${{ steps.check-infra.outputs.infra-changed }}
    steps:
      - name: Check if PR has merge conflicts
        id: check
        uses: actions/github-script@v8
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });
            const hasConflicts = pr.mergeable_state === 'dirty';
            core.setOutput('has-conflicts', hasConflicts.toString());
            if (hasConflicts) {
              core.warning('PR has merge conflicts. Skipping CI — please resolve conflicts.');
            }

      - name: Check if infra files changed
        id: check-infra
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100,
            });
            const infraChanged = files.some(f => f.filename.startsWith('infra/'));
            core.setOutput('infra-changed', infraChanged.toString());

  # Determine runner type for CI jobs. The selection logic (Mac local -> AWS
  # Spot -> GitHub-hosted, with fork exclusion and budget circuit breaker) lives
  # in the reusable determine-runner.yml so it is shared with the standalone
  # example workflow (examples-test-standalone.yml) instead of being duplicated.
  determine-runner:
    name: Determine Runner
    uses: ./.github/workflows/determine-runner.yml

  # Detect which packages are affected by the PR changes.
  # Runs in parallel with Phase 1 checks to minimize latency.
  # On release-plz branches or global file changes, all tests run.
  detect-affected:
    name: Detect Affected Packages
    needs: [check-branch-status]
    if: needs.check-branch-status.outputs.has-conflicts != 'true'
    uses: ./.github/workflows/detect-affected-packages.yml

  # Call all reusable workflows
  check:
    name: Check
    needs: [determine-runner, check-branch-status]
    if: needs.check-branch-status.outputs.has-conflicts != 'true'
    uses: ./.github/workflows/check.yml
    with:
      runner: ${{ needs.determine-runner.outputs.runner }}
      cargo-build-jobs: ${{ needs.determine-runner.outputs.cargo-build-jobs }}

  fmt:
    name: Format
    needs: [determine-runner, check-branch-status]
    if: needs.check-branch-status.outputs.has-conflicts != 'true'
    uses: ./.github/workflows/fmt.yml
    with:
      runner: ${{ needs.determine-runner.outputs.runner }}

  clippy:
    name: Clippy
    needs: [determine-runner, check-branch-status]
    if: needs.check-branch-status.outputs.has-conflicts != 'true'
    uses: ./.github/workflows/clippy.yml
    with:
      runner: ${{ needs.determine-runner.outputs.runner }}
      cargo-build-jobs: ${{ needs.determine-runner.outputs.cargo-build-jobs }}

  wasm-check:
    name: WASM Check
    # Deferred to Phase 2b (Issue #4534): release self-hosted runner slots
    # ~10 min earlier for jobs blocked on Spot vCPU quota. wasm-check only
    # starts once unit-test and intra-crate-integration-test have completed.
    #
    # The if-condition uses !cancelled() + explicit success/skipped checks
    # because unit-test / intra-crate-integration-test are gated on
    # detect-affected (selectively skipped when no Rust packages are affected).
    # Without these guards, the default success() semantics on `needs:` would
    # cascade the skip to wasm-check, and ci-success (which lists wasm-check in
    # always_required) would then fail on wasm-check.result == "skipped".
    # CodeRabbit review feedback on PR #4574.
    needs: [determine-runner, check-branch-status, unit-test, intra-crate-integration-test]
    if: >-
      ${{ !cancelled()
        && needs.check-branch-status.outputs.has-conflicts != 'true'
        && (needs.unit-test.result == 'success' || needs.unit-test.result == 'skipped')
        && (needs.intra-crate-integration-test.result == 'success' || needs.intra-crate-integration-test.result == 'skipped') }}
    uses: ./.github/workflows/wasm-check.yml
    with:
      runner: ${{ needs.determine-runner.outputs.runner }}
      cargo-build-jobs: ${{ needs.determine-runner.outputs.cargo-build-jobs }}

  publish-check:
    name: Publish Check
    needs: [determine-runner, check-branch-status]
    if: needs.check-branch-status.outputs.has-conflicts != 'true'
    uses: ./.github/workflows/publish-check.yml
    with:
      runner: ${{ needs.determine-runner.outputs.runner }}
      cargo-build-jobs: ${{ needs.determine-runner.outputs.cargo-build-jobs }}

  todo-check:
    name: TODO Check
    needs: [determine-runner, check-branch-status]
    if: needs.check-branch-status.outputs.has-conflicts != 'true'
    uses: ./.github/workflows/todo-check.yml
    with:
      runner: ${{ needs.determine-runner.outputs.runner }}
      cargo-build-jobs: ${{ needs.determine-runner.outputs.cargo-build-jobs }}

  version-markers:
    name: Version Markers Lint
    needs: [check-branch-status]
    if: needs.check-branch-status.outputs.has-conflicts != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run shell-script tests
        run: bash scripts/tests/run-all.sh

      - name: Validate version-sync markers across repo
        run: ./scripts/validate-version-markers.sh

  # Feature flag combination check - release PRs only.
  # Verifies that all documented feature presets compile correctly
  # before publishing to crates.io. Only runs on release-plz branches
  # since feature breakage is most critical at release time.
  feature-check:
    name: Feature Check
    needs: [determine-runner, check-branch-status]
    if: >-
      ${{
        needs.check-branch-status.outputs.has-conflicts != 'true' &&
        (startsWith(github.head_ref || '', 'release-plz-') || startsWith(github.head_ref || '', 'develop-release-plz-'))
      }}
    uses: ./.github/workflows/reinhardt-feature-check.yml
    with:
      runner: ${{ needs.determine-runner.outputs.runner }}
      cargo-build-jobs: ${{ needs.determine-runner.outputs.cargo-build-jobs }}

  security-audit:
    name: Security Audit
    needs: [determine-runner, check-branch-status]
    if: needs.check-branch-status.outputs.has-conflicts != 'true'
    uses: ./.github/workflows/security-audit.yml
    with:
      runner: ${{ needs.determine-runner.outputs.runner }}

  terraform-check:
    name: Terraform Check
    needs: [check-branch-status]
    if: >-
      ${{
        needs.check-branch-status.outputs.has-conflicts != 'true' &&
        needs.check-branch-status.outputs.infra-changed == 'true'
      }}
    uses: ./.github/workflows/terraform-check.yml

  # Release Dry-Run only makes sense for PRs targeting `main`, because
  # release-plz dry-run tracks against `origin/main` and resolves workspace
  # dep versions against crates.io. PRs targeting `develop/*` carry the
  # accumulated next-version (e.g., 0.2.0-rc.1) which is intentionally not
  # yet on crates.io, so dry-run always fails to resolve macro subcrates.
  # Skip on non-main base refs (and on push events that aren't to main).
  release-dry-run:
    name: Release Dry-Run
    needs: [determine-runner, check-branch-status]
    if: >-
      ${{
        needs.check-branch-status.outputs.has-conflicts != 'true' &&
        !startsWith(github.head_ref || '', 'release-plz-') &&
        (github.base_ref == 'main' || (github.event_name == 'push' && github.ref == 'refs/heads/main'))
      }}
    uses: ./.github/workflows/release-plz-dry-run.yml
    with:
      runner: ${{ needs.determine-runner.outputs.runner }}
      cargo-build-jobs: ${{ needs.determine-runner.outputs.cargo-build-jobs }}

  # Phase 2a: Core tests run after lightweight checks pass.
  # These run in parallel (up to ~17 self-hosted runners).
  # Note: Each job runs on its own runner (no shared disk), so parallel execution is safe.
  # Integration tests are split into intra-crate and cross-crate to reduce disk usage per job.
  unit-test:
    name: Unit Tests
    uses: ./.github/workflows/unit-test.yml
    needs: [check, fmt, clippy, determine-runner, detect-affected]
    if: needs.detect-affected.outputs.has-affected == 'true'
    secrets: inherit
    with:
      runner: ${{ needs.determine-runner.outputs.runner }}
      cargo-build-jobs: ${{ needs.determine-runner.outputs.cargo-build-jobs }}
      nextest-filter: ${{ needs.detect-affected.outputs.nextest-filter }}
      run-all: ${{ needs.detect-affected.outputs.run-all }}
      cargo-packages: ${{ needs.detect-affected.outputs.cargo-packages }}
      partitions-json: ${{ needs.detect-affected.outputs.partitions-json }}
      partition-count: ${{ needs.detect-affected.outputs.partition-count }}

  intra-crate-integration-test:
    name: Intra-Crate Integration Tests
    uses: ./.github/workflows/intra-crate-integration-test.yml
    needs: [check, fmt, clippy, determine-runner, detect-affected]
    if: needs.detect-affected.outputs.has-affected == 'true'
    secrets: inherit
    with:
      runner: ${{ needs.determine-runner.outputs.runner }}
      cargo-build-jobs: ${{ needs.determine-runner.outputs.cargo-build-jobs }}
      nextest-filter: ${{ needs.detect-affected.outputs.nextest-filter }}
      run-all: ${{ needs.detect-affected.outputs.run-all }}
      cargo-packages: ${{ needs.detect-affected.outputs.cargo-packages }}
      partitions-json: ${{ needs.detect-affected.outputs.partitions-json }}
      partition-count: ${{ needs.detect-affected.outputs.partition-count }}

  cross-crate-integration-test:
    name: Cross-Crate Integration Tests
    uses: ./.github/workflows/cross-crate-integration-test.yml
    needs: [check, fmt, clippy, determine-runner, detect-affected]
    if: needs.detect-affected.outputs.has-affected == 'true'
    secrets: inherit
    with:
      runner: ${{ needs.determine-runner.outputs.runner }}
      cargo-build-jobs: ${{ needs.determine-runner.outputs.cargo-build-jobs }}
      nextest-filter: ${{ needs.detect-affected.outputs.nextest-filter }}
      run-all: ${{ needs.detect-affected.outputs.run-all }}

  doc-test:
    name: Documentation Tests
    uses: ./.github/workflows/doc-test.yml
    needs: [check, fmt, clippy, determine-runner, detect-affected]
    if: needs.detect-affected.outputs.has-affected == 'true'
    secrets: inherit
    with:
      runner: ${{ needs.determine-runner.outputs.runner }}
      cargo-build-jobs: ${{ needs.determine-runner.outputs.cargo-build-jobs }}
      affected-packages: ${{ needs.detect-affected.outputs.affected-packages }}
      run-all: ${{ needs.detect-affected.outputs.run-all }}

  docs-rs-check:
    name: Docs.rs Build Check
    uses: ./.github/workflows/docs-rs-check.yml
    needs: [check, fmt, clippy, determine-runner]
    with:
      runner: ${{ needs.determine-runner.outputs.runner }}
      cargo-build-jobs: ${{ needs.determine-runner.outputs.cargo-build-jobs }}

  cross-platform-check:
    name: Cross-Platform Check
    uses: ./.github/workflows/cross-platform-check.yml
    needs: [check, fmt, clippy]

  # Phase 2a (continued): UI tests run in parallel with unit/integration tests.
  # Dynamic partitioning reduces runner count for small-scope PRs,
  # mitigating vCPU quota pressure from parallel execution.
  ui-test:
    name: UI Tests
    uses: ./.github/workflows/ui-test.yml
    needs: [check, fmt, clippy, determine-runner, detect-affected]
    if: needs.detect-affected.outputs.has-affected == 'true'
    secrets: inherit
    with:
      runner: ${{ needs.determine-runner.outputs.runner }}
      cargo-build-jobs: ${{ needs.determine-runner.outputs.cargo-build-jobs }}
      nextest-filter: ${{ needs.detect-affected.outputs.nextest-filter }}
      run-all: ${{ needs.detect-affected.outputs.run-all }}
      partitions-json: ${{ needs.detect-affected.outputs.partitions-json }}
      partition-count: ${{ needs.detect-affected.outputs.partition-count }}

  # Phase 2b: Additional tests run after core tests complete.
  # This phased approach prevents exceeding the Spot vCPU quota by
  # ensuring Phase 2a runners have terminated before Phase 2b starts.
  # Note: examples-test runs as a separate standalone workflow.
  # Coverage runs only on main branch pushes (not on PRs).
  msrv-test:
    name: MSRV Test
    uses: ./.github/workflows/msrv-test.yml
    needs: [unit-test, intra-crate-integration-test, cross-crate-integration-test, determine-runner]
    with:
      runner: ${{ needs.determine-runner.outputs.runner }}
      cargo-build-jobs: ${{ needs.determine-runner.outputs.cargo-build-jobs }}

  # All jobs must pass
  ci-success:
    name: CI Success
    timeout-minutes: 360
    if: always()
    runs-on: ubuntu-latest
    needs:
      - check-branch-status
      - determine-runner
      - detect-affected
      - check
      - fmt
      - clippy
      - wasm-check
      - publish-check
      - todo-check
      - feature-check
      - security-audit
      - terraform-check
      - release-dry-run
      - unit-test
      - intra-crate-integration-test
      - cross-crate-integration-test
      - doc-test
      - docs-rs-check
      - ui-test
      - cross-platform-check
      - msrv-test
    steps:
      - name: Verify all required checks passed
        env:
          HAS_CONFLICTS: ${{ needs.check-branch-status.outputs.has-conflicts }}
        run: |
          # If PR has merge conflicts, all jobs are expected to be skipped
          if [[ "$HAS_CONFLICTS" == "true" ]]; then
            echo "::error::PR has merge conflicts. All CI checks were skipped."
            echo "Please resolve conflicts and push again to trigger CI."
            exit 1
          fi

          # Always-required checks (must be 'success')
          always_required=(
            "check:${{ needs.check.result }}"
            "fmt:${{ needs.fmt.result }}"
            "clippy:${{ needs.clippy.result }}"
            "wasm-check:${{ needs.wasm-check.result }}"
            "todo-check:${{ needs.todo-check.result }}"
            "security-audit:${{ needs.security-audit.result }}"
            "docs-rs-check:${{ needs.docs-rs-check.result }}"
            "cross-platform-check:${{ needs.cross-platform-check.result }}"
          )
          for entry in "${always_required[@]}"; do
            name="${entry%%:*}"
            result="${entry#*:}"
            if [[ "$result" != "success" ]]; then
              echo "::error::Required check '$name' failed with result: $result"
              exit 1
            fi
          done

          # Selectively-skippable checks (can be 'success' or 'skipped' when no affected packages)
          selectively_skippable=(
            "unit-test:${{ needs.unit-test.result }}"
            "intra-crate-integration-test:${{ needs.intra-crate-integration-test.result }}"
            "cross-crate-integration-test:${{ needs.cross-crate-integration-test.result }}"
            "doc-test:${{ needs.doc-test.result }}"
            "ui-test:${{ needs.ui-test.result }}"
            "terraform-check:${{ needs.terraform-check.result }}"
            "msrv-test:${{ needs.msrv-test.result }}"
            "feature-check:${{ needs.feature-check.result }}"
          )
          for entry in "${selectively_skippable[@]}"; do
            name="${entry%%:*}"
            result="${entry#*:}"
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "::error::Check '$name' failed with result: $result"
              exit 1
            fi
          done

          # publish-check is skipped on release-plz and fix/release-plz branches (expected)
          publish_check="${{ needs.publish-check.result }}"
          if [[ "$publish_check" != "success" && "$publish_check" != "skipped" ]]; then
            echo "::error::Publish check failed: $publish_check"
            exit 1
          fi
          # release-dry-run is skipped on release-plz branches (expected)
          dry_run="${{ needs.release-dry-run.result }}"
          if [[ "$dry_run" != "success" && "$dry_run" != "skipped" ]]; then
            echo "::error::Release dry-run failed: $dry_run"
            exit 1
          fi
          echo "All CI checks passed!"
