name: Security Audit

on:
  workflow_call:
    inputs:
      runner:
        description: 'Runner label JSON'
        type: string
        default: '"ubuntu-latest"'
  workflow_dispatch:
  schedule:
    # Run weekly on Monday at 00:00 UTC
    - cron: '0 0 * * 1'

env:
  CARGO_TERM_COLOR: always

jobs:
  security-audit:
    name: Scan for known vulnerabilities
    runs-on: ${{ fromJSON(inputs.runner || '"ubuntu-latest"') }}
    timeout-minutes: 360
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: ./.github/actions/setup-rust

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Run cargo audit
        run: |
          cargo audit \
            --ignore RUSTSEC-2023-0071 \
            --ignore RUSTSEC-2026-0002 \
            --ignore RUSTSEC-2026-0020 \
            --ignore RUSTSEC-2026-0021 \
            --ignore RUSTSEC-2026-0022 \
            --ignore RUSTSEC-2026-0006 \
            --ignore RUSTSEC-2025-0009 \
            --ignore RUSTSEC-2023-0089 \
            --ignore RUSTSEC-2025-0141 \
            --ignore RUSTSEC-2021-0141 \
            --ignore RUSTSEC-2025-0057 \
            --ignore RUSTSEC-2024-0384 \
            --ignore RUSTSEC-2024-0436 \
            --ignore RUSTSEC-2024-0370 \
            --ignore RUSTSEC-2025-0010 \
            --ignore RUSTSEC-2025-0134 \
            --ignore RUSTSEC-2024-0320 \
            --ignore RUSTSEC-2026-0049 \
            --ignore RUSTSEC-2026-0066 \
            --ignore RUSTSEC-2026-0098 \
            --ignore RUSTSEC-2026-0099 \
            --ignore RUSTSEC-2026-0104
