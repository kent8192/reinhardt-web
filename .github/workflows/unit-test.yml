name: Unit Tests

on:
  workflow_call:
    inputs:
      runner:
        description: 'Runner label JSON. Use "\"ubuntu-latest\"" for GitHub-hosted or "[\"self-hosted\",\"linux\",\"arm64\",\"reinhardt-ci\"]" for self-hosted.'
        type: string
        default: '"ubuntu-latest"'
      cargo-build-jobs:
        description: "Parallel cargo build jobs (1=GitHub-hosted OOM safe, 8=self-hosted)"
        type: string
        default: "1"
      nextest-filter:
        description: "Nextest filter expression for affected packages"
        type: string
        default: ""
      run-all:
        description: "Whether to run all tests"
        type: string
        default: "true"
      cargo-packages:
        description: "Newline-separated list of packages to compile (affected + rdeps). Issue #2878"
        type: string
        default: ""
      partitions-json:
        description: "JSON array of partition indices for dynamic matrix. Issue #2881"
        type: string
        default: "[1,2,3,4,5,6,7,8]"
      partition-count:
        description: "Total partition count for nextest --partition. Issue #2881"
        type: string
        default: "8"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_TARGET_DIR: /tmp/cargo_target
  CARGO_INCREMENTAL: 0
  CARGO_BUILD_JOBS: ${{ inputs.cargo-build-jobs || '1' }}
  CARGO_PROFILE_DEV_DEBUG: line-tables-only
  CARGO_PROFILE_TEST_DEBUG: line-tables-only
  RUST_MIN_STACK: 8388608  # 8MB - prevent stack overflow in deep async fixture chains

jobs:
  unit-test:
    name: Unit Tests (${{ matrix.partition }}/${{ inputs.partition-count || '8' }})
    runs-on: ${{ fromJSON(inputs.runner) }}
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        partition: ${{ fromJSON(inputs.partitions-json || '[1,2,3,4,5,6,7,8]') }}
    steps:
      - name: Free Disk Space (Ubuntu)
        if: ${{ !contains(inputs.runner, 'self-hosted') }}
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Login to Docker Hub
        uses: ./.github/actions/docker-login
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          token: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Setup protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "28.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install mold linker and build dependencies
        run: |
          sudo systemctl stop unattended-upgrades || true
          sudo apt-get update -o DPkg::Lock::Timeout=120
          sudo apt-get install -y -o DPkg::Lock::Timeout=120 mold clang lld build-essential
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*

      - name: Install cargo-make
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-make

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - name: Additional disk cleanup before tests
        if: ${{ !contains(inputs.runner, 'self-hosted') }}
        run: |
          echo "Disk usage before additional cleanup:"
          df -h
          # Remove apt cache
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/* || true
          # Remove old Docker resources
          docker system prune -af --volumes || true
          # Remove Docker builder cache
          docker builder prune -af || true
          # Remove pip cache
          rm -rf ~/.cache/pip || true
          # Remove npm cache
          rm -rf ~/.npm || true
          # Remove yarn cache
          rm -rf ~/.cache/yarn || true
          # Remove Gradle cache
          rm -rf ~/.gradle || true
          # Remove Maven cache
          rm -rf ~/.m2 || true
          echo "Disk usage after additional cleanup:"
          df -h

      - name: Pre-pull Docker images
        run: |
          if [ -f .github/docker-images-unit-test.txt ]; then
            while IFS= read -r image || [ -n "$image" ]; do
              # Skip empty lines and comments
              [[ -z "$image" || "$image" =~ ^# ]] && continue
              echo "Pulling image: $image"
              docker pull "$image" || echo "Warning: Failed to pull $image"
            done < .github/docker-images-unit-test.txt
          fi

      - name: Run unit tests (partition ${{ matrix.partition }}/${{ inputs.partition-count || '8' }})
        env:
          RUSTFLAGS: "-C linker=clang -C link-arg=-fuse-ld=mold"
          NEXTEST_FILTER_EXPR: ${{ inputs.nextest-filter }}
          RUN_ALL: ${{ inputs.run-all }}
          CARGO_PACKAGES: ${{ inputs.cargo-packages }}
          PARTITION_COUNT: ${{ inputs.partition-count || '8' }}
        run: |
          # Build package selection args. Issue #2878
          # When run-all is true or no cargo-packages provided, use --workspace.
          # Otherwise, use -p flags to compile only affected packages + rdeps.
          #
          # `cargo test --lib -p <bin-only-pkg>` errors with "no library targets
          # found" (see issue #3734), so filter out packages that lack a library
          # target before building the -p list. `--workspace --lib` is itself
          # tolerant of bin-only members and only tests the packages that do
          # have a lib, so the fallback path is unaffected.
          PKG_ARGS=()
          if [[ "$RUN_ALL" != "true" && -n "$CARGO_PACKAGES" ]]; then
            # Capture `cargo metadata` with an explicit guard: bash `set -e`
            # does NOT propagate failures through command substitutions inside
            # assignments, so without this check a non-zero exit (or empty
            # output) would silently cause every package to be filtered out
            # and the job would exit 0 without running any tests (issue #3736).
            if ! METADATA_JSON="$(cargo metadata --format-version 1 --no-deps)" || [[ -z "$METADATA_JSON" ]]; then
              echo "Failed to generate cargo metadata for package filtering." >&2
              exit 1
            fi
            # Treat any library-like target kind as acceptable for `--lib`
            # testing. `cargo metadata` reports proc-macro crates with
            # `"kind": ["proc-macro"]` (not `"lib"`), and they do compile and
            # run tests under `--lib`; checking only `"lib"` would silently
            # drop coverage for them (issue #3736).
            while IFS= read -r pkg; do
              [[ -z "$pkg" ]] && continue
              has_lib="$(jq -r --arg pkg "$pkg" '
                [.packages[]
                  | select(.name == $pkg)
                  | .targets[]
                  | select(any(.kind[];
                      . == "lib"
                      or . == "proc-macro"
                      or . == "rlib"
                      or . == "dylib"
                      or . == "cdylib"
                      or . == "staticlib"))]
                | length > 0' <<< "$METADATA_JSON")"
              if [[ "$has_lib" == "true" ]]; then
                PKG_ARGS+=(-p "$pkg")
              else
                echo "Skipping package with no library-like target for --lib unit tests: $pkg"
              fi
            done <<< "$CARGO_PACKAGES"
            if [[ ${#PKG_ARGS[@]} -eq 0 ]]; then
              echo "No affected packages expose a library-like target; nothing to test in this job."
              exit 0
            fi
          fi
          if [[ ${#PKG_ARGS[@]} -eq 0 ]]; then
            PKG_ARGS=(--workspace)
          fi

          FILTER_ARGS=()
          if [[ "$RUN_ALL" != "true" && -n "$NEXTEST_FILTER_EXPR" ]]; then
            FILTER_ARGS+=(-E "$NEXTEST_FILTER_EXPR")
          fi
          cargo nextest run \
            "${PKG_ARGS[@]}" \
            --lib \
            --all-features \
            --partition hash:${{ matrix.partition }}/$PARTITION_COUNT \
            --no-fail-fast \
            --no-tests=warn \
            --status-level=none \
            --final-status-level=none \
            "${FILTER_ARGS[@]}"

      - name: Docker cleanup after unit tests
        if: always()
        run: docker system prune -af
