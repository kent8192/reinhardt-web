name: WASM Check

on:
  workflow_call:
    inputs:
      runner:
        description: 'Runner label JSON'
        type: string
        default: '"ubuntu-latest"'
      cargo-build-jobs:
        description: "Parallel cargo build jobs"
        type: string
        default: "1"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_TARGET_DIR: /tmp/cargo_target
  CARGO_INCREMENTAL: 0
  CARGO_BUILD_JOBS: ${{ inputs.cargo-build-jobs || '1' }}

jobs:
  wasm-check:
    name: WASM Check (${{ matrix.target.name }})
    runs-on: ${{ fromJSON(inputs.runner || '"ubuntu-latest"') }}
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        target:
          # Root crate with default features (existing check)
          - name: reinhardt-web
            package: reinhardt-web
            flags: ""
          # Root crate with WASM application features
          - name: reinhardt-web (wasm-features)
            package: reinhardt-web
            flags: "--no-default-features --features pages,client-router,pages-web-sys-full,di"
          # WASM frontend framework with all features
          - name: reinhardt-pages
            package: reinhardt-pages
            flags: "--all-features"
          # Platform-agnostic query builder
          - name: reinhardt-query
            package: reinhardt-query
            flags: "--no-default-features"
    steps:
      - name: Free Disk Space (Ubuntu)
        if: ${{ !contains(inputs.runner || '', 'self-hosted') }}
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          cache-key: "wasm-check-${{ matrix.target.name }}"

      - name: Install wasm32-unknown-unknown target
        run: rustup target add wasm32-unknown-unknown

      - name: Run cargo check for WASM target (${{ matrix.target.name }})
        env:
          # Pass matrix values through env to avoid direct shell injection.
          # Values are workflow-defined constants (not user input).
          TARGET_PACKAGE: ${{ matrix.target.package }}
          TARGET_FLAGS: ${{ matrix.target.flags }}
        run: |
          cargo check \
            --target wasm32-unknown-unknown \
            -p "${TARGET_PACKAGE}" \
            ${TARGET_FLAGS} \
            --quiet

  # Run existing wasm_bindgen_test tests in headless Chrome.
  # Catches runtime errors in WASM code paths that cargo check cannot detect.
  # Invocation paths:
  #   - PRs via ci.yml (workflow_call)
  #   - Pushes to main via wasm-check-standalone.yml (workflow_call)
  #   - Manual workflow_dispatch
  # Per-feature-branch pushes do not pay the headless Chrome cost.
  wasm-test:
    name: WASM Test (headless Chrome)
    # Always use GitHub-hosted x86_64 runner: browser-actions/setup-chrome
    # does not support ARM64 Linux (Fixes #3491)
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      CARGO_BUILD_JOBS: 1
    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          cache-key: "wasm-test"

      - name: Install wasm32-unknown-unknown target
        run: rustup target add wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: stable
          install-chromedriver: true

      - name: Run WASM lib tests (reinhardt-pages)
        working-directory: crates/reinhardt-pages
        # Run lib-level wasm_bindgen_test tests via wasm-pack.
        # This also caches the wasm-bindgen-test-runner binary for the next step.
        run: wasm-pack test --headless --chrome --lib

      - name: Run WASM integration tests (reinhardt-pages)
        working-directory: crates/reinhardt-pages
        # wasm-pack places extra args after `--` in cargo test (going to the test
        # binary), but --test is a cargo flag. So we invoke cargo test directly
        # with the runner that wasm-pack cached. (See #3365)
        run: |
          RUNNER=$(find "${HOME}/.cache/.wasm-pack" -name "wasm-bindgen-test-runner" -type f 2>/dev/null | head -1)
          CARGO_TARGET_WASM32_UNKNOWN_UNKNOWN_RUNNER="$RUNNER" \
          CHROMEDRIVER="$(which chromedriver)" \
          WASM_BINDGEN_TEST_ONLY_WEB=1 \
            cargo test --target wasm32-unknown-unknown \
              --test csrf_wasm_test --test server_fn_wasm_test \
              --test client_launcher_navigation_test

  # Native e2e regression test for the SPA link interceptor -> Router::push
  # -> re-render path. Boots a Chrome container via testcontainers and drives
  # it through the fixture SPA. Refs #4088.
  e2e-test:
    name: E2E Test (Chrome via CDP)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          cache-key: "e2e-cdp-test"

      - name: Install wasm32-unknown-unknown target
        run: rustup target add wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Pull headless-shell image (warm cache)
        run: docker pull chromedp/headless-shell:latest

      - name: Run e2e_cdp regression test
        run: |
          cargo test \
            -p reinhardt-pages \
            --features e2e-cdp-test \
            --test spa_navigation_e2e_test \
            -- --nocapture
