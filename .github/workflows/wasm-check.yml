name: WASM Check

on:
  workflow_call:
    inputs:
      runner:
        description: 'Runner label JSON'
        type: string
        default: '"ubuntu-latest"'
      cargo-build-jobs:
        description: "Parallel cargo build jobs"
        type: string
        default: "1"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_TARGET_DIR: /tmp/cargo_target
  CARGO_INCREMENTAL: 0
  CARGO_BUILD_JOBS: ${{ inputs.cargo-build-jobs || '1' }}

jobs:
  # Verify the WASM-target build for the four base targets and four
  # client-side feature presets. Replaces the former `wasm-check` job;
  # entries 1-4 reproduce its coverage and entries 5-8 add representative
  # client-side feature combinations.
  wasm-feature-check:
    name: WASM Feature Check (${{ matrix.combo.name }})
    runs-on: ${{ fromJSON(inputs.runner || '"ubuntu-latest"') }}
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        combo:
          # --- Base targets (parity with former wasm-check job) ---
          - { name: "reinhardt-web (default)",            pkg: "reinhardt-web",   features: "",                                              no_default: "false", all_features: "false" }
          - { name: "reinhardt-web (wasm-app)",           pkg: "reinhardt-web",   features: "pages,client-router,pages-web-sys-full,di",     no_default: "true",  all_features: "false" }
          - { name: "reinhardt-pages (full)",             pkg: "reinhardt-pages", features: "",                                              no_default: "false", all_features: "true"  }
          - { name: "reinhardt-query (no-default)",       pkg: "reinhardt-query", features: "",                                              no_default: "true",  all_features: "false" }
          # --- Client-side feature combinations ---
          - { name: "reinhardt-web (minimal+pages)",      pkg: "reinhardt-web",   features: "minimal,pages",                                 no_default: "true",  all_features: "false" }
          - { name: "reinhardt-web (minimal+pages+client-router)", pkg: "reinhardt-web", features: "minimal,pages,client-router",            no_default: "true",  all_features: "false" }
          - { name: "reinhardt-web (minimal+pages+di)",   pkg: "reinhardt-web",   features: "minimal,pages,di",                              no_default: "true",  all_features: "false" }
          - { name: "reinhardt-core (core-full)",         pkg: "reinhardt-core",  features: "core-full",                                     no_default: "true",  all_features: "false" }
    steps:
      - name: Free Disk Space (Ubuntu)
        if: ${{ !contains(inputs.runner || '', 'self-hosted') }}
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          cache: 'false'

      - name: Cache Rust dependencies (shared)
        uses: Swatinem/rust-cache@v2
        with:
          # All matrix entries restore from a single shared cache seeded by
          # wasm-check-standalone.yml on push to main. Total cache footprint
          # ~1-2 GB instead of 8 x ~300 MB per-entry caches.
          shared-key: "wasm-feature-check"
          cache-targets: "false"
          cache-directories: /tmp/cargo_target
          cache-on-failure: "true"
          # PR runs only restore; main push seeds. Avoids matrix entries
          # competing to save the same key.
          save-if: "false"

      - name: Install wasm32-unknown-unknown target
        run: rustup target add wasm32-unknown-unknown

      - name: Run cargo check for WASM target (${{ matrix.combo.name }})
        env:
          # Pass matrix values through env to avoid direct shell injection.
          # Values are workflow-defined constants (not user input).
          PKG: ${{ matrix.combo.pkg }}
          FEATURES: ${{ matrix.combo.features }}
          NO_DEFAULT: ${{ matrix.combo.no_default }}
          ALL_FEATURES: ${{ matrix.combo.all_features }}
        run: |
          FLAGS="-p ${PKG}"
          if [ "${NO_DEFAULT}" = "true" ]; then
            FLAGS="${FLAGS} --no-default-features"
          fi
          if [ "${ALL_FEATURES}" = "true" ]; then
            FLAGS="${FLAGS} --all-features"
          elif [ -n "${FEATURES}" ]; then
            FLAGS="${FLAGS} --features ${FEATURES}"
          fi
          cargo check --target wasm32-unknown-unknown ${FLAGS} --quiet

  # Run clippy against wasm32-unknown-unknown for the same targets as wasm-check.
  # Catches lint violations in cfg(target_arch = "wasm32") code paths and
  # wasm-specific trait/inference differences that the host clippy never sees.
  wasm-clippy:
    name: WASM Clippy (${{ matrix.target.name }})
    runs-on: ${{ fromJSON(inputs.runner || '"ubuntu-latest"') }}
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: reinhardt-web
            package: reinhardt-web
            flags: ""
          - name: reinhardt-web (wasm-features)
            package: reinhardt-web
            flags: "--no-default-features --features pages,client-router,pages-web-sys-full,di"
          - name: reinhardt-pages
            package: reinhardt-pages
            flags: "--all-features"
          - name: reinhardt-query
            package: reinhardt-query
            flags: "--no-default-features"
    steps:
      - name: Free Disk Space (Ubuntu)
        if: ${{ !contains(inputs.runner || '', 'self-hosted') }}
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Rust with clippy
        uses: ./.github/actions/setup-rust
        with:
          components: clippy
          cache-key: "wasm-clippy-${{ matrix.target.name }}"
          # Cache-seed pattern (Issue #4536, mirrors unit-test.yml): PR runs
          # restore from main's cache but do not save their own entries.
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install wasm32-unknown-unknown target
        run: rustup target add wasm32-unknown-unknown

      - name: Run clippy for WASM target (${{ matrix.target.name }})
        env:
          # Pass matrix values through env to avoid direct shell injection.
          # Values are workflow-defined constants (not user input).
          TARGET_PACKAGE: ${{ matrix.target.package }}
          TARGET_FLAGS: ${{ matrix.target.flags }}
        run: |
          # Scope to library targets only. Test targets in dependent crates
          # (e.g. mio via tokio) do not compile to wasm32-unknown-unknown,
          # so --all-targets would always fail compile before lint stage.
          cargo clippy \
            --target wasm32-unknown-unknown \
            -p "${TARGET_PACKAGE}" \
            ${TARGET_FLAGS} \
            --lib \
            -- -D warnings

  # Run existing wasm_bindgen_test tests in headless Chrome.
  # Catches runtime errors in WASM code paths that cargo check cannot detect.
  # Invocation paths:
  #   - PRs via ci.yml (workflow_call)
  #   - Pushes to main via wasm-check-standalone.yml (workflow_call)
  #   - Manual workflow_dispatch
  # Per-feature-branch pushes do not pay the headless Chrome cost.
  #
  # Deferred to Phase 2b (Issue #4534): release self-hosted runner slots ~10 min
  # earlier for jobs blocked on Spot vCPU quota. The defer is implemented in the
  # orchestrator workflow (.github/workflows/ci.yml) by extending the
  # `wasm-check` caller job's `needs:` list with `unit-test` and
  # `intra-crate-integration-test`; reusable workflows cannot declare cross-
  # workflow needs themselves.
  wasm-test:
    name: WASM Test (headless Chrome)
    # Always use GitHub-hosted x86_64 runner: browser-actions/setup-chrome
    # does not support ARM64 Linux (Fixes #3491)
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      CARGO_BUILD_JOBS: 1
    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          cache-key: "wasm-test"
          # Cache-seed pattern (Issue #4536, mirrors unit-test.yml): PR runs
          # restore from main's cache but do not save their own entries.
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install wasm32-unknown-unknown target
        run: rustup target add wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: stable
          install-chromedriver: true

      - name: Run WASM lib tests (reinhardt-pages)
        working-directory: crates/reinhardt-pages
        # Run lib-level wasm_bindgen_test tests via wasm-pack.
        # This also caches the wasm-bindgen-test-runner binary for the next step.
        run: wasm-pack test --headless --chrome --lib

      - name: Run WASM integration tests (reinhardt-pages)
        working-directory: crates/reinhardt-pages
        # wasm-pack places extra args after `--` in cargo test (going to the test
        # binary), but --test is a cargo flag. So we invoke cargo test directly
        # with the runner that wasm-pack cached. (See #3365)
        run: |
          RUNNER=$(find "${HOME}/.cache/.wasm-pack" -name "wasm-bindgen-test-runner" -type f 2>/dev/null | head -1)
          if [ -z "$RUNNER" ]; then
            echo "::error::wasm-bindgen-test-runner not found under ${HOME}/.cache/.wasm-pack. The preceding wasm-pack step should have cached it; check that step's logs."
            exit 1
          fi
          CARGO_TARGET_WASM32_UNKNOWN_UNKNOWN_RUNNER="$RUNNER" \
          CHROMEDRIVER="$(which chromedriver)" \
          WASM_BINDGEN_TEST_ONLY_WEB=1 \
            cargo test --target wasm32-unknown-unknown \
              --features testing \
              --test csrf_wasm_test --test server_fn_wasm_test \
              --test client_launcher_navigation_test

      - name: Run WASM observer-system tests (reinhardt-urls)
        working-directory: crates/reinhardt-urls
        # Mirrors the pages integration step pattern. The three urls-side
        # tests under tests/wasm/ are gated by `required-features =
        # ["wasm-diag-test"]`, so the feature flag is required to compile
        # them. Reuses the wasm-bindgen-test-runner cached by the pages
        # lib step above. (Refs #4234)
        run: |
          RUNNER=$(find "${HOME}/.cache/.wasm-pack" -name "wasm-bindgen-test-runner" -type f 2>/dev/null | head -1)
          if [ -z "$RUNNER" ]; then
            echo "::error::wasm-bindgen-test-runner not found under ${HOME}/.cache/.wasm-pack. The preceding wasm-pack step should have cached it; check that step's logs."
            exit 1
          fi
          CARGO_TARGET_WASM32_UNKNOWN_UNKNOWN_RUNNER="$RUNNER" \
          CHROMEDRIVER="$(which chromedriver)" \
          WASM_BINDGEN_TEST_ONLY_WEB=1 \
            cargo test --target wasm32-unknown-unknown \
              --features wasm-diag-test \
              --test client_router_observer_dispatch_test \
              --test client_router_subscription_drop_test \
              --test client_router_listener_panic_isolation_test

  # Native e2e regression test for the SPA link interceptor -> Router::push
  # -> re-render path. Boots a Chrome container via testcontainers and drives
  # it through the fixture SPA. Refs #4088.
  e2e-test:
    name: E2E Test (Chrome via CDP)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          cache-key: "e2e-cdp-test"
          # Cache-seed pattern (Issue #4536, mirrors unit-test.yml): PR runs
          # restore from main's cache but do not save their own entries.
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install wasm32-unknown-unknown target
        run: rustup target add wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Pull headless-shell image (warm cache)
        run: docker pull chromedp/headless-shell:latest

      - name: Run e2e_cdp regression test
        run: |
          cargo test \
            -p reinhardt-pages \
            --features e2e-cdp-test \
            --test spa_navigation_e2e_test \
            -- --nocapture

  # Generate a downstream-shaped consumer via reinhardt-admin and exercise
  # #[url_patterns(... mode = unified|ws)] at a wasm SPA call site, closing
  # the gap exposed by #4161 (workspace `cargo check` of reinhardt-web alone
  # cannot detect macro-emission references to native-only re-exports).
  wasm-consumer-fixture:
    name: WASM Consumer Fixture (#4161 regression)
    runs-on: ${{ fromJSON(inputs.runner || '"ubuntu-latest"') }}
    timeout-minutes: 30
    steps:
      - name: Free Disk Space (Ubuntu)
        if: ${{ !contains(inputs.runner || '', 'self-hosted') }}
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          cache-key: "wasm-consumer-fixture"
          # Cache-seed pattern (Issue #4536, mirrors unit-test.yml): PR runs
          # restore from main's cache but do not save their own entries.
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Install wasm32-unknown-unknown target
        run: rustup target add wasm32-unknown-unknown

      - name: Generate fixture via reinhardt-admin and run wasm check
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: bash .github/scripts/build-wasm-consumer-fixture.sh
