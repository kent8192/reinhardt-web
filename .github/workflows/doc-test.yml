name: Documentation Tests

on:
  workflow_call:
    inputs:
      runner:
        description: 'Runner label JSON. Use "\"ubuntu-latest\"" for GitHub-hosted or "[\"self-hosted\",\"linux\",\"arm64\",\"reinhardt-ci\"]" for self-hosted.'
        type: string
        default: '"ubuntu-latest"'
      cargo-build-jobs:
        description: "Parallel cargo build jobs (1=GitHub-hosted OOM safe, 8=self-hosted)"
        type: string
        default: "1"
      affected-packages:
        description: "Newline-separated list of affected package names"
        type: string
        default: ""
      run-all:
        description: "Whether to run all tests"
        type: string
        default: "true"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_TARGET_DIR: /tmp/cargo_target
  CARGO_INCREMENTAL: 0
  CARGO_BUILD_JOBS: ${{ inputs.cargo-build-jobs || '1' }}
  # Workaround for arduino/setup-protoc#112, cloudflare/wrangler-action#413,
  # hashicorp/setup-packer#162 (tracked in reinhardt-web#4125). Remove this
  # once all three upstreams ship node24 releases.
  #
  # Ideal implementation (without workaround):
  #   (no env override; let runner default kick in)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  doc-test:
    name: Documentation Tests
    runs-on: ${{ fromJSON(inputs.runner) }}
    timeout-minutes: 360
    steps:
      - name: Free Disk Space (Ubuntu)
        if: ${{ !contains(inputs.runner, 'self-hosted') }}
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Login to Docker Hub
        uses: ./.github/actions/docker-login
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          token: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Setup protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "28.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cargo-make
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-make

      # Doc tests are dominated by linking: rustdoc compiles each doctest into
      # its own binary that links the full (all-features) crate, so the default
      # bfd/lld linker is the bottleneck. mold cuts that link time the same way
      # unit-test.yml already does for the test binaries.
      - name: Install mold linker and build dependencies
        run: |
          sudo systemctl stop unattended-upgrades || true
          sudo apt-get update -o DPkg::Lock::Timeout=120
          sudo apt-get install -y -o DPkg::Lock::Timeout=120 mold clang lld build-essential
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*

      # Scope mold to the host target only. A global `RUSTFLAGS=...-fuse-ld=mold`
      # leaks into wasm32 builds and clang rejects `-fuse-ld=mold` for that
      # target. See reinhardt-web#4147. `RUSTDOCFLAGS` carries the linker into
      # the rustdoc doctest compilation, which is where the doc-test link cost
      # actually lives (cargo does not forward the target linker to rustdoc).
      - name: Configure mold linker (host target only)
        run: |
          cat > /tmp/clang-mold-wrapper << 'WRAPPER'
          #!/bin/sh
          exec clang -fuse-ld=mold "$@"
          WRAPPER
          chmod +x /tmp/clang-mold-wrapper
          ARCH=$(uname -m)
          if [ "$ARCH" = "aarch64" ]; then
            ENV_KEY="CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER"
          elif [ "$ARCH" = "x86_64" ]; then
            ENV_KEY="CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER"
          else
            echo "Unsupported architecture for mold linker configuration: $ARCH" >&2
            exit 1
          fi
          echo "${ENV_KEY}=/tmp/clang-mold-wrapper" >> "$GITHUB_ENV"
          echo "RUSTDOCFLAGS=-Clinker=/tmp/clang-mold-wrapper" >> "$GITHUB_ENV"

      - name: Additional disk cleanup before tests
        if: ${{ !contains(inputs.runner, 'self-hosted') }}
        run: |
          echo "Disk usage before additional cleanup:"
          df -h
          # Remove apt cache
          sudo apt-get clean
          # Remove old Docker resources
          docker system prune -af --volumes || true
          # Remove Docker builder cache
          docker builder prune -af || true
          # Remove pip cache
          rm -rf ~/.cache/pip || true
          echo "Disk usage after additional cleanup:"
          df -h

      - name: Run doc tests
        env:
          RUN_ALL: ${{ inputs.run-all }}
          AFFECTED_PACKAGES: ${{ inputs.affected-packages }}
        run: |
          if [[ "$RUN_ALL" != "true" && -n "$AFFECTED_PACKAGES" ]]; then
            while IFS= read -r pkg; do
              [[ -z "$pkg" ]] && continue
              # Skip binary-only crates (no lib target)
              if ! cargo metadata --format-version 1 --no-deps -q 2>/dev/null | \
                jq -e --arg pkg "$pkg" '.packages[] | select(.name == $pkg) | .targets[] | select(.kind[] == "lib")' > /dev/null 2>&1; then
                echo "Skipping $pkg (no lib target)"
                continue
              fi
              echo "::group::Doc tests for $pkg"
              cargo test -p "$pkg" --doc --all-features --no-fail-fast
              echo "::endgroup::"
            done <<< "$AFFECTED_PACKAGES"
          else
            cargo make doc-test-only
          fi

      - name: Docker cleanup after doc tests
        if: always()
        run: docker system prune -af
