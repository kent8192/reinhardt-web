# Local development settings — tracked in version control.
# WARNING: Do NOT put real secrets (production keys, tokens, passwords)
# in this file. It is committed to the repository. Use environment
# variables or a separate, gitignored file for sensitive values.
#
# CoreSettings is registered as `#[settings(section = "core")]`, so its
# fields must live under `[core]` to override values from base.toml.

[core]
debug = true
secret_key = "local-development-secret-key"

# Overrides deep-merge onto base.toml's `[core.databases.default]`, so only the
# changed keys need to appear here.
[core.databases.default]
port = 5433
redis_url = "redis://localhost:6380/0"
