# Reference template for available local settings.
# Edit local.toml directly — it is tracked in version control.
#
# CoreSettings is registered as `#[settings(section = "core")]`, so its
# fields must live under `[core]` to override values from base.toml.

redis_url = "redis://localhost:6380/0"

[core]
debug = true
secret_key = "local-development-secret-key"

[database]
port = 5433
