# Base settings for examples-tutorial-basis
#
# Keys are limited to fields actually consumed by Reinhardt's settings
# fragments (CoreSettings, SecuritySettings, DatabaseConfig). Django-style
# keys such as `templates`, `static_url`, `language_code`, `time_zone`, etc.
# are not yet wired into the framework, so they are intentionally omitted to
# avoid implying they take effect here.

[core]
debug = false
secret_key = "CHANGE_THIS_IN_PRODUCTION"
allowed_hosts = []
installed_apps = []
middleware = []
root_urlconf = ""

[core.security]
secure_ssl_redirect = false
secure_hsts_include_subdomains = false
secure_hsts_preload = false
session_cookie_secure = false
csrf_cookie_secure = false
append_slash = true

# `[core.databases.default]` is the canonical database schema consumed by
# the composed `ProjectSettings` (`#[settings(core: CoreSettings | contacts:
# ContactSettings)]`). The tutorial uses a local SQLite file so Part 1-3
# can run without external infrastructure.

[core.databases.default]
engine = "sqlite"
name = "db.sqlite3"

# Contacts fragment (admins/managers). Required because `ProjectSettings`
# composes `ContactSettings` (`#[settings(core: CoreSettings | contacts:
# ContactSettings)]`) to satisfy the `HasCommonSettings` bound on
# `execute_from_command_line_with_settings`. Empty lists are valid defaults.
[contacts]
admins = []
managers = []
