[package]
name = "examples-viewset-advanced"
version = "0.1.0-alpha.1"
edition = "2024"
publish = false
description = "Reinhardt advanced ViewSet example - demonstrating ViewSet features beyond basic CRUD"
default-run = "examples-viewset-advanced"

[[bin]]
name = "examples-viewset-advanced"
path = "src/bin/manage.rs"

[dependencies]
reinhardt = { workspace = true, features = [
	"minimal",
	"core",
	"conf",
	"database",
	"db-sqlite",
	"commands",
	"di",
	"server",
	"api",  # Includes rest + viewsets
	"client-router",
	"auth",
	"cache",
] }
tokio = { version = "1.48.0", features = ["full"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"
chrono = { version = "0.4", features = ["serde"] }
validator = { version = "0.20.0", features = ["derive"] }
ctor = "0.6.1"
inventory = "0.3"

[dev-dependencies]
reinhardt = { workspace = true, features = [
	"test",
	"testcontainers",
] }
rstest = { version = "0.26", default-features = false }

[features]
default = ["with-reinhardt", "client-router"]
client-router = []
with-reinhardt = []

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ["cfg(with_reinhardt)"] }
