[package]
name = "examples-rough2spec"
version = "0.1.0"
edition = "2024"
publish = false
default-run = "examples-rough2spec"

[[bin]]
name = "examples-rough2spec"
path = "src/bin/manage.rs"

[dependencies]
reinhardt = { workspace = true, features = [
    "minimal",
    "conf",
    "commands",
    "client-router",
    "admin",
] }
tokio = { version = "1.48.0", features = ["full"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"
anyhow = "1.0"
reqwest = { version = "0.12", features = ["json"] }

[features]
default = ["with-reinhardt"]
with-reinhardt = []
