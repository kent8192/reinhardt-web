[package]
name = "examples-di-showcase"
version = "0.1.0-alpha.1"
edition = "2024"
publish = false
default-run = "examples-di-showcase"

[[bin]]
name = "examples-di-showcase"
path = "src/bin/manage.rs"

[dependencies]
reinhardt = { workspace = true, features = [
	"full",
	"client-router",
] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"
tokio = { version = "1.48.0", features = ["full"] }
inventory = "0.3"

[dev-dependencies]
rstest = "0.26.1"
reqwest = { version = "0.12", features = ["json"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"
tokio = { version = "1.48.0", features = ["full"] }

[features]
default = ["client-router"]
client-router = []
with-reinhardt = []

[lints]
workspace = true

