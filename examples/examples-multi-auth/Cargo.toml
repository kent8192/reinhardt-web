[package]
name = "examples-multi-auth"
version = "0.1.0"
edition = "2024"
publish = false
default-run = "examples-multi-auth"

[[bin]]
name = "examples-multi-auth"
path = "src/bin/manage.rs"

[dependencies]
reinhardt = { workspace = true, features = [
	"minimal",         # Core HTTP/Routing/DI/Server
	"auth-jwt",        # JWT authentication
	"auth-token",      # Token-based authentication
	"auth-session",    # Session-based authentication
	"argon2-hasher",   # Password hashing with Argon2
] }
serde = { workspace = true }
serde_json = { workspace = true }
chrono = { workspace = true }
uuid = { version = "1", features = ["v4", "serde"] }
tokio = { workspace = true }
base64 = "0.22"
