[package]
name = "examples-todo"
version = "0.1.0"
edition = "2024"
publish = false
description = "Canonical Todo example for reinhardt-pages"
default-run = "manage"

[lib]
crate-type = ["cdylib", "rlib"]

[[bin]]
name = "manage"
path = "src/bin/manage.rs"
required-features = ["with-reinhardt"]

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }

[target.'cfg(all(target_family = "wasm", target_os = "unknown"))'.dependencies]
reinhardt = { workspace = true, features = ["pages", "client-router"] }
wasm-bindgen = "0.2.106"
web-sys = { version = "0.3.83", features = [
	"Document",
	"Element",
	"Event",
	"EventTarget",
	"HtmlInputElement",
	"Window",
] }
console_error_panic_hook = "0.1"

[target.'cfg(not(all(target_family = "wasm", target_os = "unknown")))'.dependencies]
reinhardt = { workspace = true, features = [
	"minimal",
	"conf",
	"pages",
	"commands",
	"client-router",
] }
tokio = { workspace = true }

[dev-dependencies]
serial_test = { workspace = true }

[target.'cfg(not(all(target_family = "wasm", target_os = "unknown")))'.dev-dependencies]
tokio = { workspace = true, features = ["rt", "macros"] }

[build-dependencies]
cfg_aliases = "0.2"

[features]
default = ["with-reinhardt", "client-router"]
client-router = []
with-reinhardt = []

[lints]
workspace = true
