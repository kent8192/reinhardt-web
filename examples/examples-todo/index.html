<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Reinhardt Todo Example</title>
	<style>
		:root {
			color-scheme: light;
			font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
			background: #f5f7fb;
			color: #18202f;
		}

		body {
			margin: 0;
			min-height: 100vh;
			background: linear-gradient(180deg, #ffffff 0%, #eef3f8 100%);
		}

		.todo-shell {
			width: min(720px, calc(100vw - 32px));
			margin: 56px auto;
		}

		.todo-panel {
			background: #ffffff;
			border: 1px solid #d9e1ea;
			border-radius: 8px;
			box-shadow: 0 18px 48px rgba(30, 45, 70, 0.10);
			padding: 28px;
		}

		.todo-header h1 {
			font-size: 32px;
			line-height: 1.1;
			margin: 0 0 8px;
		}

		.todo-header p,
		.todo-muted,
		.todo-empty {
			color: #5d6b7c;
		}

		.todo-form {
			display: grid;
			grid-template-columns: 1fr auto;
			gap: 10px;
			margin: 24px 0 16px;
		}

		.todo-form input {
			min-width: 0;
			border: 1px solid #cbd6e2;
			border-radius: 6px;
			font: inherit;
			padding: 11px 12px;
		}

		.todo-form button,
		.todo-delete {
			border: 0;
			border-radius: 6px;
			font: inherit;
			font-weight: 650;
			cursor: pointer;
		}

		.todo-form button {
			background: #2563eb;
			color: #ffffff;
			padding: 0 18px;
		}

		.todo-filters {
			display: flex;
			gap: 8px;
			margin-bottom: 18px;
		}

		.todo-filter {
			border: 1px solid #d9e1ea;
			border-radius: 999px;
			color: #425168;
			padding: 6px 12px;
			text-decoration: none;
		}

		.todo-filter.is-active {
			background: #e8f0ff;
			border-color: #9bb8ff;
			color: #1d4ed8;
		}

		.todo-list {
			list-style: none;
			margin: 0;
			padding: 0;
		}

		.todo-row {
			display: flex;
			align-items: center;
			justify-content: space-between;
			gap: 12px;
			border-top: 1px solid #edf1f5;
			padding: 12px 0;
		}

		.todo-checkline {
			display: flex;
			align-items: center;
			gap: 10px;
			min-width: 0;
		}

		.todo-row.is-completed span {
			color: #7b8794;
			text-decoration: line-through;
		}

		.todo-delete {
			background: #f1f5f9;
			color: #334155;
			padding: 7px 10px;
		}

		.todo-error {
			background: #fff1f2;
			border: 1px solid #fecdd3;
			border-radius: 6px;
			color: #be123c;
			padding: 12px;
		}

		.sr-only {
			clip: rect(0, 0, 0, 0);
			clip-path: inset(50%);
			height: 1px;
			overflow: hidden;
			position: absolute;
			white-space: nowrap;
			width: 1px;
		}
	</style>
</head>
<body>
	<div id="root">
		<main class="todo-shell">
			<section class="todo-panel">
				<header class="todo-header">
					<h1>Todos</h1>
					<p>Loading the Reinhardt Todo example...</p>
				</header>
			</section>
		</main>
	</div>
</body>
</html>
