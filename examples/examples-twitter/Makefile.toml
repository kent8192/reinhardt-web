# Makefile.toml for Reinhardt Project
#
# This file provides cargo-make task definitions for common development operations.
# Install cargo-make: `cargo install cargo-make`
# Usage: `cargo make <task>`

[config]
default_to_workspace = false
skip_core_tasks = true

# ============================================================================
# Environment Variables
# ============================================================================

[env]
# Use local target directory for each example (independent from workspace)
CARGO_TARGET_DIR = { value = "target", condition = { env_not_set = ["CARGO_TARGET_DIR"] } }

# ============================================================================
# Development Server
# ============================================================================

[tasks.runserver]
description = "Start the development server (auto-starts PostgreSQL/Redis via `infra-up` transitively through `migrate`)"
dependencies = ["migrate"]
# `DATABASE_URL` is resolved via `db_url.sh` because the management CLI cannot
# read `settings/*.toml` for an example crate (its command context has no
# settings). See scripts/db_url.sh for the full rationale.
script = '''
#!/usr/bin/env bash
set -euo pipefail
eval "$(bash scripts/db_url.sh)"
cargo run --bin examples-twitter -- runserver --with-pages
'''

# ============================================================================
# Infrastructure (disposable PostgreSQL + Redis containers)
# ============================================================================
#
# These tasks mirror the `infra-up` / `infra-down` / `infra-reset` shape
# from `reinhardt-cloud/dashboard/Makefile.toml` so the developer
# experience is uniform across the Reinhardt family. Replaced the previous
# `docker-up` / `docker-down` tasks (which invoked `docker compose`
# against `docker-compose.yml`) so that all examples now provision Postgres
# + Redis via `docker run --rm` plus a settings-driven shell pipeline. The
# docker-compose.yml is removed in the same commit.

[tasks.infra-up]
description = "Start disposable PostgreSQL + Redis containers (docker run --rm); credentials parsed from settings/<profile>.toml"
command = "bash"
args = ["scripts/infra_up.sh"]
env = { REINHARDT_ENV = "local" }

[tasks.infra-down]
description = "Stop disposable PostgreSQL + Redis containers (data is wiped)"
command = "bash"
args = ["scripts/infra_down.sh"]
env = { REINHARDT_ENV = "local" }

[tasks.infra-reset]
description = "Stop and recreate disposable infrastructure (wipes all data)"
dependencies = ["infra-down", "infra-up"]

# ============================================================================
# Database Migrations
# ============================================================================

[tasks.makemigrations]
description = "Create new migrations based on model changes"
# `DATABASE_URL` is resolved via `db_url.sh` (see scripts/db_url.sh): the
# management CLI has no project settings in its command context, so it relies
# on the env var for the connection string.
dependencies = ["infra-up"]
script = '''
#!/usr/bin/env bash
set -euo pipefail
eval "$(bash scripts/db_url.sh)"
cargo run --bin examples-twitter makemigrations
'''

[tasks.makemigrations-app]
description = "Create new migrations for a specific app (usage: cargo make makemigrations-app -- <app_label>)"
dependencies = ["infra-up"]
script = '''
#!/usr/bin/env bash
set -euo pipefail
eval "$(bash scripts/db_url.sh)"
cargo run --bin examples-twitter makemigrations "${@}"
'''

[tasks.migrate]
description = "Apply database migrations (auto-starts PostgreSQL/Redis via `infra-up`)"
dependencies = ["infra-up"]
# `DATABASE_URL` is resolved via `db_url.sh` (see scripts/db_url.sh): the
# management CLI has no project settings in its command context, so the
# connection string must be supplied through the environment. `infra-up`
# provisions the container from the same settings, so the credentials match.
script = '''
#!/usr/bin/env bash
set -euo pipefail
eval "$(bash scripts/db_url.sh)"
cargo run --bin examples-twitter migrate
'''

# ============================================================================
# Static Files
# ============================================================================

[tasks.collectstatic]
description = "Collect static files into STATIC_ROOT"
command = "cargo"
args = ["run", "--bin", "examples-twitter", "collectstatic"]

# ============================================================================
# Project Management
# ============================================================================

[tasks.check]
description = "Check the project for common issues"
command = "cargo"
args = ["run", "--bin", "examples-twitter", "check"]

[tasks.showurls]
description = "Display all registered URL patterns"
command = "cargo"
args = ["run", "--bin", "examples-twitter", "showurls"]

[tasks.shell]
description = "Run an interactive Rust shell (REPL)"
command = "cargo"
args = ["run", "--bin", "examples-twitter", "shell"]

# ============================================================================
# Testing
# ============================================================================

[tasks.test]
description = "Run all tests"
command = "cargo"
args = ["nextest", "run", "--all-features"]

[tasks.test-unit]
description = "Run unit tests only"
command = "cargo"
args = ["nextest", "run", "--lib", "--all-features"]

[tasks.test-integration]
description = "Run integration tests only"
command = "cargo"
args = ["nextest", "run", "--test", "*", "--all-features"]

# ============================================================================
# Code Quality
# ============================================================================

[tasks.fmt-check]
description = "Check code formatting (rustfmt + page! DSL)"
command = "reinhardt-admin"
args = ["fmt", ".", "--check"]

[tasks.fmt-fix]
description = "Fix code formatting (rustfmt + page! DSL)"
command = "reinhardt-admin"
args = ["fmt", "."]

[tasks.clippy-check]
description = "Check linting rules"
command = "cargo"
args = ["clippy", "--all-features", "--", "-D", "warnings"]

[tasks.clippy-fix]
description = "Fix linting issues automatically"
command = "cargo"
args = ["clippy", "--all-features", "--fix", "--allow-dirty", "--allow-staged"]

[tasks.quality]
description = "Run all code quality checks (format + lint)"
dependencies = ["fmt-check", "clippy-check"]

[tasks.quality-fix]
description = "Fix all code quality issues automatically"
dependencies = ["fmt-fix", "clippy-fix"]

# ============================================================================
# Build & Clean
# ============================================================================

[tasks.build]
description = "Build the project in debug mode"
command = "cargo"
args = ["build", "--all-features"]

[tasks.build-release]
description = "Build the project in release mode"
command = "cargo"
args = ["build", "--release", "--all-features"]

[tasks.clean]
description = "Clean build artifacts"
command = "cargo"
args = ["clean"]

# ============================================================================
# WASM Testing Tasks
# ============================================================================

[tasks.wasm-test]
description = "Run WASM tests in headless Chrome"
command = "wasm-pack"
args = ["test", "--headless", "--chrome"]

[tasks.wasm-test-firefox]
description = "Run WASM tests in headless Firefox"
command = "wasm-pack"
args = ["test", "--headless", "--firefox"]

[tasks.wasm-test-debug]
description = "Run WASM tests with browser (for debugging)"
command = "wasm-pack"
args = ["test", "--chrome"]

[tasks.wasm-compile-dev]
description = "Compile WASM binary (debug mode)"
command = "cargo"
args = ["build", "--target", "wasm32-unknown-unknown"]

[tasks.wasm-bindgen-dev]
description = "Generate WASM bindings using wasm-pack (debug mode)"
command = "wasm-pack"
args = [
	"build",
	"--target", "web",
	"--out-dir", "dist-wasm",
	"--dev",
	"--no-typescript"
]
dependencies = ["wasm-compile-dev"]

[tasks.wasm-build-dev]
description = "Build WASM in debug mode and collect static files"
dependencies = ["wasm-bindgen-dev"]
script = '''
echo "Running collectstatic..."
cargo run --bin examples-twitter collectstatic --no-input
echo "✓ WASM build and collectstatic completed"
'''

[tasks.wasm-compile-release]
description = "Compile WASM binary (release mode)"
command = "cargo"
args = ["build", "--target", "wasm32-unknown-unknown", "--release"]

[tasks.wasm-bindgen-release]
description = "Generate WASM bindings using wasm-pack (release mode)"
command = "wasm-pack"
args = [
	"build",
	"--target", "web",
	"--out-dir", "dist-wasm",
	"--release"
]
dependencies = ["wasm-compile-release"]

[tasks.wasm-finalize-release]
description = "Optimize WASM with wasm-opt and collect static files"
script = '''
# Optimize with wasm-opt if available
if command -v wasm-opt &> /dev/null; then
	echo "Running wasm-opt..."
	WASM_FILE="dist-wasm/examples_twitter_bg.wasm"
	wasm-opt -O3 -o "$WASM_FILE.opt" "$WASM_FILE"
	mv "$WASM_FILE.opt" "$WASM_FILE"
	echo "✓ WASM optimized"
else
	echo "⚠️  wasm-opt not found, skipping optimization"
fi
'''
dependencies = ["wasm-bindgen-release"]

[tasks.wasm-build-release]
description = "Build WASM in release mode with optimization and collect static files"
dependencies = ["wasm-finalize-release"]
script = '''
echo "Running collectstatic..."
cargo run --bin examples-twitter collectstatic --no-input
echo "✓ WASM release build and collectstatic completed"
'''

[tasks.wasm-clean]
description = "Clean WASM build artifacts"
script = '''
rm -rf dist dist-wasm
echo "✓ Cleaned WASM artifacts"
'''

[tasks.clean-cache]
description = "Clean WASM artifacts and Rust incremental build cache"
script = '''
echo "🧹 Cleaning build cache..."

# WASM artifacts
if [ -d "dist-wasm" ]; then
	rm -rf dist-wasm
	echo "  ✓ Removed dist-wasm/"
fi

if [ -d "dist" ]; then
	rm -rf dist
	echo "  ✓ Removed dist/"
fi

# Rust incremental build cache
if [ -d "target/debug/incremental" ]; then
	rm -rf target/debug/incremental
	echo "  ✓ Removed target/debug/incremental/"
fi

# WASM target build cache
if [ -d "target/wasm32-unknown-unknown" ]; then
	rm -rf target/wasm32-unknown-unknown
	echo "  ✓ Removed target/wasm32-unknown-unknown/"
fi

echo "✨ Build cache cleaned"
'''

# ============================================================================
# Development Workflow
# ============================================================================

[tasks.dev]
description = "Build WASM and start development server with frontend (auto-starts PostgreSQL/Redis via `migrate` → `infra-up`)"
dependencies = ["wasm-build-dev", "migrate", "run-dev-server"]

[tasks.run-dev-server]
description = "Start development server with frontend (MUST run from project directory)"
script = '''
#!/bin/bash
# Check if current directory is examples-twitter
CURRENT_DIR=$(basename "$PWD")
if [ "$CURRENT_DIR" != "examples-twitter" ]; then
	echo "Error: This command must be run from examples/examples-twitter directory"
	echo "Current directory: $PWD"
	echo "Please run: cd examples/examples-twitter && cargo make dev"
	exit 1
fi

# Resolve DATABASE_URL: the management CLI cannot read settings/*.toml for an
# example crate, so it needs the connection string from the environment
# (see scripts/db_url.sh).
eval "$(bash scripts/db_url.sh)"

echo "🚀 Starting development server with WASM frontend..."
# wasm-build-dev already produced fresh artifacts; skip runserver's own rebuild.
cargo run --bin examples-twitter -- runserver --with-pages --noreload --no-override-wasm
'''

[tasks.dev-release]
description = "Build optimized WASM and start server (auto-starts PostgreSQL/Redis via `migrate` → `infra-up`)"
dependencies = ["wasm-build-release", "collectstatic", "migrate", "run-dev-release-server"]

[tasks.run-dev-release-server]
script = '''
#!/bin/bash
# Resolve DATABASE_URL: the management CLI cannot read settings/*.toml for an
# example crate, so it needs the connection string from the environment
# (see scripts/db_url.sh).
eval "$(bash scripts/db_url.sh)"

echo "🚀 Starting server with optimized WASM frontend..."
# wasm-build-release already produced optimized artifacts; skip runserver's own rebuild.
cargo run --release --bin examples-twitter -- runserver --with-pages --noreload --no-override-wasm
'''

# ============================================================================
# CI/CD Workflow
# ============================================================================

[tasks.ci]
description = "Run CI pipeline (format, lint, build, test)"
dependencies = ["fmt-check", "clippy-check", "build", "test"]

# ============================================================================
# Verbosity Control
# ============================================================================

[tasks.runserver-v]
description = "Start the development server with verbose output"
command = "cargo"
args = ["run", "--bin", "examples-twitter", "runserver", "-v"]

[tasks.runserver-vv]
description = "Start the development server with very verbose output"
command = "cargo"
args = ["run", "--bin", "examples-twitter", "runserver", "-vv"]

[tasks.runserver-vvv]
description = "Start the development server with maximum verbosity"
command = "cargo"
args = ["run", "--bin", "examples-twitter", "runserver", "-vvv"]
