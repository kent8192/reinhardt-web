# Base settings for examples-twitter
[core]
debug = false
secret_key = "CHANGE_THIS_IN_PRODUCTION_MUST_BE_KEPT_SECRET"
allowed_hosts = []
installed_apps = []
templates = []
static_url = "/static/"
staticfiles_dirs = []
media_url = "/media/"
language_code = "en-us"
time_zone = "UTC"
use_i18n = true
use_tz = true
default_auto_field = "BigAutoField"
admins = []
managers = []
middleware = []
root_urlconf = ""

[core.security]
secure_ssl_redirect = false
secure_hsts_include_subdomains = false
secure_hsts_preload = false
session_cookie_secure = false
csrf_cookie_secure = false
append_slash = true

[core.databases.default]
engine = "postgresql"
host = "localhost"
port = 5432
name = "examples-twitter_db"
user = "postgres"
password = "CHANGE_THIS"
