# Local development override template
# Copy to .cargo/config.toml to use local reinhardt workspace:
#   cp .cargo/config.local.toml .cargo/config.toml
#
# Or use Makefile.toml task (from main repo):
#   cargo make local-examples-test

[patch.crates-io]
reinhardt-web = { path = ".." }
# Patch transitive workspace crates here when a fix lives in a sub-crate.
# `reinhardt-web` re-exports the framework facade, but sub-crates pulled in
# transitively still resolve from crates.io unless explicitly patched.
reinhardt-utils = { path = "../crates/reinhardt-utils" }
