[package]
name = "reinhardt-urls"
version = "0.1.0-rc.16"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "URL routing and proxy utilities for Reinhardt framework"

[dependencies]
# Re-export internal crates
reinhardt-routers-macros = { workspace = true, optional = true }
reinhardt-core = { workspace = true, features = ["exception", "page", "reactive", "types"] }
thiserror = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
regex = { workspace = true }
once_cell = "1.20"
matchit = "0.9.0"

# WASM-specific dependencies (for client-router)
[target.'cfg(all(target_family = "wasm", target_os = "unknown"))'.dependencies]
wasm-bindgen = "0.2"
web-sys = { version = "0.3", features = ["Event", "History", "Location", "PopStateEvent", "Url", "Window"] }
js-sys = "0.3"

# Server-only dependencies (not available on WASM)
[target.'cfg(not(all(target_family = "wasm", target_os = "unknown")))'.dependencies]
reinhardt-db = { workspace = true, features = ["orm"] }
async-trait = { workspace = true }
futures = { workspace = true }
tracing = { workspace = true }
reinhardt-views = { workspace = true, features = ["viewsets"] }
reinhardt-middleware = { workspace = true }
reinhardt-http = { workspace = true }
reinhardt-di = { workspace = true }
nom = { workspace = true }
hyper = { workspace = true }
chrono = { workspace = true }
serde_yaml = "0.9"
aho-corasick = "1.1"
inventory = "0.3"

# Streaming support (optional)
reinhardt-streaming = { workspace = true, optional = true }

[features]
default = ["routers", "routers-macros", "proxy"]

# Module features (modules are always compiled, features for backwards compatibility)
routers = []
routers-macros = ["dep:reinhardt-routers-macros"]
proxy = []
database = []
client-router = ["reinhardt-core/reactive", "routers"]
streaming = ["dep:reinhardt-streaming"]
urls-full = ["routers", "routers-macros", "proxy"]
full = ["database", "unified-router"]
unified-router = []

[build-dependencies]
cfg_aliases = "0.2"

[dev-dependencies]
insta = { workspace = true }
tokio = { version = "1.41", features = ["full"] }
bytes = { workspace = true }
hyper = { workspace = true }
rstest = { workspace = true }
serial_test = { workspace = true }
reinhardt-testkit = { path = "../reinhardt-testkit" }
