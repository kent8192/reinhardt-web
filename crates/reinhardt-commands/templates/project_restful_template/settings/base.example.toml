# Base Settings for {{ project_name }}
#
# This file contains the base configuration that is common across all environments.
# Environment-specific settings should be placed in their respective files:
# - local.toml (development)
# - staging.toml (staging environment)
# - production.toml (production environment)
#
# IMPORTANT: Copy this file to base.toml and update the values.
# The base.toml file is gitignored and should not be committed.

# Django-style settings
debug = false
secret_key = "{{ secret_key }}"
# Reserved: not yet consumed by the framework
language_code = "en-us"
time_zone = "UTC"
use_i18n = true
use_tz = true
append_slash = true
# Reserved: not yet consumed by the framework
default_auto_field = "reinhardt.db.models.BigAutoField"

# Allowed hosts (empty list allows all hosts in debug mode)
allowed_hosts = []

# Installed applications
# This list is read by the settings loader at runtime.
# To register apps, add their config names as strings here.
# App registration in Rust code uses the installed_apps! macro separately.
installed_apps = []

# Database configuration
[database]
engine = "postgresql"
host = "localhost"
port = 5432
name = "{{ project_name }}_db"
user = "postgres"
password = "CHANGE_THIS"

# Static files
[static]
url = "/static/"
root = "staticfiles"

# Media files
[media]
url = "/media/"
root = "media"

# Security settings
[security]
session_cookie_secure = false
csrf_cookie_secure = false
secure_ssl_redirect = false
secure_hsts_seconds = 0
secure_hsts_include_subdomains = false
secure_hsts_preload = false
