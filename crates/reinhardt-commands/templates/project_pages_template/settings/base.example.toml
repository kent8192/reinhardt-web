# Base Settings for {{ project_name }}
#
# This file contains the base configuration that is common across all environments.
# Environment-specific settings should be placed in their respective files:
# - local.toml (development)
# - staging.toml (staging environment)
# - production.toml (production environment)
#
# IMPORTANT: Copy this file to base.toml and update the values.
# The base.toml file is gitignored and should not be committed.

[core]
debug = false
secret_key = "CHANGE_THIS_IN_PRODUCTION_MUST_BE_KEPT_SECRET"
allowed_hosts = []
language_code = "en-us"
time_zone = "UTC"
use_i18n = true
use_tz = true
default_auto_field = "BigAutoField"
middleware = []
root_urlconf = ""

[core.security]
session_cookie_secure = false
csrf_cookie_secure = false
secure_ssl_redirect = false
secure_hsts_seconds = 0
secure_hsts_include_subdomains = false
secure_hsts_preload = false
append_slash = true

[core.databases.default]
engine = "postgresql"
host = "localhost"
port = 5432
name = "{{ project_name }}_db"
user = "postgres"
password = "CHANGE_THIS"

[static]
url = "/static/"
root = "dist"
