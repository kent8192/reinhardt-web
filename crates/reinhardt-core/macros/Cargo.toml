[package]
name = "reinhardt-macros"
version = "0.1.0-rc.15"
edition.workspace = true
license.workspace = true
description = "Procedural macros for Reinhardt framework"
repository.workspace = true
authors.workspace = true

[lib]
proc-macro = true

[dependencies]
syn = { workspace = true, features = ["full", "extra-traits"] }
quote = { workspace = true }
proc-macro2 = { workspace = true }
proc-macro-crate = "3.1"
nom = { workspace = true }
ctor = { workspace = true }
inventory = { workspace = true }

[features]
full = []
db-postgres = []
db-mysql = []
db-sqlite = []

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt", "time"] }
trybuild = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
serial_test = { workspace = true }
async-trait = { workspace = true }
chrono = { workspace = true }
linkme = { workspace = true }
rstest = { workspace = true }
# Note: Internal workspace crates (reinhardt-db, reinhardt-di, reinhardt-core, etc.)
# are excluded from dev-dependencies to avoid circular dependency issues during publishing.
# Tests that require these crates have been moved to reinhardt-integration-tests.
