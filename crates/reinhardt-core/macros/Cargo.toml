[package]
name = "reinhardt-macros"
version = "0.1.0-rc.15"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
description = "Procedural macros for Reinhardt framework"
repository.workspace = true
authors.workspace = true

[lib]
proc-macro = true

[dependencies]
syn = { workspace = true, features = ["full", "extra-traits"] }
quote = { workspace = true }
proc-macro2 = { workspace = true }
proc-macro-crate = "3.1"
nom = { workspace = true }
ctor = { workspace = true }
inventory = { workspace = true }

[features]
full = []
db-postgres = []
db-mysql = []
db-sqlite = []

[dev-dependencies]
tokio = { workspace = true, features = ["macros", "rt", "time"] }
trybuild = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
serial_test = { workspace = true }
async-trait = { workspace = true }
chrono = { workspace = true }
linkme = { workspace = true }
rstest = { workspace = true }
uuid = { workspace = true }
# reinhardt-auth uses path-only (no version) to avoid crates.io resolution failures
# during `cargo publish`. This is safe because dev-dependencies are not required
# for published crates, and publish_no_verify = true is configured.
reinhardt-auth = { path = "../../reinhardt-auth", features = ["argon2-hasher"] }
# reinhardt-apps is path-only for the same reason; required by installed_apps!-
# generated `impl AppLabel for InstalledApp` in the integration tests (Issue #3670).
reinhardt-apps = { path = "../../reinhardt-apps" }
# Note: Internal workspace crates (reinhardt-db, reinhardt-di, reinhardt-core, etc.)
# are excluded from dev-dependencies to avoid circular dependency issues during publishing.
# Tests that require these crates have been moved to reinhardt-integration-tests.
