[package]
name = "reinhardt-openapi-macros"
version = "0.1.0-rc.21"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "Procedural macros for OpenAPI schema generation in Reinhardt"
keywords = ["web", "framework", "openapi", "macros"]
categories = ["web-programming", "development-tools"]

[lib]
proc-macro = true

[features]
full = []

[dependencies]
proc-macro2 = { workspace = true }
quote = { workspace = true }
syn = { workspace = true, features = ["full", "extra-traits"] }
proc-macro-crate = "3.1"

[dev-dependencies]
utoipa = "^5.4.0"
trybuild = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
inventory = { workspace = true }
# Note: Integration tests moved to /tests/integration crate to avoid circular dependency
