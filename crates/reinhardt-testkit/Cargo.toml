[package]
name = "reinhardt-testkit"
version = "0.1.0-rc.15"
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
description = "Core testing infrastructure for Reinhardt framework (no functional crate dependencies)"
license.workspace = true
repository.workspace = true

[features]
default = []
testcontainers = [
  "dep:testcontainers",
  "dep:testcontainers-modules",
  "dep:sqlx",
  "dep:memcache-async",
  "dep:tokio-util",
  "dep:redis",
  "dep:fs2",
]
static = ["reinhardt-utils/staticfiles"]
websockets = ["dep:reinhardt-websockets", "reinhardt-server/websocket"]
graphql = ["reinhardt-server/graphql", "dep:async-graphql"]
property-based = ["dep:proptest"]
viewsets = []
admin = ["dep:reinhardt-conf"]
messages = ["reinhardt-core/messages"]
full = ["testcontainers", "static", "websockets", "graphql", "property-based", "viewsets", "admin", "messages"]

[dependencies]
reinhardt-db = { workspace = true, features = ["backends", "migrations", "mysql", "orm", "postgres", "sqlite"] }
reinhardt-di = { workspace = true }
reinhardt-http = { workspace = true }
reinhardt-views = { workspace = true, features = ["viewsets"] }
reinhardt-server = { workspace = true }
reinhardt-websockets = { workspace = true, optional = true }

hyper = { workspace = true }
tokio = { workspace = true }
futures = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
bytes = { workspace = true }
http = "1.0"
http-body-util = { workspace = true }
async-trait = { workspace = true }
async-dropper = { version = "0.3", features = ["tokio", "simple"] }
thiserror = { workspace = true }
url = "2.5"
cookie = "0.18"
mime = "0.3"
base64-simd = "0.8"
uuid = { workspace = true }
chrono = { workspace = true }
reinhardt-query = { workspace = true, features = ["derive"] }
env_logger = "0.11"
reqwest = { workspace = true, features = ["cookies"] }
urlencoding = "2.1"
serde_urlencoded = "0.7"
tracing = { workspace = true }

# Optional dependencies for testcontainers feature
testcontainers = { workspace = true, optional = true, features = ["blocking"] }
testcontainers-modules = { workspace = true, optional = true }
sqlx = { workspace = true, optional = true }
memcache-async = { version = "0.9.0", optional = true }
tokio-util = { version = "0.7", features = ["compat"], optional = true }
redis = { workspace = true, optional = true, features = [
  "cluster",
  "cluster-async",
] }
fs2 = { version = "0.4", optional = true }

# Optional dependencies for property-based testing
proptest = { workspace = true, optional = true }

# Optional dependencies for graphql feature
async-graphql = { workspace = true, optional = true }


# WebSocket and messaging
tokio-tungstenite = "0.28.0"
lapin = "3.7.2"
reinhardt-core = { workspace = true, features = [
  "types",
  "exception",
] }
reinhardt-utils = { workspace = true, features = ["cache", "staticfiles"] }

# Token pasting for macros
paste = "1.0"

tempfile = "3.8"

# Testing framework dependencies
rstest = "0.26.1"
mockall = { workspace = true }

reinhardt-urls = { workspace = true, features = ["routers"] }
reinhardt-conf = { workspace = true, features = ["settings", "async"], optional = true }

[target.'cfg(not(all(target_family = "wasm", target_os = "unknown")))'.dependencies]
reinhardt-auth = { workspace = true, features = ["jwt", "sessions"] }
reinhardt-middleware = { workspace = true, features = ["sessions"] }
totp-lite = { version = "2.0" }

[build-dependencies]
cfg_aliases = "0.2"

[dev-dependencies]
tokio = { workspace = true, features = ["full"] }
tokio-test = "0.4"
scopeguard = "1.2"
serial_test = "3.0"
