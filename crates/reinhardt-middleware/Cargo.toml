[package]
name = "reinhardt-middleware"
version = "0.1.0-rc.15"
description = "Middleware system for request/response processing pipeline"
keywords = ["middleware", "web", "cors", "security", "http"]
categories = ["web-programming", "web-programming::http-server"]
readme = "README.md"
documentation = "https://docs.rs/reinhardt-middleware"
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true

[features]
default = []

# Fine-grained middleware features
cors = []
compression = []
security = []
rate-limit = []
sessions = []
auth-jwt = ["reinhardt-auth/jwt"]

# Database support for certain middleware
sqlx = ["dep:sqlx"]

# Redis-backed session storage
session-redis = ["sessions", "dep:redis"]

# Aggregate all middleware features
full = ["cors", "compression", "security", "rate-limit", "sessions", "auth-jwt", "sqlx", "session-redis"]

[dependencies]
reinhardt-core = { workspace = true, features = [
    "types",
    "exception",
    "security",
] }
reinhardt-http = { workspace = true }
reinhardt-auth = { workspace = true, features = ["sessions"] }
reinhardt-mail = { workspace = true }
reinhardt-conf = { workspace = true, features = ["settings"] }
reinhardt-di = { workspace = true }
async-trait = { workspace = true }
chrono = { workspace = true }
hyper = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
flate2 = { workspace = true }
brotli = "8.0.2"
sha2 = { workspace = true }
hex = "0.4"
rand = { workspace = true }
httpdate = "1.0"
bytes = { workspace = true }
sqlx = { workspace = true, optional = true }
redis = { version = "0.27", features = ["aio", "tokio-comp", "connection-manager"], optional = true }
regex = "1.10"
ipnet = "2.10"
log = "0.4"
thiserror = { workspace = true }
url = "2.5"
uuid = { workspace = true }
tokio = { workspace = true }
colored = { workspace = true }
base64 = { workspace = true }
tracing = { workspace = true }

[dev-dependencies]
insta = { workspace = true }
# Workaround for KI-2 (rust-lang/cargo#4242, rust-lang/cargo#15151):
# Path-only dev-dep (no version) is stripped from published manifest by cargo,
# avoiding dev-dependency version resolution failure during `cargo publish`.
# When upstream cargo resolves these issues, replace with `workspace = true`.
reinhardt-test = { path = "../reinhardt-test" }
tokio-test = "0.4"
tokio = { workspace = true }
serial_test = { workspace = true }
rstest = { workspace = true }
proptest = { workspace = true }
trybuild = "1.0"
http = { workspace = true }
