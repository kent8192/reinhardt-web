[package]
name = "reinhardt-manouche"
version = "0.1.4"
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
description = "DSL definitions for reinhardt-pages macro (Manouche Jazz DSL)"
repository.workspace = true
keywords = ["ast", "parser", "dsl", "macro"]
categories = ["parser-implementations", "development-tools::procedural-macro-helpers"]

[dependencies]
# Documentation
aquamarine = { workspace = true, optional = true }

# Parsing and AST manipulation
syn = { workspace = true, features = ["full", "extra-traits", "visit-mut"] }
quote = { workspace = true }
proc-macro2 = { workspace = true }

# Diagnostic and error handling
darling = "0.20"

# Case conversion for identifiers
convert_case = "0.6"

[features]
default = []
doc-diagrams = ["dep:aquamarine"]

[dev-dependencies]
rstest = { workspace = true }
