[package]
name = "reinhardt-tasks"
version = "0.1.0-rc.27"
description = "Background task execution and scheduling"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true

[dependencies]

async-trait = { workspace = true }
thiserror = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
chrono = { version = "0.4", features = ["serde"] }
uuid = { workspace = true }
cron = "0.15.0"
rand = { workspace = true }
reqwest = { workspace = true }
url = { workspace = true }
ipnet = "2.0"
tracing = { workspace = true }

# Redis backend (optional)
redis = { workspace = true, optional = true }

# Database backend (optional)
sqlx = { workspace = true, features = ["runtime-tokio", "tls-rustls"], optional = true }

# AWS SQS backend (optional)
aws-config = { version = "1.1.7", features = [
  "behavior-version-latest",
], optional = true }
aws-sdk-sqs = { version = "1.76.0", optional = true }

# RabbitMQ backend (optional)
lapin = { version = "3.7.2", optional = true }

# Kafka backend (optional)
reinhardt-streaming = { workspace = true, optional = true, features = ["kafka"] }

# Documentation
aquamarine = { workspace = true }

[dev-dependencies]
insta = { workspace = true }
tokio = { workspace = true }
testcontainers = { workspace = true }
testcontainers-modules = { workspace = true, features = ["redis"] }
serial_test = { workspace = true }
mockito = "1.5"
tempfile = { workspace = true }
rstest = { workspace = true }
# Workaround for KI-2 (rust-lang/cargo#4242, rust-lang/cargo#15151):
# Path-only dev-dep (no version) is stripped from published manifest by cargo,
# avoiding dev-dependency version resolution failure during `cargo publish`.
# When upstream cargo resolves these issues, replace with `workspace = true`.
reinhardt-testkit = { path = "../reinhardt-testkit", features = ["testcontainers"] }

[features]
default = []
redis-backend = ["redis"]
database-backend = ["sqlx"]
sqs-backend = ["aws-config", "aws-sdk-sqs"]
rabbitmq-backend = ["lapin"]
kafka-backend = ["dep:reinhardt-streaming"]
all-backends = ["redis-backend", "database-backend", "sqs-backend", "rabbitmq-backend", "kafka-backend"]
full = ["all-backends"]
