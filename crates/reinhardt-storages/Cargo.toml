[package]
name = "reinhardt-storages"
version = "0.2.0-rc.4"
edition = "2024"
authors = ["Reinhardt Contributors"]
license = "MIT OR Apache-2.0"
description = "Cloud storage backend abstraction for Reinhardt framework"
repository = "https://github.com/kent8192/reinhardt-web"
keywords = ["storage", "s3", "gcs", "azure", "cloud"]
categories = ["web-programming", "filesystem"]

[dependencies]
async-trait = "0.1"
tokio = { version = "1", features = ["fs", "rt-multi-thread", "macros"] }
chrono = { workspace = true }
thiserror = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
reinhardt-conf = { workspace = true, features = ["settings"] }
reinhardt-core = { workspace = true }
reqwest = { workspace = true, optional = true }
base64 = { workspace = true, optional = true }
bytes = { workspace = true, optional = true }
hmac = { workspace = true, optional = true }
sha2 = { workspace = true, optional = true }
percent-encoding = { version = "2.3", optional = true }

# S3
aws-sdk-s3 = { version = "1", optional = true }
aws-config = { version = "1", optional = true }

# GCS
google-cloud-storage = { version = "1.12.0", optional = true }
google-cloud-auth = { version = "1.10.0", optional = true }

# Azure
azure_storage_blob = { version = "1.0.0", optional = true }
azure_core = { version = "1.0.0", optional = true }
azure_identity = { version = "0.29.0", optional = true }

[dev-dependencies]
wiremock = "0.6"
tokio = { version = "1", features = ["full"] }
tempfile = "3"
rstest = "0.23"
uuid = { version = "1", features = ["v4"] }
rand = "0.8"
aws-config = { version = "1", features = ["behavior-version-latest"] }
serial_test = "3"
testcontainers = { workspace = true }
reqwest = { workspace = true }
toml = { workspace = true }

[features]
default = ["s3", "local"]
s3 = ["aws-sdk-s3", "aws-config"]
gcs = [
  "google-cloud-storage",
  "google-cloud-auth",
  "reqwest",
  "bytes",
  "percent-encoding",
]
azure = [
  "azure_storage_blob",
  "azure_core",
  "azure_identity",
  "reqwest",
  "base64",
  "hmac",
  "sha2",
  "percent-encoding",
]
local = ["tokio/fs"]
all = ["s3", "gcs", "azure", "local"]
