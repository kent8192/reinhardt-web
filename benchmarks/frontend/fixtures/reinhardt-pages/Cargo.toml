[package]
name = "frontend-benchmark-reinhardt-pages"
version = "0.0.0"
edition = "2024"
publish = false

[lib]
crate-type = ["cdylib", "rlib"]

[workspace]

[build-dependencies]
cfg_aliases = "0.2"

[dependencies]
reinhardt-pages = { path = "../../../../crates/reinhardt-pages", features = ["web-sys-full"] }
wasm-bindgen = "0.2.106"
web-sys = { version = "0.3.83", features = ["Document", "Element", "Event", "EventTarget", "HtmlElement", "HtmlInputElement", "Window"] }
